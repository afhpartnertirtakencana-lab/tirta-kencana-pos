    .menu-tabs { display:flex; overflow-x:auto; gap:4px; padding:8px 10px; background:var(--card); border-bottom:1px solid var(--border); scrollbar-width: thin; scrollbar-color: var(--biru) transparent; }

    /* Dashboard Menu Utama */
    .summary-shape {
      background: linear-gradient(135deg, #1A6DB5, #2B8FDE);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 20px;
      color: white;
      box-shadow: 0 6px 20px rgba(26,109,181,0.3);

      font-weight: 700;
      opacity: 0.9;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }
    .summary-shape .summary-items {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .summary-item {
      background: rgba(255,255,255,0.15);

      border-radius: 12px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;

    .menu-grid {

      justify-items: center;
      margin-bottom: 20px;
    }

        grid-template-columns: repeat(3, 1fr);

    .menu-circle-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .menu-circle-item:hover {
      transform: translateY(-4px);

    .menu-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;

      font-size: 0.7rem;

      color: var(--text2);

      line-height: 1.2;
    }
    .menu-row-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--biru);
      margin: 12px 0 8px;
      padding-left: 8px;
      border-left: 3px solid var(--kuning);
    }
  </style>

    function gasCall(fn, args = []) {
      return new Promise((resolve, reject) => {
        const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
        const url = getGasUrl() + '?fn=' + encodeURIComponent(fn) + '&args=' + encodeURIComponent(JSON.stringify(args)) + '&callback=' + cb + '&t=' + Date.now();
        const script = document.createElement('script');
        let done = false;
        const timer = setTimeout(() => { if (done) return; done = true; script.src = ''; if (script.parentNode) script.parentNode.removeChild(script); delete window[cb]; reject(new Error('GAS timeout')); }, 15000);
        window[cb] = function(r) { if (done) return; done = true; clearTimeout(timer); if (script.parentNode) script.parentNode.removeChild(script); delete window[cb]; if (r && r.ok) resolve(r.data); else reject(new Error((r && r.error) || 'GAS error')); };
        script.async = true; script.src = url; document.head.appendChild(script);
      });
    }

        <div style="display:flex;gap:8px"><button class="btn btn-secondary" style="flex:1" onclick="resetTrx()">Reset</button><button class="btn btn-primary" style="flex:2" id="btnSubmitTrx" onclick="submitTrx()">💾 Simpan & Struk</button></div></div>`;
      _itemIdx = 0;

    function addItemRow(skuVal) {
      const div = document.createElement('div');
      div.className = 'cart-item-row';
      div.innerHTML = `
        <input class="cart-item-select" data-field="sku" placeholder="SKU" list="productDatalist" value="${skuVal||''}" autocomplete="off" style="flex:2;min-width:100px">
        <input class="cart-nama" data-field="nama" readonly placeholder="Nama" style="width:110px;background:var(--biru-muda);font-size:0.7rem;text-align:center;border:1px solid var(--border);border-radius:8px;padding:6px 4px;">
        <input class="cart-qty" data-field="qty" type="number" min="1" value="1" style="width:55px">
        <input class="cart-disc" data-field="harga" type="number" min="0" placeholder="Harga" value="0" style="width:70px">
        <input class="cart-disc" data-field="disc" type="number" min="0" placeholder="Disc" value="0" style="width:55px">
        <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove();recalcTotals()">✕</button>`;
      const skuInput = div.querySelector('[data-field="sku"]');
      const namaInput = div.querySelector('[data-field="nama"]');
      const hargaInput = div.querySelector('[data-field="harga"]');
      skuInput.addEventListener('input', () => {
        const val = skuInput.value.trim();
        if (!val) { namaInput.value = ''; recalcTotals(); return; }
        const p = products.find(x => String(x.sku).toLowerCase() === val.toLowerCase() || (x.barcode && String(x.barcode) === val));
        if (p) { skuInput.value = p.sku; namaInput.value = p.nama; hargaInput.value = p.jual || p.harga || 0; }
        else { namaInput.value = ''; }
        recalcTotals();
      });
      ['qty','harga','disc'].forEach(f => div.querySelector(`[data-field="${f}"]`).addEventListener('input', recalcTotals));
      document.getElementById('itemsContainer').appendChild(div);
      if (skuVal) { const p = products.find(x => String(x.sku).toLowerCase() === skuVal.toLowerCase()); if (p) { skuInput.value = p.sku; namaInput.value = p.nama; hargaInput.value = p.jual || p.harga || 0; } }
      recalcTotals();
    }

    function fillRowBySku(row, sku) { const p = products.find(x => String(x.sku).toLowerCase() === sku.toLowerCase()); if (!p) return; row.querySelector('[data-field="sku"]').value = p.sku; row.querySelector('[data-field="harga"]').value = p.jual || p.harga || 0; const namaInput = row.querySelector('[data-field="nama"]'); if (namaInput) namaInput.value = p.nama; recalcTotals(); }
    function getItems() { const rows = document.querySelectorAll('#itemsContainer .cart-item-row'); const items = []; rows.forEach(row => { const sku = row.querySelector('[data-field="sku"]')?.value.trim() || ''; const qty = parseInt(row.querySelector('[data-field="qty"]')?.value) || 1; const harga = parseFloat(row.querySelector('[data-field="harga"]')?.value) || 0; const disc = parseFloat(row.querySelector('[data-field="disc"]')?.value) || 0; const p = products.find(x => x.sku === sku); const modal = p ? (p.modal || 0) : 0; const nettPer = harga - disc; if (sku || p) items.push({ sku, nama: p?.nama || sku, qty, harga, discRpPer: disc, modal, nettPer, subtotal: nettPer * qty }); }); return items; }
    function recalcTotals() { const items = getItems(); const gross = items.reduce((s,it) => s + it.harga * it.qty, 0); const iDisc = items.reduce((s,it) => s + it.discRpPer * it.qty, 0); const gDisc = parseFloat(document.getElementById('trxDiscGlobal')?.value) || 0; document.getElementById('sumGross').textContent = fmtRp(gross); document.getElementById('sumDisc').textContent = fmtRp(iDisc + gDisc); document.getElementById('sumNett').textContent = fmtRp(gross - iDisc - gDisc); }
    function resetTrx() { loadPenjualan(); }
    async function submitTrx() {
      const id = document.getElementById('trxId').value.trim(), tgl = document.getElementById('trxTgl').value, customer = document.getElementById('trxCust').value.trim(), sales = document.getElementById('trxSales').value, status = document.getElementById('trxStatus').value, gDisc = parseFloat(document.getElementById('trxDiscGlobal').value) || 0, items = getItems();
      if (!customer) return Swal.fire('Error', 'Nama pelanggan wajib diisi!', 'error');
      if (!sales) return Swal.fire('Error', 'Sales wajib dipilih!', 'error');
      if (!status) return Swal.fire('Error', 'Status transaksi wajib dipilih!', 'error');
      if (!items.length) return Swal.fire('Error', 'Tambahkan minimal 1 item!', 'error');
      for (let it of items) { if (!products.find(p => p.sku === it.sku)) { return Swal.fire('Error', `SKU "${it.sku}" tidak dikenal dalam database!`, 'error'); } }
      const gross = items.reduce((s,it) => s + it.harga * it.qty, 0), iDisc = items.reduce((s,it) => s + it.discRpPer * it.qty, 0), diskon = iDisc + gDisc, nett = gross - diskon;
      const trx = { id, tgl, customer, sales, gross, diskon, nett, status, items };
      allTrxList.unshift(trx);
      allTrxList.sort((a, b) => (b.tgl || '').localeCompare(a.tgl || '') || (b.id || '').localeCompare(a.id || ''));
      if (!allCustomers.includes(customer)) { allCustomers.push(customer); pelanggan = allCustomers.slice(); }
      saveLocalData();
      try { await gasCall('saveTrx', [trx]); } catch(e) { console.warn('Gagal simpan ke GAS:', e); }
      _strKData = { trx, items };
      Swal.fire({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1500, icon: 'success', title: 'Transaksi tersimpan' });
      resetTrx(); showStrukModal(); syncMasterStockToSheet();
    }

    // ========== STRUK ==========

      const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
      const logoHtml = _logoUrl ? `<img src="${_logoUrl}" style="width:48px;height:48px;border-radius:10px;object-fit:contain;background:#fff;padding:3px;flex-shrink:0;border:1.5px solid rgba(255,255,255,.4)">` : '<div style="width:48px;height:48px;border-radius:10px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">🏪</div>';

        });
      }

      let bankHtml = '';
      if (ns === 'transfer') {
        [settings.bank1, settings.bank2].forEach(bk => {
          if (!bk || !bk.nama) return;
          bankHtml += `<div style="background:#EBF4FB;border:1px solid #C5DFF0;border-radius:10px;padding:10px 14px;margin-bottom:6px"><div style="font-size:12px;font-weight:700;color:#0D2B3E;margin-bottom:4px">${esc(bk.nama)}</div>${bk.norek?`<div style="font-family:Tahoma,Arial,sans-serif;font-size:14px;font-weight:800;color:#1D6FA4;letter-spacing:.5px">${esc(bk.norek)}</div>`:''}<div style="font-size:10.5px;color:#3D6880;margin-top:2px">a.n. <b>${esc(bk.penerima||'-')}</b></div></div>`;
        });
      }
      let qrisHtml = '';
      if (ns === 'qris' && _qrisUrl) {

    function doStrukPng() { if (!_strKData) return; const off = document.getElementById('strukOffscreen'); off.style.cssText = 'position:fixed;left:-9999px;top:0;pointer-events:none;z-index:-1;background:#e8f2f9;padding:20px'; off.innerHTML = buildStrukHTML(_strKData); const el = off.querySelector('#struk-root'); if (!el) return Swal.fire('Error','Gagal render','error'); setTimeout(() => { html2canvas(el, {backgroundColor:'#e8f2f9',scale:2.5,useCORS:true,allowTaint:true,logging:false}).then(canvas => { const a = document.createElement('a'); a.download = 'Struk-'+(_strKData.trx.id||'trx')+'.png'; a.href = canvas.toDataURL('image/png'); document.body.appendChild(a); a.click(); document.body.removeChild(a); off.innerHTML = ''; Swal.fire({ toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, icon: 'success', title: 'Struk tersimpan' }); }).catch(err => { off.innerHTML=''; Swal.fire('Error',err.message,'error'); }); }, 400); }
    function doStrukWA() { if (!_strKData) return; const trx = _strKData.trx, items = _strKData.items || []; let lines = ['🧾 *STRUK TRANSAKSI*','*'+(settings.namaToko||'Tirta Kencana')+'*','━━━━━━━━━━']; lines.push('No: *'+trx.id+'*'); lines.push('Tgl: '+fmtDate(trx.tgl)); lines.push('Pelanggan: *'+(trx.customer||'-')+'*'); if (trx.sales) lines.push('Sales: '+trx.sales); lines.push('Status: *'+(trx.status==='cod'?'COD':trx.status==='transfer'?'Transfer':trx.status==='qris'?'QRIS':'Belum Transfer')+'*'); lines.push('━━━━━━━━━━'); items.forEach(it => { const nettPer = it.nettPer !== undefined ? it.nettPer : (it.harga||0) - (it.discRpPer||0); const sub = nettPer * (it.qty||1); lines.push('- '+it.nama+' ('+it.qty+'x Rp '+Number(it.harga).toLocaleString('id-ID')+')'); if (it.discRpPer) lines.push('  Disc: -Rp '+Number(it.discRpPer).toLocaleString('id-ID')); lines.push('  = Rp '+Number(sub).toLocaleString('id-ID')); }); lines.push('━━━━━━━━━━'); lines.push('Gross : Rp '+Number(trx.gross).toLocaleString('id-ID')); if (trx.diskon) lines.push('Diskon: -Rp '+Number(trx.diskon).toLocaleString('id-ID')); lines.push('*TOTAL : Rp '+Number(trx.nett).toLocaleString('id-ID')+'*'); window.open('https://wa.me/?text='+encodeURIComponent(lines.join('\n')),'_blank'); }

    function doSetoran() { 
      const tgl = document.getElementById('setorTgl').value; const sales = document.getElementById('setorSales').value; 
      if (!tgl || !sales) return Swal.fire('Error','Pilih tanggal & sales!','error'); 
      const filtered = allTrxList.filter(t => (t.tgl||'').substring(0,10) === tgl && (t.sales||'').toLowerCase().trim() === sales.toLowerCase().trim()); 
      const grand = filtered.filter(t=>t.status==='cod').reduce((s,t)=>s+(t.nett||0),0); 
      document.getElementById('setoranContent').innerHTML = 
        `<div class="card"><div class="flex-between mb-2"><div><strong>💰 Setoran: ${esc(sales)}</strong><br><span class="text-sm">${fmtDate(tgl)}</span></div><div style="font-size:1.2rem;font-weight:800;color:var(--biru)">Grand Total COD: ${fmtRp(grand)}</div></div>

        <div class="form-group"><label>🏦 Transfer</label><input type="number" id="stTransfer" value="0" min="0" oninput="calcSetoran()"></div>
        <div class="form-group"><label>💵 Cicilan</label><input type="number" id="stCicilan" value="0" min="0" oninput="calcSetoran()"></div>

        <div class="flex-row"><div class="form-group col-2"><label>Keterangan 2</label><input id="stKet2" placeholder="contoh: Lain-lain" oninput="calcSetoran()"></div><div class="form-group col-1"><label>Jumlah 2</label><input type="number" id="stJml2" value="0" min="0" oninput="calcSetoran()"></div></div>

        <div class="total-box danger"><div class="flex-between"><span>SELISIH</span><span id="stSelisih">Rp 0</span></div></div>
        <button class="btn btn-primary btn-block mt-2" onclick="saveSetoran()">💾 Simpan Setoran</button></div>`; 
      calcSetoran(); 
    }

    function calcSetoran() { const gv = id => parseFloat(document.getElementById(id)?.value)||0; const grand = gv('stGrand'); const pengeluaran = gv('stMakan')+gv('stTips')+gv('stParkir')+gv('stBensin')+gv('stFlazz')+gv('stTransfer')+gv('stJml1')+gv('stJml2'); const total = grand + gv('stTagihan') + gv('stCicilan') - pengeluaran; document.getElementById('stTotal').textContent = fmtRp(total); document.getElementById('stSelisih').textContent = fmtRp(total - gv('stSetor')); }

    async function saveSetoran() { 
      const payload = { tgl: document.getElementById('setorTgl').value, sales: document.getElementById('setorSales').value, grandTotal: parseFloat(document.getElementById('stGrand')?.value)||0, makan: parseFloat(document.getElementById('stMakan')?.value)||0, tips: parseFloat(document.getElementById('stTips')?.value)||0, parkir: parseFloat(document.getElementById('stParkir')?.value)||0, bensin: parseFloat(document.getElementById('stBensin')?.value)||0, flazz: parseFloat(document.getElementById('stFlazz')?.value)||0, transfer: parseFloat(document.getElementById('stTransfer')?.value)||0, cicilan: parseFloat(document.getElementById('stCicilan')?.value)||0, tagihan: parseFloat(document.getElementById('stTagihan')?.value)||0, ket1: document.getElementById('stKet1')?.value.trim() || '', jml1: parseFloat(document.getElementById('stJml1')?.value)||0, ket2: document.getElementById('stKet2')?.value.trim() || '', jml2: parseFloat(document.getElementById('stJml2')?.value)||0, total: parseFloat(document.getElementById('stTotal')?.textContent.replace(/[^0-9]/g,''))||0, setor: parseFloat(document.getElementById('stSetor')?.value)||0, selisih: parseFloat(document.getElementById('stSelisih')?.textContent.replace(/[^0-9]/g,''))||0 }; 
      try { await gasCall('saveSetoran', [payload]); setoranHistory.unshift(payload); saveLocalData(); _lastSetoranPayload = payload; showSetoranStrukModal(payload); } catch(e) { Swal.fire('Error',e.message,'error'); }

    async function cetakUlangStruk(id) {
      let trx = allTrxList.find(t => t.id === id);
      if (!trx) return Swal.fire('Error','Transaksi tidak ditemukan','error');
      if (!trx.items || trx.items.length === 0) {
        try {
          const detail = await gasCall('getTrxDetail', [id]);
          if (detail && Array.isArray(detail.items) && detail.items.length > 0) {
            trx.items = detail.items;
            const idx = allTrxList.findIndex(t => t.id === id);
            if (idx >= 0) allTrxList[idx] = { ...allTrxList[idx], items: detail.items };
            saveLocalData();
          }
        } catch(e) { console.warn('Gagal ambil detail dari GAS:', e); }
      }
      _strKData = { trx, items: trx.items || [] };
      showStrukModal();
    }
    async function updateTrxStatus(id, newStatus) {
      const trx = allTrxList.find(t => t.id === id);
      if (trx) {
        trx.status = newStatus;
        saveLocalData();
        try { await gasCall('updateStatus', [id, newStatus]); } catch(e) { console.warn('Gagal update status di GAS:', e); }

    function startScanner() { const video = document.getElementById('scannerVideo'); if (!video) return; if (_scanStream) { _scanStream.getTracks().forEach(t => t.stop()); _scanStream = null; } if (_scanTimer) clearInterval(_scanTimer); _scannerActive = true; navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } }).then(stream => { _scanStream = stream; video.srcObject = stream; video.setAttribute('playsinline', true); video.muted = true; video.play().catch(() => {}); const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d', { willReadFrequently: true }); _scanTimer = setInterval(() => { if (!_scannerActive || !video.videoWidth || video.readyState < 2) return; canvas.width = video.videoWidth; canvas.height = video.videoHeight; ctx.drawImage(video, 0, 0); if (typeof jsQR !== 'undefined') { const imageData = ctx.getImageData(0,0,canvas.width,canvas.height); const qr = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' }); if (qr && qr.data) onBarcodeFound(qr.data); } }, 300); }).catch(err => { document.getElementById('scannerResult').innerHTML = '<span style="color:#DC2626">❌ Kamera tidak bisa dibuka.</span>'; }); }

    function loadRekap() { let sOpts = '<option value="">Semua Sales</option>'; (settings.salesList||[]).forEach(s => { sOpts += `<option value="${esc(s)}">${esc(s)}</option>`; }); document.getElementById('contentArea').innerHTML = `<div class="card"><div class="flex-row mb-2"><div class="form-group col-1"><label>Tanggal</label><input type="date" id="rekapTgl"></div><div class="form-group col-1"><label>Sales</label><select id="rekapSales">${sOpts}</select></div><button class="btn btn-primary" onclick="doRekap()" style="height:44px;align-self:flex-end">📊 Tampilkan</button></div></div><div id="rekapContent"><div class="text-center text-sm" style="padding:40px">Pilih filter lalu klik Tampilkan</div></div>`; document.getElementById('rekapTgl').value = new Date().toISOString().slice(0,10); }
    function doRekap() { const tgl = document.getElementById('rekapTgl').value; const salesFilter = document.getElementById('rekapSales').value; if (!tgl) return Swal.fire('Error','Pilih tanggal!','error'); let filtered = allTrxList.filter(t => (t.tgl||'').substring(0,10) === tgl); if (salesFilter) filtered = filtered.filter(t => (t.sales||'').toLowerCase().trim() === salesFilter.toLowerCase().trim()); const total = filtered.reduce((s,t)=>s+(t.nett||0),0); const groups = { cod:[], transfer:[], belumtransfer:[], qris:[] }; filtered.forEach(t => { const ns = (t.status||'').toLowerCase().replace(/\s/g,''); if (groups[ns]) groups[ns].push(t); }); let h = `<div class="card"><div class="flex-between"><div><strong>📋 Rekap: ${salesFilter||'Semua'}</strong><br><span class="text-sm">${fmtDate(tgl)}</span></div><div style="font-size:1.2rem;font-weight:800;color:var(--biru)">Total: ${fmtRp(total)}</div></div></div>`; ['cod','transfer','qris','belumtransfer'].forEach(key => { const items = groups[key]||[]; const sub = items.reduce((s,t)=>s+(t.nett||0),0); h += `<div class="card"><div class="flex-between mb-2"><strong>${key==='cod'?'COD':key==='transfer'?'Transfer':key==='qris'?'QRIS':'Belum Transfer'}</strong><span style="font-weight:800;color:var(--biru)">${fmtRp(sub)}</span></div>`; if (items.length) { h += '<div class="table-wrap"><table><thead><tr><th>Customer</th><th>Nett</th></tr></thead><tbody>'; items.forEach(t => { h += `<tr><td>${esc(t.customer||'-')}</td><td style="font-family:var(--mono);font-weight:700">${fmtRp(t.nett)}</td></tr>`; }); h += '</tbody></table></div>'; } else h += '<p class="text-sm text-center">Tidak ada</p>'; h += '</div>'; }); const allItems = []; filtered.forEach(trx => { (trx.items||[]).forEach(it => { allItems.push({ customer: trx.customer, sales: trx.sales, sku: it.sku, nama: it.nama||'', qty: it.qty||0, harga: it.harga||0, disc: it.discRpPer||0, modal: it.modal||0, nettPer: it.nettPer || ((it.harga||0)-(it.discRpPer||0)) }); }); }); if (allItems.length === 0) { document.getElementById('rekapContent').innerHTML = h; return; } const salesMap = new Map(); allItems.forEach(item => { const s = item.sales || 'Tanpa Sales'; if (!salesMap.has(s)) salesMap.set(s, []); salesMap.get(s).push(item); }); salesMap.forEach((items, salesName) => { const agg = {}; items.forEach(item => { const key = `${item.customer}|${item.sku}`; if (!agg[key]) agg[key] = { customer: item.customer, sku: item.sku, totalQty: 0 }; agg[key].totalQty += item.qty; }); const rows = Object.values(agg).sort((a,b) => a.customer.localeCompare(b.customer) || a.sku.localeCompare(b.sku)); h += `<div class="card"><div class="card-title"><i class="fas fa-user"></i> Rekap Sales: ${esc(salesName)}</div>`; if (rows.length) { h += '<div class="table-wrap"><table><thead><tr><th>Customer</th><th>SKU</th><th>Qty</th></tr></thead><tbody>'; rows.forEach(r => { h += `<tr><td>${esc(r.customer)}</td><td>${esc(r.sku)}</td><td>${r.totalQty}</td></tr>`; }); h += '</tbody></table></div>'; } else h += '<p class="text-sm text-center">Tidak ada item</p>'; h += '</div>'; }); const skuMap = new Map(); allItems.forEach(item => { if (!skuMap.has(item.sku)) skuMap.set(item.sku, []); skuMap.get(item.sku).push(item); }); h += `<div class="card"><div class="card-title"><i class="fas fa-cube"></i> REKAP PER SKU</div>`; let skuContent = ''; Array.from(skuMap.keys()).sort().forEach(sku => { const items = skuMap.get(sku); const custAgg = {}; items.forEach(item => { if (!custAgg[item.customer]) custAgg[item.customer] = { customer: item.customer, qty: 0 }; custAgg[item.customer].qty += item.qty; }); const custRows = Object.values(custAgg).sort((a,b) => a.customer.localeCompare(b.customer)); const totalQty = custRows.reduce((sum,r) => sum + r.qty, 0); skuContent += `<tr><td colspan="3" style="background:var(--biru-muda);font-weight:700;font-size:0.75rem">${esc(sku)}</td></tr>`; custRows.forEach(r => { skuContent += `<tr><td></td><td>${esc(r.customer)}</td><td>${r.qty}</td></tr>`; }); skuContent += `<tr><td colspan="2" style="text-align:right;font-weight:700;">${esc(sku)} Total</td><td style="font-weight:700;">${totalQty}</td></tr>`; }); if (skuContent) h += '<div class="table-wrap"><table><thead><tr><th></th><th>Customer</th><th>Qty</th></tr></thead><tbody>' + skuContent + '</tbody></table></div>'; else h += '<p class="text-sm text-center">Tidak ada data</p>'; h += '</div>'; document.getElementById('rekapContent').innerHTML = h; }

    async function loadRekapInput() { const today = new Date().toISOString().slice(0,10); document.getElementById('contentArea').innerHTML = `<div class="card"><div class="flex-row mb-2"><div class="form-group col-1"><label>Tanggal</label><input type="date" id="rekapInputTgl" value="${today}"></div><button class="btn btn-primary" onclick="doRekapInput()" style="height:44px;align-self:flex-end">📊 Tampilkan</button></div></div><div id="rekapInputContent"><div class="text-center text-sm" style="padding:40px">Pilih tanggal lalu klik Tampilkan</div></div>`; await syncStockHistoryFromGAS(); doRekapInput(); }

    function hitungRekapLokal(list) { const driverMap = {}; list.forEach(entry => { const driver = entry.driver || '', rit = entry.rit || '', status = (entry.status||'').toLowerCase(), sku = entry.sku || '', qty = entry.qty || 0, hargaModal = entry.hargaModal || 0, disc = entry.disc || 0, netModalPerItem = hargaModal - disc, totalRp = qty * netModalPerItem; if (!driver || !rit || !sku || qty === 0) return; if (!driverMap[driver]) driverMap[driver] = {}; if (!driverMap[driver][rit]) driverMap[driver][rit] = { totalRp: 0, kiriman: { totalRp: 0, items: {} }, titipan: { totalRp: 0, items: {} } }; driverMap[driver][rit].totalRp += totalRp; if (status === 'kiriman') { driverMap[driver][rit].kiriman.totalRp += totalRp; driverMap[driver][rit].kiriman.items[sku] = (driverMap[driver][rit].kiriman.items[sku]||0) + qty; } else if (status === 'titipan') { driverMap[driver][rit].titipan.totalRp += totalRp; driverMap[driver][rit].titipan.items[sku] = (driverMap[driver][rit].titipan.items[sku]||0) + qty; } }); const rekap = [], kiriman = [], titipan = [], kirimanQty = [], titipanQty = []; for (const d in driverMap) { for (const r in driverMap[d]) { const entry = driverMap[d][r]; rekap.push({ driver: d, rit: r, total: entry.totalRp }); if (entry.kiriman.totalRp > 0) { kiriman.push({ driver: d, rit: r, total: entry.kiriman.totalRp }); for (const sku in entry.kiriman.items) kirimanQty.push({ driver: d, rit: r, sku, qty: entry.kiriman.items[sku] }); } if (entry.titipan.totalRp > 0) { titipan.push({ driver: d, rit: r, total: entry.titipan.totalRp }); for (const sku in entry.titipan.items) titipanQty.push({ driver: d, rit: r, sku, qty: entry.titipan.items[sku] }); } } } const sum = arr => arr.reduce((s,x)=>s+x.total,0); return { rekap, grandRekap: sum(rekap), kiriman, grandKiriman: sum(kiriman), titipan, grandTitipan: sum(titipan), kirimanQty, titipanQty }; }

    let _currentEditStockId = null;
    function openEditStockModal(id) {
      const entry = stockInHistory.find(s => s.id === id);
      if (!entry) return Swal.fire('Error','Data tidak ditemukan','error');
      _currentEditStockId = id;
      document.getElementById('editStockId').value = id;
      document.getElementById('editStockQty').value = entry.qty;
      document.getElementById('editStockStatus').value = entry.status;
      document.getElementById('editStockModal').classList.add('show');
    }
    function closeEditStockModal() {
      document.getElementById('editStockModal').classList.remove('show');
      _currentEditStockId = null;
    }
    async function saveEditStock() {
      const id = document.getElementById('editStockId').value;
      const newQty = parseInt(document.getElementById('editStockQty').value);
      const newStatus = document.getElementById('editStockStatus').value;
      if (isNaN(newQty) || newQty <= 0) return Swal.fire('Error','Qty harus lebih dari 0','error');
      const idx = stockInHistory.findIndex(s => s.id === id);
      if (idx === -1) return Swal.fire('Error','Data tidak ditemukan','error');
      stockInHistory[idx].qty = newQty;
      stockInHistory[idx].status = newStatus;
      saveLocalData();
      try { await gasCall('updateInputBarang', [{ id, qty: newQty, status: newStatus }]); } catch(e) { console.warn('Gagal update di GAS', e); }
      closeEditStockModal();
      Swal.fire({ toast:true, position:'top-end', showConfirmButton:false, timer:1500, icon:'success', title:'Data diperbarui' });
      const tgl = document.getElementById('rekapInputTgl')?.value;
      if (tgl) doRekapInput(); else loadRekapInput();
    }
    async function deleteStockEntry(id) {
      const confirm = await Swal.fire({ title:'Hapus?', text:'Hapus input barang ini?', icon:'warning', showCancelButton:true });
      if (confirm.isConfirmed) {
        stockInHistory = stockInHistory.filter(s => s.id !== id);
        saveLocalData();
        try { await gasCall('deleteInputBarang', [id]); } catch(e) { console.warn('Gagal hapus di GAS', e); }
        Swal.fire({ toast:true, position:'top-end', showConfirmButton:false, timer:1500, icon:'success', title:'Data dihapus' });
        const tgl = document.getElementById('rekapInputTgl')?.value;
        if (tgl) doRekapInput(); else loadRekapInput();
      }
    }

      document.getElementById('contentArea').innerHTML =

    }

    function addItemInputRow(skuVal) { let pOpts = '<option value="">-- pilih --</option>'; products.forEach(p => { pOpts += `<option value="${p.sku}">${p.sku} - ${p.nama}</option>`; }); const div = document.createElement('div'); div.className = 'cart-item-row'; div.innerHTML = `<select class="cart-item-select" style="flex:2;min-width:100px" onchange="isiModalInputRow(this)">${pOpts}</select><input class="cart-qty" type="number" min="1" value="1" style="width:50px" oninput="recalcInputTotals()"><input class="cart-disc" type="number" min="0" value="0" placeholder="Harga Modal" readonly style="width:70px;background:var(--biru-muda)"><input class="cart-disc" type="number" min="0" value="0" placeholder="Disc" style="width:55px" oninput="recalcInputTotals()"><button class="btn btn-danger btn-sm" onclick="this.parentElement.remove();recalcInputTotals()">✕</button>`; document.getElementById('inputItemsContainer').appendChild(div); if (skuVal) { const sel = div.querySelector('select'); sel.value = skuVal; isiModalInputRow(sel); } recalcInputTotals(); }
    function isiModalInputRow(sel) { const sku = sel.value; const p = products.find(x => x.sku === sku); const row = sel.closest('.cart-item-row'); if (!row) return; const inputs = row.querySelectorAll('input'); inputs[1].value = p ? (p.modal || 0) : 0; recalcInputTotals(); }
    function recalcInputTotals() { const rows = document.querySelectorAll('#inputItemsContainer .cart-item-row'); let tq=0,gm=0,td=0; rows.forEach(row => { const inputs = row.querySelectorAll('input'); const q = parseInt(inputs[0].value)||0, h = parseFloat(inputs[1].value)||0, d = parseFloat(inputs[2].value)||0; tq+=q; gm+=q*h; td+=q*d; }); document.getElementById('inpTotalQty').textContent=tq; document.getElementById('inpGrossModal').textContent=fmtRp(gm); document.getElementById('inpTotalDisc').textContent=fmtRp(td); document.getElementById('inpNetModal').textContent=fmtRp(gm-td); }
    function getInputItems() { const rows = document.querySelectorAll('#inputItemsContainer .cart-item-row'); const items = []; rows.forEach(row => { const sel = row.querySelector('select'); const inputs = row.querySelectorAll('input'); const sku = sel.value; const p = products.find(x => x.sku === sku); if (!sku || !p) return; const qty = parseInt(inputs[0].value)||0, hargaModal = parseFloat(inputs[1].value)||0, disc = parseFloat(inputs[2].value)||0; if (qty > 0) items.push({ sku, nama: p.nama, qty, hargaModal, disc, netModal: (hargaModal - disc) * qty }); }); return items; }
    async function saveStockIn() { 
      const inpId = document.getElementById('inpId').value.trim(), driver = document.getElementById('inpDriver').value, rit = document.getElementById('inpRit').value.trim(), status = document.getElementById('inpStatus').value; 
      if (!driver) return Swal.fire('Error','Driver wajib dipilih!','error');
      if (!rit) return Swal.fire('Error','Rit wajib diisi!','error');
      if (!status) return Swal.fire('Error','Status wajib dipilih!','error');
      const itemRows = document.querySelectorAll('#inputItemsContainer .cart-item-row');
      for (let row of itemRows) {
        const sel = row.querySelector('select');
        if (!sel || !sel.value) return Swal.fire('Error','Semua item harus dipilih produknya (SKU)!','error');
      }
      const items = getInputItems(); 
      if (!items.length) return Swal.fire('Error','Minimal satu item harus diisi','error'); 
      const now = new Date(), date = now.toISOString().slice(0,10), createdAt = now.toISOString().slice(0,19).replace('T',' '); 
      const entries = items.map((it, idx) => ({ id: inpId + '-' + (idx+1), groupId: inpId, sku: it.sku, nama: it.nama, qty: it.qty, hargaModal: it.hargaModal, disc: it.disc, netModal: it.netModal, driver, rit, status, date, createdAt })); 
      entries.forEach(e => stockInHistory.unshift(e)); 
      saveLocalData(); 
      try { for (const e of entries) await gasCall('saveInputBarang', [e]); } catch(e) { console.warn('Gagal simpan ke GAS:', e); } 
      Swal.fire({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1500, icon: 'success', title: 'Barang masuk dicatat' }); 
      loadInputBarang(); syncMasterStockToSheet(); 
    }

    function renderStockHistory() { const el = document.getElementById('stkHistory'); if (!el) return; if (!stockInHistory.length) { el.innerHTML = '<p class="text-sm text-center">Memuat data...</p>'; return; } el.innerHTML = `<div class="table-wrap"><table><thead><tr><th>ID</th><th>Tanggal</th><th>SKU</th><th>Nama</th><th>Qty</th><th>Harga Modal</th><th>Disc</th><th>Net Modal</th><th>Driver</th><th>Rit</th><th>Status</th><th>CreatedAt</th><th>Aksi</th></tr></thead><tbody>${stockInHistory.slice(0,30).map(s => { const netModal = (s.hargaModal - (s.disc||0)) * s.qty; return `<tr><td style="font-family:var(--mono);font-size:10px">${esc(s.id)}</td><td>${s.createdAt ? new Date(s.createdAt).toLocaleString('id-ID') : (s.date||s.tgl||'')}</td><td style="font-family:var(--mono);font-size:11px">${esc(s.sku)}</td><td>${esc(s.nama||'')}</td><td>${s.qty}</td><td>${fmtRp(s.hargaModal)}</td><td>${fmtRp(s.disc||0)}</td><td style="font-weight:700;color:var(--biru)">${fmtRp(netModal)}</td><td>${esc(s.driver||'-')}</td><td>${esc(s.rit||'-')}</td><td><span class="status-badge status-${s.status}">${s.status}</span></td><td>${s.createdAt ? s.createdAt.substring(0,19).replace('T',' ') : (s.date||'')}</td><td style="display:flex;gap:4px"><button class="btn btn-sm btn-outline" onclick="openEditStockModal('${s.id}')">✏️</button><button class="btn btn-sm btn-danger" onclick="deleteStockEntry('${s.id}')">🗑</button></td></tr>`; }).join('')}</tbody></table></div>`; }
    async function syncStockHistoryFromGAS() { try { const data = await gasCall('getInputBarangHistory', []); if (Array.isArray(data) && data.length > 0) { stockInHistory = data; saveLocalData(); if (document.getElementById('stkHistory')) renderStockHistory(); } } catch(e) { console.warn('Gagal ambil riwayat input barang:', e); } }

          <div class="flex-row mb-2" style="flex-wrap:wrap;gap:6px">

      `;
      loadGudangByDate();

    let _gudangTab = 'stock';
    function switchGudangTab(tab) {
      _gudangTab = tab;
      ['stock','masuk','keluar'].forEach(t => {
        const el = document.getElementById('gudangTab' + t.charAt(0).toUpperCase() + t.slice(1));
        if (el) el.classList.toggle('active', t === tab);
      });
      loadGudangByDate();
    }

    function loadGudangByDate() {
      try {
        const tgl = document.getElementById('gudangTgl')?.value || new Date().toISOString().slice(0,10);
        document.getElementById('gudangContent').innerHTML = '<div class="loading">Menghitung stok...</div>';

        const tab = typeof _gudangTab !== 'undefined' ? _gudangTab : 'stock';

        if (tab === 'stock') {
          const stockData = hitungMasterStockByDate(tgl);
          masterStockHistory[tgl] = stockData;
          saveLocalData();
          renderMasterStockFromData(stockData, tgl);
        } else if (tab === 'masuk') {
          renderRekapMasukHarian(tgl);
        } else if (tab === 'keluar') {
          renderRekapKeluarHarian(tgl);
        }
      } catch (e) {
        document.getElementById('gudangContent').innerHTML = 
          `<div class="card"><p class="text-center text-sm" style="color:var(--merah)">Gagal: ${esc(e.message)}</p></div>`;
      }
    }

    function renderRekapMasukHarian(date) {
      const filtered = (stockInHistory||[]).filter(s => (s.date||s.tgl||'').toString().substring(0,10) === date);
      if (!filtered.length) {
        document.getElementById('gudangContent').innerHTML = '<div class="card"><p class="text-center text-sm" style="padding:30px">Tidak ada data barang masuk untuk tanggal ini.</p></div>';
        return;
      }
      const skuMap = {};
      filtered.forEach(s => {
        if (!skuMap[s.sku]) skuMap[s.sku] = { sku:s.sku, nama:s.nama||s.sku, qty:0, detail:[] };
        skuMap[s.sku].qty += (Number(s.qty)||0);
        skuMap[s.sku].detail.push(s);
      });
      let rows = '';
      Object.values(skuMap).forEach(r => {
        rows += `<tr><td style="font-family:var(--mono);font-size:11px">${esc(r.sku)}</td><td>${esc(r.nama)}</td><td style="text-align:center;font-weight:700;color:var(--hijau)">${r.qty}</td></tr>`;
      });
      let detRows = filtered.map(s => `<tr>
        <td style="font-size:10px;font-family:var(--mono)">${esc(s.id||'')}</td>
        <td style="font-family:var(--mono);font-size:11px">${esc(s.sku)}</td>
        <td>${esc(s.nama||'')}</td>
        <td style="text-align:center;color:var(--hijau);font-weight:700">${s.qty||0}</td>
        <td>${esc(s.driver||'-')}</td>
        <td>${esc(s.rit||'-')}</td>
        <td><span class="status-badge status-${s.status}">${s.status}</span></td>
      </tr>`).join('');
      document.getElementById('gudangContent').innerHTML = `
        <div class="card">
          <div class="card-title"><i class="fas fa-arrow-down" style="color:var(--hijau)"></i> Rekap Masuk: ${fmtDate(date)}</div>
          <div class="table-wrap"><table><thead><tr><th>SKU</th><th>Nama</th><th>Total Qty</th></tr></thead><tbody>${rows}</tbody></tr></div>
        </div>
        <div class="card">
          <div class="card-title"><i class="fas fa-list"></i> Detail Barang Masuk: ${fmtDate(date)}</div>
          <div class="table-wrap"><table><thead><tr><th>ID</th><th>SKU</th><th>Nama</th><th>Qty</th><th>Driver</th><th>Rit</th><th>Status</th></tr></thead><tbody>${detRows}</tbody></table></div>
        </div>`;
    }

    function renderRekapKeluarHarian(date) {
      const filtered = (allTrxList||[]).filter(t => (t.tgl||'').toString().substring(0,10) === date);
      if (!filtered.length) {
        document.getElementById('gudangContent').innerHTML = '<div class="card"><p class="text-center text-sm" style="padding:30px">Tidak ada transaksi penjualan untuk tanggal ini.</p></div>';
        return;
      }
      const skuMap = {};
      filtered.forEach(trx => {
        (trx.items||[]).forEach(it => {
          if (!skuMap[it.sku]) skuMap[it.sku] = { sku:it.sku, nama:it.nama||it.sku, qty:0 };
          skuMap[it.sku].qty += (Number(it.qty)||0);
        });
      });
      let rows = '';
      Object.values(skuMap).forEach(r => {
        rows += `<tr><td style="font-family:var(--mono);font-size:11px">${esc(r.sku)}</td><td>${esc(r.nama)}</td><td style="text-align:center;font-weight:700;color:var(--merah)">${r.qty}</td></tr>`;
      });
      let detRows = filtered.map(trx => `<tr>
        <td style="font-size:10px;font-family:var(--mono)">${esc(trx.id||'')}</td>
        <td>${esc(trx.customer||'-')}</td>
        <td>${esc(trx.sales||'-')}</td>
        <td style="font-family:var(--mono);text-align:right">${fmtRp(trx.nett||0)}</td>
        <td><span class="status-badge status-${trx.status}">${trx.status}</span></td>
        <td style="font-size:10px">${(trx.items||[]).map(i=>i.sku+'×'+i.qty).join(', ')}</td>
      <tr>`).join('');
      document.getElementById('gudangContent').innerHTML = `
        <div class="card">
          <div class="card-title"><i class="fas fa-arrow-up" style="color:var(--merah)"></i> Rekap Keluar (Terjual): ${fmtDate(date)}</div>
          <div class="table-wrap"><table><thead><tr><th>SKU</th><th>Nama</th><th>Total Qty</th></tr></thead><tbody>${rows}</tbody></table></div>
        </div>
        <div class="card">
          <div class="card-title"><i class="fas fa-receipt"></i> Detail Transaksi: ${fmtDate(date)}</div>

    function updateStokAwal(sku, date, val) {}
    function simpanStokAwal(date) {
      const rows = document.querySelectorAll('#gudangContent table tbody tr');
      if (!rows.length) return;
      rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        if (cells.length < 6) return;
        const sku = cells[0].textContent.trim();
        const input = cells[2].querySelector('input');
        if (!input) return;
        const newAwal = parseInt(input.value) || 0;
        const p = products.find(x => x.sku === sku);
        if (p) p.stokAwal = newAwal;
      });
      saveLocalData();
      const stock = hitungMasterStockByDate(date);
      masterStockHistory[date] = stock;
      saveLocalData();
      try { gasCall('saveMasterStock', [{ date, stock }]); } catch(e) {}
      try { gasCall('saveProducts', [products]); } catch(e) {}
      Swal.fire({ toast:true, position:'top-end', showConfirmButton:false, timer:2000, icon:'success', title:'Stok awal disimpan!' });
      loadGudangByDate();
    }

    function hitungMasterStockByDate(date) {
      const map = new Map();
      (products || []).forEach(p => {
        map.set(p.sku, {
          sku: p.sku,
          nama: p.nama,
          stokAwal: Number(p.stokAwal) || 0,
          masuk: 0,
          keluar: 0
        });
      });
      const yesterday = getYesterdayDate(date);
      const prevStock = masterStockHistory[yesterday];
      if (prevStock && Array.isArray(prevStock)) {
        prevStock.forEach(item => {
          const cur = map.get(item.sku);
          if (cur) cur.stokAwal = Number(item.stokAkhir) || 0;
        });
      }
      (stockInHistory || []).forEach(s => {
        const tgl = (s.date || s.tgl || '').toString().substring(0,10);
        if (tgl === date && s.status === 'kiriman') {
          const cur = map.get(s.sku);
          if (cur) cur.masuk += (Number(s.qty) || 0);
        }
      });
      (allTrxList || []).forEach(trx => {
        const tgl = (trx.tgl || '').toString().substring(0,10);
        if (tgl === date && trx.items && Array.isArray(trx.items)) {
          trx.items.forEach(item => {
            const cur = map.get(item.sku);
            if (cur) cur.keluar += (Number(item.qty) || 0);
          });
        }
      });
      const result = [];
      map.forEach(val => {
        result.push({
          sku: val.sku,
          nama: val.nama,
          stokAwal: val.stokAwal,
          masuk: val.masuk,
          keluar: val.keluar,
          stokAkhir: val.stokAwal + val.masuk - val.keluar
        });
      });
      return result;
    }

    function getYesterdayDate(dateStr) {
      const d = new Date(dateStr);
      d.setDate(d.getDate() - 1);
      return d.toISOString().slice(0,10);
    }

      }
    }

    function removeSalesName(i) { settings.salesList.splice(i,1); renderSalesTags(); }
    function renderDriverTags() { const el = document.getElementById('driverTagList'); if (!el) return; el.innerHTML = drivers.length ? drivers.map((d,i) => `<span class="tag">${esc(d)} <button class="tag-remove" onclick="removeDriver(${i})">✕</button></span>`).join('') : '<span style="color:var(--text3);font-size:13px">Belum ada driver</span>'; }
    function addDriverName() { const v = document.getElementById('newDriverName').value.trim(); if (!v) return; if (!drivers.includes(v)) drivers.push(v); document.getElementById('newDriverName').value = ''; renderDriverTags(); }
    function removeDriver(i) { drivers.splice(i,1); renderDriverTags(); }
    function renderUserList() { const el = document.getElementById('userList'); if (!el) return; el.innerHTML = allUsers.length ? allUsers.map((u,i) => `<div class="flex-between mb-1" style="padding:4px 0;border-bottom:1px solid var(--border)"><span><b>${esc(u.name)}</b> (${u.role})</span><button class="btn btn-sm btn-danger" onclick="deleteUser(${i})">🗑</button></div>`).join('') : '<p class="text-sm text-center">Belum ada user</p>'; }
    function addUser() { const name = document.getElementById('newUserName').value.trim(), role = document.getElementById('newUserRole').value, pass = document.getElementById('newUserPass').value.trim(); if (!name || !pass) return Swal.fire('Error','Nama dan password wajib diisi','error'); if (allUsers.find(u => u.name === name)) return Swal.fire('Error','Nama sudah ada','error'); allUsers.push({ name, role, password: pass }); saveLocalData(); try { gasCall('saveUser', [{ name, role, password: pass }]); } catch(e) {} document.getElementById('newUserName').value = ''; document.getElementById('newUserPass').value = ''; renderUserList(); Swal.fire({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1500, icon: 'success', title: 'User ditambahkan' }); }
    function deleteUser(i) { Swal.fire({ title:'Hapus user?', text:'Hapus '+allUsers[i].name+'?', icon:'warning', showCancelButton:true }).then(r => { if (r.isConfirmed) { allUsers.splice(i,1); saveLocalData(); renderUserList(); try { gasCall('deleteUser', [allUsers[i].name]); } catch(e) {} Swal.fire({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1500, icon: 'success', title: 'User dihapus' }); } }); }
    function savePengaturan() { settings.namaToko = document.getElementById('setNamaToko').value.trim(); settings.tagline = document.getElementById('setTagline').value.trim(); settings.alamat = document.getElementById('setAlamat').value.trim(); settings.telepon = document.getElementById('setTelepon').value.trim(); settings.bottomLine = document.getElementById('setFooter').value.trim(); settings.bank1 = { nama: document.getElementById('setB1Nama').value.trim(), norek: document.getElementById('setB1Norek').value.trim(), penerima: document.getElementById('setB1Penerima').value.trim() }; settings.bank2 = { nama: document.getElementById('setB2Nama').value.trim(), norek: document.getElementById('setB2Norek').value.trim(), penerima: document.getElementById('setB2Penerima').value.trim() }; document.getElementById('headerAlamat').textContent = settings.alamat; saveLocalData(); Swal.fire({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1500, icon: 'success', title: 'Pengaturan disimpan' }); }
    function backupData() { saveLocalData(); const blob = new Blob([localStorage.getItem('tirtaFullData')], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'tirta-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); }
    function restoreData() { Swal.fire({ title:'Restore Data', text:'Pilih file backup JSON', icon:'warning', showCancelButton:true }).then(r => { if (r.isConfirmed) { const input = document.createElement('input'); input.type='file'; input.accept='.json'; input.onchange = e => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = ev => { try { const data = JSON.parse(ev.target.result); localStorage.setItem('tirtaFullData', JSON.stringify(data)); loadLocalData(); Swal.fire('Sukses','Data direstore! Refresh halaman.','success'); } catch(err) { Swal.fire('Error','File tidak valid','error'); } }; reader.readAsText(file); }; input.click(); } }); }

    // ========== LAPORAN SKU ==========
    function loadLaporan() {
      const today = new Date().toISOString().slice(0,10);
      document.getElementById('contentArea').innerHTML = `
        <div class="card">
          <div class="card-title"><i class="fas fa-chart-line"></i> Laporan SKU Masuk & Keluar</div>
          <div class="flex-row mb-2">
            <div class="form-group col-1"><label>Tanggal</label><input type="date" id="laporanTgl" value="${today}"></div>
            <button class="btn btn-primary" onclick="doLaporan()" style="height:44px;align-self:flex-end">📊 Tampilkan</button>
          </div>
          <div style="font-size:11px;color:var(--text3)">💡 Default hari ini. Pilih tanggal lain untuk trace data.</div>
        </div>
        <div id="laporanContent"><div class="text-center text-sm" style="padding:30px">Memuat laporan hari ini...</div></div>
      `;
      setTimeout(doLaporan, 100);
    }

    function doLaporan() {
      const tgl = document.getElementById('laporanTgl')?.value || new Date().toISOString().slice(0,10);
      const container = document.getElementById('laporanContent');
      if (!container) return;
      const masukMap = {};
      (stockInHistory||[]).forEach(s => {
        const d = (s.date||s.tgl||'').toString().substring(0,10);
        if (d !== tgl) return;
        const key = s.sku;
        if (!masukMap[key]) masukMap[key] = { sku: s.sku, nama: s.nama||s.sku, qty: 0, detail: [] };
        masukMap[key].qty += (Number(s.qty)||0);
        masukMap[key].detail.push(s);
      });
      const keluarMap = {};
      (allTrxList||[]).forEach(trx => {
        const d = (trx.tgl||'').toString().substring(0,10);
        if (d !== tgl) return;
        (trx.items||[]).forEach(it => {
          const key = it.sku;
          if (!keluarMap[key]) keluarMap[key] = { sku: key, nama: it.nama||key, qty: 0 };
          keluarMap[key].qty += (Number(it.qty)||0);
        });
      });
      const allSku = new Set([...Object.keys(masukMap), ...Object.keys(keluarMap)]);
      products.forEach(p => allSku.add(p.sku));
      let rows = '';
      Array.from(allSku).sort().forEach(sku => {
        const masuk = masukMap[sku]?.qty || 0;
        const keluar = keluarMap[sku]?.qty || 0;
        const p = products.find(x => x.sku === sku);
        const nama = masukMap[sku]?.nama || keluarMap[sku]?.nama || p?.nama || sku;
        if (masuk === 0 && keluar === 0) return;
        rows += `<tr>
          <td style="font-family:var(--mono);font-size:11px;font-weight:600">${esc(sku)}</td>
          <td>${esc(nama)}</td>
          <td style="text-align:center;color:var(--hijau);font-weight:700">${masuk}</td>
          <td style="text-align:center;color:var(--merah);font-weight:700">${keluar}</td>
          <td style="text-align:center;font-weight:800;color:var(--biru)">${masuk - keluar}</td>
        </table>`;
      });
      container.innerHTML = `
        <div class="card">
          <div class="card-title"><i class="fas fa-table"></i> Ringkasan SKU — ${fmtDate(tgl)}</div>
          ${!rows ? '<p class="text-center text-sm" style="padding:20px">Tidak ada transaksi pada tanggal ini</p>' : `
          <div class="table-wrap">
            </table>
              <thead><tr><th>SKU</th><th>Nama Produk</th><th>Masuk</th><th>Keluar</th><th>Saldo</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`}
        </div>
      `;
    }

    // ========== PENGATURAN USER (Sales & Driver) ==========
    function loadPengaturanUser() {
      const role = currentUser?.role;
      const gasUrl = localStorage.getItem('tirtaGasUrl') || DEFAULT_GAS_URL;
      document.getElementById('contentArea').innerHTML = `
        <div class="card">
          <div class="card-title"><i class="fas fa-cog"></i> Pengaturan ${role === 'sales' ? 'Sales' : 'Driver'}</div>
          <div class="section-title">🔗 Google Apps Script URL</div>
          <div class="form-group">
            <label>URL GAS (untuk sinkronisasi data)</label>
            <input id="userGasUrl" value="${esc(gasUrl)}" placeholder="https://script.google.com/macros/s/..." style="font-size:0.65rem">
          </div>
          <div class="flex-row mb-2">
            <button class="btn btn-primary" style="flex:1" onclick="saveUserGasUrl()"><i class="fas fa-link"></i> Simpan URL</button>
            <button class="btn btn-outline btn-sm" onclick="testUserGasConnection()"><i class="fas fa-plug"></i> Test</button>
          </div>
          <div class="section-title">💾 Backup & Restore Data Lokal</div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:8px">Backup untuk cadangan data di perangkat ini.</div>
          <div class="flex-row">
            <button class="btn btn-warning" style="flex:1" onclick="backupData()"><i class="fas fa-download"></i> Backup</button>
            <button class="btn btn-danger" style="flex:1" onclick="restoreData()"><i class="fas fa-upload"></i> Restore</button>
          </div>
        </div>
      `;
    }

    function saveUserGasUrl() {
      const v = document.getElementById('userGasUrl')?.value.trim();
      if (!v || !v.startsWith('https://')) return Swal.fire('Error','URL tidak valid!','error');
      localStorage.setItem('tirtaGasUrl', v);
      GAS_URL = v;
      Swal.fire({ toast:true, position:'top-end', showConfirmButton:false, timer:2000, icon:'success', title:'URL GAS disimpan!' });
    }

    async function testUserGasConnection() {
      Swal.fire({ title:'Testing...', text:'Menghubungi GAS server...', allowOutsideClick:false, didOpen:()=>Swal.showLoading() });
      try {
        await gasCall('getSettings', []);
        Swal.fire({ icon:'success', title:'Koneksi OK!', text:'GAS server berhasil dihubungi.' });
      } catch(e) {
        Swal.fire({ icon:'error', title:'Gagal!', text:'Tidak bisa terhubung ke GAS. Cek URL.' });
      }
    }

    // ========== HELPERS ==========
    function fmtRp(n) { return 'Rp\u00a0' + Number(n||0).toLocaleString('id-ID'); }
    function fmtDate(s) { if (!s) return '-'; const p = String(s).substring(0,10).split('-'); if (p.length<3) return s; const m=['','Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des']; return p[2]+' '+m[parseInt(p[1])]+' '+p[0]; }
    function genId() { const d = new Date(), pp = n => String(n).padStart(2,'0'); return 'TRX-'+d.getFullYear()+pp(d.getMonth()+1)+pp(d.getDate())+'-'+Math.random().toString(36).slice(2,6).toUpperCase(); }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // PWA
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBtn').style.display = 'block'; });
    function installApp() { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(r => { if (r.outcome === 'accepted') console.log('Installed'); deferredPrompt = null; document.getElementById('installBtn').style.display = 'none'; }); } else { Swal.fire('Info','Klik menu browser > Add to Home Screen','info'); } }
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { const swCode = `const CACHE_NAME='tirta-v2';self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE_NAME).then(c=>c.addAll(['/'])))});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))});`; const blob = new Blob([swCode], {type:'application/javascript'}); navigator.serviceWorker.register(URL.createObjectURL(blob)); }); }

    loadLocalData();
    if (!allUsers || allUsers.length === 0) {
      allUsers = [
      { name:'admin',  role:'admin',  password:'020730' },
      { name:'hasan',  role:'sales',  password:'1234'   },
      { name:'ujang',  role:'sales',  password:'1234'   },
      { name:'oji',    role:'driver', password:'1234'   },
      { name:'padong', role:'driver', password:'1234'   },
      { name:'said',   role:'driver', password:'1234'   },
      { name:'dedi',   role:'driver', password:'1234'   },
      { name:'zehpudin', role:'driver', password:'1234' }
    ];
      saveLocalData();
    }
    const savedUser = localStorage.getItem('tirtaUser');
    if (savedUser) { try { currentUser = JSON.parse(savedUser); showMainApp(); } catch(e) { localStorage.removeItem('tirtaUser'); } }
  </script>
