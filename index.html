  <style>
    :root{--biru:#0A4D8C;--kuning:#F4B400;--biru-muda:#E6F0FA;--kuning-muda:#FFF8E1;--bg:#F1F5F9;--card:#FFFFFF;--border:#E2E8F0;--shadow:0 2px 12px rgba(0,0,0,0.06);--radius:16px;--text:#1E293B;--merah:#EF4444;--hijau:#10B981;--text-secondary:#64748B;--input-bg:#FFFFFF;}
    body.dark{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#E2E8F0;--text-secondary:#94A3B8;--input-bg:#334155;--biru-muda:#1E3A5F;--kuning-muda:#3D2E00;--shadow:0 2px 12px rgba(0,0,0,0.3);}
    body.dark input,body.dark select,body.dark textarea{background:var(--input-bg);color:var(--text);border-color:var(--border);}
    body.dark .card{background:var(--card);}body.dark th{background:var(--biru-muda);}
    body.dark .bottom-bar{background:#1E293B;}body.dark .nav-bar{background:#1E293B;}
    body.dark .menu-tabs{background:var(--card);}body.dark .tab{background:var(--card);color:var(--text-secondary);}
    body.dark .tab.active{background:var(--biru);color:white;}body.dark input[readonly]{background:#1E3A5F;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:8px;color:var(--text);transition:background 0.3s,color 0.3s;}
    .app-container{max-width:500px;width:100%;background:var(--card);border-radius:24px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;min-height:95vh;transition:background 0.3s;}
    @media(min-width:768px){.app-container{max-width:720px;}}@media(min-width:1024px){.app-container{max-width:1000px;}}
    @media(max-width:480px){body{padding:4px;}.app-container{border-radius:16px;}.header{padding:14px 16px 10px;}.brand{font-size:1.5rem;}.tab{font-size:0.65rem;padding:6px 10px;}input,select,textarea{font-size:0.75rem;padding:8px 10px;}.btn{font-size:0.75rem;padding:8px 12px;}table{font-size:0.65rem;}th,td{padding:4px 5px;}.card{padding:12px;}.card-title{font-size:0.8rem;}.form-group label{font-size:0.65rem;}.total-box{font-size:0.9rem;}}
    @media(max-width:480px){.cart-item-sku{min-width:110px!important;font-size:0.7rem!important;}.cart-item-select{font-size:0.7rem!important;padding:6px 4px!important;}.cart-qty{width:50px!important;}.cart-disc{width:55px!important;}.cart-item-row{gap:4px!important;flex-wrap:wrap!important;}.cart-item-row select{flex:2 1 120px!important;}}
    .header{background:linear-gradient(135deg,#0A4D8C 0%,#0B5FA5 100%);color:white;padding:18px 20px 14px;text-align:center;}
    .brand{font-size:1.9rem;font-weight:800;display:flex;justify-content:center;gap:6px;}.tirta{color:#fff;}.kencana{color:var(--kuning);}
    .tagline{font-size:0.7rem;opacity:0.9;letter-spacing:0.5px;margin:4px 0;}.alamat{font-size:0.65rem;opacity:0.8;}
    .logo-header{width:48px;height:48px;background:white;border-radius:50%;margin:8px auto 0;overflow:hidden;border:2px solid var(--kuning);display:flex;align-items:center;justify-content:center;cursor:pointer;}
    .logo-header img{width:100%;height:100%;object-fit:contain;}
    .nav-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#F8FAFC;border-bottom:1px solid var(--border);}
    .user-info{display:flex;align-items:center;gap:8px;}.avatar{width:32px;height:32px;border-radius:50%;background:var(--biru);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;}
    .role-tag{background:var(--kuning);color:#0A2540;padding:3px 10px;border-radius:20px;font-size:0.6rem;font-weight:700;text-transform:uppercase;}
    .btn-logout{background:var(--merah);color:white;border:none;padding:6px 14px;border-radius:8px;font-size:0.7rem;cursor:pointer;font-weight:600;}
    .btn-refresh{background:var(--hijau);color:white;border:none;padding:6px 10px;border-radius:8px;font-size:0.65rem;cursor:pointer;font-weight:600;margin-left:4px;}
    .btn-darkmode{background:#6366F1;color:white;border:none;padding:6px 10px;border-radius:8px;font-size:0.65rem;cursor:pointer;font-weight:600;}
    .btn-install{background:#8B5CF6;color:white;border:none;padding:6px 10px;border-radius:8px;font-size:0.65rem;cursor:pointer;font-weight:600;display:none;}
    .menu-tabs{display:flex;overflow-x:auto;gap:4px;padding:8px 10px;background:var(--card);border-bottom:1px solid var(--border);}
    .menu-tabs::-webkit-scrollbar{height:0;}.tab{flex:0 0 auto;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);font-size:0.7rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:0.2s;color:var(--text-secondary);display:flex;align-items:center;gap:4px;}
    .tab i{font-size:0.8rem;}.tab.active{background:var(--biru);color:white;border-color:var(--biru);}
    .content-area{flex:1;padding:12px;overflow-y:auto;max-height:calc(100vh - 280px);}
    .card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:10px;border:1px solid var(--border);}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
    .card-title{font-weight:700;font-size:0.9rem;color:var(--biru);display:flex;align-items:center;gap:6px;}.card-title i{color:var(--kuning);}
    .form-group{margin-bottom:8px;}.form-group label{display:block;font-size:0.7rem;font-weight:600;color:var(--text-secondary);margin-bottom:3px;}
    input,select,textarea{width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--border);font-size:0.8rem;outline:none;background:var(--input-bg);color:var(--text);}
    input:focus,select:focus{border-color:var(--biru);box-shadow:0 0 0 3px rgba(10,77,140,0.1);}input[readonly]{background:var(--biru-muda);font-weight:600;}
    .btn{padding:10px 16px;border-radius:12px;border:none;font-size:0.8rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:0.2s;}
    .btn-primary{background:var(--biru);color:white;}.btn-warning{background:var(--kuning);color:#0A2540;}.btn-success{background:var(--hijau);color:white;}.btn-danger{background:var(--merah);color:white;}
    .btn-outline{background:transparent;border:2px solid var(--biru);color:var(--biru);}.btn-sm{padding:6px 10px;font-size:0.7rem;border-radius:8px;}.btn-block{width:100%;justify-content:center;}
    .btn:disabled{opacity:0.5;cursor:not-allowed;}.flex-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .flex-between{display:flex;justify-content:space-between;align-items:center;}.col-2{flex:2;}.col-1{flex:1;}
    .total-box{background:var(--kuning-muda);padding:10px 14px;border-radius:12px;margin:8px 0;text-align:right;font-weight:700;font-size:1.1rem;color:var(--biru);}
    .total-box.danger{background:#FEE2E2;color:var(--merah);}
    .status-badge{padding:3px 8px;border-radius:10px;font-size:0.6rem;font-weight:600;display:inline-block;}
    .status-cod{background:#D1FAE5;color:#065F46;}.status-transfer{background:#DBEAFE;color:#1E40AF;}.status-qris{background:#FEF3C7;color:#92400E;}.status-belumbayar{background:#FEE2E2;color:#991B1B;}

    table{width:100%;border-collapse:collapse;font-size:0.7rem;}th,td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);}
    th{background:var(--biru-muda);color:var(--biru);font-weight:700;font-size:0.65rem;}
    .bottom-bar{text-align:center;font-size:0.65rem;color:var(--text-secondary);padding:10px;border-top:1px solid var(--border);background:#F8FAFC;}
    .hidden{display:none!important;}.mb-2{margin-bottom:8px;}.mt-2{margin-top:8px;}.text-sm{font-size:0.7rem;}.text-center{text-align:center;}
    .summary-box{flex:1;text-align:center;padding:10px;border-radius:12px;font-size:0.65rem;background:var(--biru-muda);}
    .user-section{border:2px solid var(--kuning);border-radius:12px;padding:10px;margin:10px 0;background:var(--kuning-muda);}
    .user-section h4{color:var(--biru);margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:8px;}
    .user-section h4 i{font-size:0.7rem;transition:transform 0.2s;}
    .detail-transaksi{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);}
    .detail-transaksi.show{display:block;}
    .login-container{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#0A4D8C,#0B5FA5);}
    .login-card{background:white;padding:30px;border-radius:24px;width:340px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.2);}
    .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;}
    .modal{background:white;border-radius:20px;padding:20px;max-width:400px;width:90%;max-height:85vh;overflow-y:auto;}
    .bank-info{background:#F0F9FF;border:1px solid #BAE6FD;border-radius:10px;padding:10px;margin:10px 0;font-size:0.7rem;}
    .section-title{font-size:0.7rem;font-weight:700;color:var(--biru);margin:12px 0 6px 0;padding-bottom:4px;border-bottom:2px solid var(--kuning);}
    .setoran-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);}
    .setoran-row label{font-size:0.7rem;font-weight:600;min-width:85px;color:var(--text-secondary);}.setoran-row input{flex:1;text-align:right;}
    .cart-qty{width:55px!important;font-size:0.75rem!important;}.cart-disc{width:70px!important;font-size:0.75rem!important;}
    .cart-item-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;padding:8px;background:var(--biru-muda);border-radius:10px;flex-wrap:wrap;}
    .cart-item-select{flex:2;min-width:120px;font-size:0.7rem;padding:6px 8px;}
    .cart-item-price{font-size:0.7rem;font-weight:600;white-space:nowrap;}
    @media(max-width:480px){.cart-qty{width:50px!important;}.cart-disc{width:55px!important;}.cart-item-row{gap:6px;}.cart-item-select{min-width:100px;font-size:0.65rem;}}
    .pagination{display:flex;justify-content:center;align-items:center;gap:4px;margin-top:8px;flex-wrap:wrap;}
    .pagination button{min-width:32px;height:32px;padding:4px 8px;border-radius:8px;font-size:0.7rem;}
    .pagination .active{background:var(--biru);color:white;border-color:var(--biru);}.pagination span{font-size:0.7rem;color:var(--text-secondary);margin:0 4px;}
    .transaksi-item{background:white;border-radius:8px;padding:8px;margin-bottom:6px;border:1px solid var(--border);}
    .transaksi-item .flex-between{margin-bottom:4px;}
  </style>
</head>
<body>

<div id="loginPage" class="login-container">
  <div class="login-card">

    <div class="form-group"><input type="text" id="loginUser" placeholder="Username" style="text-align:center;" autocomplete="off"></div>
    <div class="form-group"><input type="password" id="loginPass" placeholder="Password" style="text-align:center;"></div>
    <button class="btn btn-primary btn-block" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Masuk</button>
    <p style="font-size:0.6rem;margin-top:10px;color:#94A3B8;">Admin: Admin/admin123 | Sales: Sales A/sales123 | Driver: Driver/driver123</p>
  </div>
</div>

<div id="mainApp" class="app-container hidden">
  <div class="header">
    <div class="brand"><span class="tirta">Tirta</span><span class="kencana">Kencana</span></div>
    <div class="tagline">DO GOOD AND GOOD WILL COME TO YOU</div>
    <div class="alamat" id="headerAlamat">WTC Mangga 2 Lt UG A/53</div>
    <div class="logo-header" onclick="document.getElementById('logoFileInput').click()"><img id="logoImg" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle fill='%230A4D8C' cx='20' cy='20' r='18'/%3E%3Ctext x='20' y='26' text-anchor='middle' fill='white' font-size='16'%3E💧%3C/text%3E%3C/svg%3E" alt="Logo"></div>
    <input type="file" id="logoFileInput" accept="image/*" style="display:none" onchange="uploadLogo(event)">
  </div>
  <div class="nav-bar">
    <div class="user-info"><div class="avatar" id="userAvatar">A</div><div><div style="font-size:0.75rem;font-weight:600;" id="displayName">Admin</div><span class="role-tag" id="displayRole">ADMIN</span></div></div>
    <div style="display:flex;align-items:center;gap:4px;">
      <button class="btn-install" id="installBtn" onclick="installApp()" title="Install App">📲</button>
      <button class="btn-darkmode" onclick="toggleDarkMode()" title="Dark Mode">🌙</button>
      <button class="btn-refresh" onclick="refreshAllData()" title="Refresh">🔄</button>
      <button class="btn-logout" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>
  <div class="menu-tabs" id="menuTabs"></div>
  <div class="content-area" id="contentArea"></div>
  <div class="bottom-bar">Terima kasih sudah berbelanja · Tirta Kencana</div>
</div>
<div class="modal-overlay" id="strukModal" onclick="closeStruk()"><div class="modal" id="strukContent" onclick="event.stopPropagation()"></div></div>

<script>
const GOOGLE_SHEETS_URL='https://script.google.com/macros/s/AKfycbyPy3A2MM1c2kmPCpnAy2mRmuaxUyvGlBne7E0WLul-Fyg2Njuua3AMFN--h2M2N_tl/exec';
const USE_GOOGLE_SHEETS=true,ITEMS_PER_PAGE=10;
const NOMOR_TELEPON='088211058000';

let deferredPrompt;window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBtn').style.display='block';});
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(r=>{if(r.outcome==='accepted')console.log('Installed');deferredPrompt=null;document.getElementById('installBtn').style.display='none';});}else{Swal.fire('Info','Klik menu browser > Add to Home Screen','info');}}
function toggleDarkMode(){document.body.classList.toggle('dark');const d=document.body.classList.contains('dark');localStorage.setItem('tirtaDarkMode',d?'1':'0');document.querySelector('.btn-darkmode').textContent=d?'☀️':'🌙';}
function initDarkMode(){if(localStorage.getItem('tirtaDarkMode')==='1'){document.body.classList.add('dark');const b=document.querySelector('.btn-darkmode');if(b)b.textContent='☀️';}}

let currentUser=null,currentPage='penjualan',paginationPage=1;
let products=[],pelanggan=[],cart=[],salesHistory=[],stockInHistory=[],setoranHistory=[];
let drivers=[],salesUsers=[],banks=[];
let settings={namaToko:'Tirta Kencana',alamat:'WTC Mangga 2 Lt UG A/53',tagline:'DO GOOD AND GOOD WILL COME TO YOU',bottomLine:'Terima kasih sudah berbelanja',logo:'',qris:''};
let allUsers=[];

function saveAllData(){localStorage.setItem('tirtaFullData',JSON.stringify({products,pelanggan,salesHistory,stockInHistory,setoranHistory,drivers,salesUsers,banks,settings,allUsers}));}
function loadAllData(){const s=localStorage.getItem('tirtaFullData');if(s)try{const d=JSON.parse(s);products=d.products||[];pelanggan=d.pelanggan||[];salesHistory=d.salesHistory||[];stockInHistory=d.stockInHistory||[];setoranHistory=d.setoranHistory||[];drivers=d.drivers||[];salesUsers=d.salesUsers||[];banks=d.banks||[];settings={...settings,...(d.settings||{})};allUsers=d.allUsers||[];}catch(e){}
  if(products.length===0)products=[{sku:'AQ001',nama:'Aqua 330ml',modal:2200,jual:3500,stokAwal:100,stokMasuk:0,stokKeluar:0,stokAkhir:100},{sku:'AQ002',nama:'Aqua 600ml',modal:2500,jual:4000,stokAwal:150,stokMasuk:0,stokKeluar:0,stokAkhir:150}];
  if(pelanggan.length===0)pelanggan=['Warung Mpok','Toko Berkah'];
  if(drivers.length===0)drivers=['Hendri','Asep'];
  if(banks.length===0)banks=[{name:'BCA',number:'6930099099',holder:'Hendri',logo:'🏦'},{name:'bluBCA',number:'002283588888',holder:'Hendri',logo:'💳'}];
  if(allUsers.length===0)allUsers=[{name:'Admin',role:'admin',password:'admin123'},{name:'Sales A',role:'sales',password:'sales123'},{name:'Sales B',role:'sales',password:'sales123'},{name:'Driver',role:'driver',password:'driver123'}];
}

async function syncToGoogleSheets(action,data){if(!USE_GOOGLE_SHEETS)return;try{await fetch(GOOGLE_SHEETS_URL+'?action='+action+'&data='+encodeURIComponent(JSON.stringify(data)),{method:'GET',mode:'no-cors'});}catch(e){}}

async function refreshAllData(){
  Swal.fire({title:'🔄 Sync',text:'Menarik data...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});
  try{
    const r=await fetch(GOOGLE_SHEETS_URL+'?action=getAllData');
    const d=await r.json();
    if(d.success&&d.data){
      if(d.data.products&&d.data.products.length>0)products=d.data.products;
      if(d.data.pelanggan&&d.data.pelanggan.length>0)pelanggan=d.data.pelanggan;
      if(d.data.salesHistory&&d.data.salesHistory.length>0)salesHistory=d.data.salesHistory;
      if(d.data.stockInHistory&&d.data.stockInHistory.length>0)stockInHistory=d.data.stockInHistory;
      if(d.data.setoranHistory&&d.data.setoranHistory.length>0)setoranHistory=d.data.setoranHistory;
      if(d.data.drivers&&d.data.drivers.length>0)drivers=d.data.drivers;
      if(d.data.banks&&d.data.banks.length>0)banks=d.data.banks;
      if(d.data.settings)settings={...settings,...d.data.settings};
      if(d.data.allUsers&&d.data.allUsers.length>0){allUsers=d.data.allUsers;salesUsers=allUsers.filter(u=>u.role==='sales'||u.role==='admin').map(u=>u.name);}
      if(salesUsers.length===0)salesUsers=['Sales A','Sales B'];
      saveAllData();
      if(settings.alamat)document.getElementById('headerAlamat').textContent=settings.alamat;
      if(settings.logo)document.getElementById('logoImg').src=settings.logo;
      if(currentPage==='setoran' && document.getElementById('setGrandCOD')){hitungSetoran();}
      renderContent();
      Swal.fire({title:'✅ Sukses',text:'Data diperbarui!',icon:'success',timer:1500,showConfirmButton:false});
    }else{Swal.fire({title:'⚠️ Info',text:'Server kosong. Data lokal aman.',icon:'warning'});}
  }catch(e){Swal.fire({title:'❌ Error',text:'Gagal terhubung.',icon:'error'});}
}

function doLogin(){const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value.trim();if(!u||!p)return Swal.fire('Error','Isi username & password','error');const f=allUsers.find(x=>x.name===u&&x.password===p);if(f){currentUser={name:f.name,role:f.role};localStorage.setItem('tirtaUser',JSON.stringify(currentUser));showMainApp();}else{Swal.fire('Error','Username/password salah!','error');}}
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&!document.getElementById('loginPage').classList.contains('hidden'))doLogin();});
function doLogout(){localStorage.removeItem('tirtaUser');currentUser=null;cart=[];document.getElementById('loginPage').classList.remove('hidden');document.getElementById('mainApp').classList.add('hidden');}

function pagePenjualan(){let co='<option value="">-- Pilih Pelanggan --</option><option value="__new__">+ Tambah Baru</option>';pelanggan.forEach(c=>{co+=`<option value="${c}">${c}</option>`;});return`<div class="card"><div class="card-title"><i class="fas fa-user-check"></i> Data Penjualan</div><div class="form-group"><label>Sales</label><input value="${currentUser?.name||''}" readonly></div><div class="form-group"><label>Pelanggan</label><select id="custSelect" onchange="onPelangganSelect()">${co}</select><input id="custNewInput" placeholder="Nama Pelanggan Baru" style="margin-top:4px;display:none;"></div><div class="form-group"><label>Status</label><select id="payStatus" onchange="onStatusChange()"><option value="cod">COD</option><option value="transfer">Transfer</option><option value="qris">QRIS</option><option value="belumbayar">Belum Bayar</option></select></div><div id="bankInfoBox" style="display:none;" class="bank-info"></div></div><div class="card"><div class="card-title"><i class="fas fa-shopping-cart"></i> Keranjang</div><div id="cartItems"></div><button class="btn btn-outline btn-sm" onclick="addCartItem()"><i class="fas fa-plus"></i> Tambah Item</button><div class="total-box"><div>Total: Rp <span id="cartTotal">0</span></div></div><button class="btn btn-primary btn-block" onclick="saveSale()"><i class="fas fa-save"></i> Simpan Transaksi</button></div>`;}
function initPenjualan(){if(cart.length===0)cart.push({sku:'',qty:1,disc:0});renderCart();onStatusChange();}
function onPelangganSelect(){const s=document.getElementById('custSelect'),n=document.getElementById('custNewInput');if(s.value==='__new__'){n.style.display='block';n.focus();}else{n.style.display='none';n.value='';}}
function onStatusChange(){const st=document.getElementById('payStatus')?.value,box=document.getElementById('bankInfoBox');if(st==='transfer'){let h='<strong>🏦 Transfer:</strong><br>';banks.forEach(b=>{h+=`• ${b.logo} <b>${b.name}</b> | ${b.number} | ${b.holder}<br>`;});box.innerHTML=h;box.style.display='block';}else if(st==='qris'&&settings.qris){box.innerHTML=`<strong>📱 QRIS</strong><br><img src="${settings.qris}" style="width:100px;">`;box.style.display='block';}else{box.style.display='none';}}
function getSelectedPelanggan(){const s=document.getElementById('custSelect'),n=document.getElementById('custNewInput');return s.value==='__new__'?n.value.trim():s.value;}
function addCartItem(){cart.push({sku:'',qty:1,disc:0});renderCart();}function removeCartItem(i){cart.splice(i,1);renderCart();}
function updateCart(i,f,v){if(f==='qty')cart[i].qty=parseInt(v)||1;else if(f==='disc')cart[i].disc=parseInt(v)||0;else cart[i][f]=v;if(f==='sku'){const p=products.find(x=>x.sku===v);if(p){cart[i].harga=p.jual;cart[i].nama=p.nama;cart[i].modal=p.modal;}}renderCart();}
function renderCart(){const el=document.getElementById('cartItems');if(!el)return;el.innerHTML=cart.map((item,i)=>{const p=products.find(x=>x.sku===item.sku),h=p?p.jual:(item.harga||0),dp=item.disc||0,dt=dp*item.qty,sub=(item.qty*h)-dt;let po='<option value="">Pilih Produk</option>';products.forEach(p=>{po+=`<option value="${p.sku}" ${item.sku===p.sku?'selected':''}>${p.sku} - ${p.nama} (Stok:${p.stokAkhir})</option>`;});return`<div class="cart-item-row"><select class="cart-item-select" onchange="updateCart(${i},'sku',this.value)">${po}</select><input type="number" value="${item.qty}" onchange="updateCart(${i},'qty',this.value)" class="cart-qty" min="1" placeholder="Qty"><span class="cart-item-price">xRp${h.toLocaleString()}</span><input type="number" value="${dp}" onchange="updateCart(${i},'disc',this.value)" class="cart-disc" placeholder="Disc"><span style="font-size:0.7rem;color:#EF4444;">-Rp${dt.toLocaleString()}</span><span style="font-size:0.75rem;font-weight:600;min-width:70px;">Rp${sub.toLocaleString()}</span><button class="btn btn-danger btn-sm" onclick="removeCartItem(${i})" style="padding:4px 8px;">✕</button></div>`;}).join('');let sa=0,td=0;cart.forEach(i=>{const p=products.find(x=>x.sku===i.sku),h=p?p.jual:(i.harga||0);sa+=i.qty*h;td+=(i.disc||0)*i.qty;});document.getElementById('cartTotal').textContent=(sa-td).toLocaleString();}
async function saveSale(){const cust=getSelectedPelanggan();if(!cust)return Swal.fire('Error','Pilih pelanggan','error');const valid=cart.filter(i=>i.sku&&products.find(p=>p.sku===i.sku));if(valid.length===0)return Swal.fire('Error','Pilih produk','error');const status=document.getElementById('payStatus')?.value||'cod';const items=valid.map(i=>{const p=products.find(x=>x.sku===i.sku);const hj=p?p.jual:(i.harga||0);const hm=p?p.modal:(i.modal||0);const q=parseInt(i.qty)||0;const dp=parseInt(i.disc)||0;const profit=(hj-dp-hm)*q;const dt=dp*q;const sub=(q*hj)-dt;return{sku:i.sku,nama:p?.nama||'',qty:q,harga:hj,disc:dp,modal:hm,discTotal:dt,subtotal:sub,profit:profit};});let total=0,tq=0,td=0,tp=0;items.forEach(i=>{total+=i.subtotal;tq+=i.qty;td+=i.discTotal;tp+=i.profit;});const ns={id:'INV-'+Date.now(),user:currentUser.name,customer:cust,status,items,total,totalQty:tq,totalDisc:td,totalProfit:tp,date:new Date().toISOString().split('T')[0],time:new Date().toLocaleTimeString('id-ID')};salesHistory.unshift(ns);items.forEach(i=>{const p=products.find(x=>x.sku===i.sku);if(p){p.stokKeluar=(p.stokKeluar||0)+i.qty;p.stokAkhir=(p.stokAwal||0)+(p.stokMasuk||0)-p.stokKeluar;}});if(!pelanggan.includes(cust))pelanggan.push(cust);saveAllData();syncToGoogleSheets('createSale',ns);Swal.fire({title:'✅ Berhasil!',html:`Total: <b>Rp${total.toLocaleString()}</b>`,icon:'success',showDenyButton:true,showCancelButton:true,confirmButtonText:'🖨️ Cetak',denyButtonText:'📥 PNG',cancelButtonText:'💬 WA'}).then(ch=>{showStruk(ns);if(ch.isConfirmed)cetakBluetooth();else if(ch.isDenied)downloadStrukPNG();else if(ch.dismiss===Swal.DismissReason.cancel)kirimWA();});cart=[{sku:'',qty:1,disc:0}];renderCart();document.getElementById('custSelect').value='';document.getElementById('custNewInput').style.display='none';}
function showStruk(s){let ih='';s.items.forEach(i=>{const dp=i.disc||0,dt=dp*(i.qty||0),sub=(i.qty*i.harga)-dt;ih+=`<tr><td style="padding:4px;">${i.nama||i.sku}</td><td style="text-align:center;">${i.qty}</td><td style="text-align:right;">Rp${i.harga.toLocaleString()}</td><td style="text-align:right;">${dt>0?'Rp'+dt.toLocaleString():'-'}</td><td style="text-align:right;">Rp${sub.toLocaleString()}</td></tr>`;});let bh='';if(s.status==='transfer'){bh='<div class="bank-info" style="text-align:left;"><strong>🏦 Transfer:</strong><br>';banks.forEach(b=>{bh+=`• ${b.logo} <b>${b.name}</b> | ${b.number} | ${b.holder}<br>`;});bh+='</div>';}else if(s.status==='qris'&&settings.qris)bh=`<div style="text-align:center;"><strong>📱 QRIS</strong><br><img src="${settings.qris}" style="width:100px;"></div>`;document.getElementById('strukContent').innerHTML=`<div id="strukPrintArea" style="text-align:center;padding:15px;font-size:0.7rem;max-width:320px;margin:0 auto;">${settings.logo?`<img src="${settings.logo}" style="width:60px;height:60px;border-radius:50%;margin-bottom:8px;">`:''}<h3 style="color:#0A4D8C;">${settings.namaToko}</h3><p>${settings.tagline}</p><p>${settings.alamat}</p><p>📞 ${NOMOR_TELEPON}</p><hr><p>No: ${s.id}</p><p>Tgl: ${s.date} ${s.time||''}</p><p>Pelanggan: ${s.customer}</p><p>Sales: ${s.user}</p><p>Status: <span class="status-badge status-${s.status}">${s.status.toUpperCase()}</span></p>${bh}<hr><table style="width:100%;font-size:0.6rem;"><tr><th>Item</th><th>Qty</th><th>Harga</th><th>Disc</th><th>Sub</th></tr>${ih}</table><hr><p style="font-weight:bold;font-size:0.9rem;">Total: Rp${(s.total||0).toLocaleString()}</p><p>${settings.bottomLine}</p></div>`;document.getElementById('strukModal').style.display='flex';}

async function cetakBluetooth(){try{const d=await navigator.bluetooth.requestDevice({acceptAllDevices:true});Swal.fire('Info','Terhubung: '+d.name,'success');}catch(e){Swal.fire('Info','Bluetooth tidak tersedia','info');}}
function downloadStrukPNG(){const el=document.getElementById('strukPrintArea');if(!el)return;html2canvas(el,{scale:2,backgroundColor:'#FFFFFF'}).then(c=>{const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='struk-'+Date.now()+'.png';a.click();});}

// ============ SETORAN ============
function getGrandTotalCOD(){
  const today=new Date().toISOString().split('T')[0];
  const codSales=salesHistory.filter(s=>s.date===today && s.user===currentUser?.name && s.status==='cod');
  return codSales.reduce((sum,s)=>sum+(s.total||0),0);
}
function pageSetoran(){
  const today=new Date().toISOString().split('T')[0];
  const codTotal=getGrandTotalCOD();
  return`<div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-money-bill-wave"></i> Setoran Sales</div><button class="btn-refresh btn-sm" onclick="refreshAllData()">🔄 Sync</button></div>

function initSetoran(){hitungSetoran();loadSetoranHistory();}
function hitungSetoran(){let g=parseInt((document.getElementById('setGrandCOD')?.value||'').replace(/[^0-9]/g,''))||0;const m=parseInt(document.getElementById('setMakan')?.value||0),t=parseInt(document.getElementById('setTips')?.value||0),p=parseInt(document.getElementById('setParkir')?.value||0),f=parseInt(document.getElementById('setFlazz')?.value||0),b=parseInt(document.getElementById('setBensin')?.value||0),tr=parseInt(document.getElementById('setTransfer')?.value||0),j1=parseInt(document.getElementById('setJml1')?.value||0),j2=parseInt(document.getElementById('setJml2')?.value||0),ci=parseInt(document.getElementById('setCicilan')?.value||0),ta=parseInt(document.getElementById('setTagihan')?.value||0);const total=g-m-t-p-f-b-tr-j1-j2+ci+ta;const setor=parseInt(document.getElementById('setSetor')?.value||0);const selisih=setor-total;document.getElementById('setTotal').textContent=total.toLocaleString();document.getElementById('setSelisih').textContent=selisih.toLocaleString();document.getElementById('setSelisih').style.color=selisih<0?'#EF4444':selisih>0?'#10B981':'inherit';}
async function saveSetoran(){const data={sales:currentUser.name,tanggal:document.getElementById('setTanggal')?.value,grandCOD:parseInt((document.getElementById('setGrandCOD')?.value||'').replace(/[^0-9]/g,''))||0,makan:parseInt(document.getElementById('setMakan')?.value||0),tips:parseInt(document.getElementById('setTips')?.value||0),parkir:parseInt(document.getElementById('setParkir')?.value||0),flazz:parseInt(document.getElementById('setFlazz')?.value||0),bensin:parseInt(document.getElementById('setBensin')?.value||0),transfer:parseInt(document.getElementById('setTransfer')?.value||0),ket1:document.getElementById('setKet1')?.value||'',jml1:parseInt(document.getElementById('setJml1')?.value||0),ket2:document.getElementById('setKet2')?.value||'',jml2:parseInt(document.getElementById('setJml2')?.value||0),cicilan:parseInt(document.getElementById('setCicilan')?.value||0),tagihan:parseInt(document.getElementById('setTagihan')?.value||0),total:parseInt(document.getElementById('setTotal')?.textContent?.replace(/[^0-9]/g,''))||0,setor:parseInt(document.getElementById('setSetor')?.value||0),selisih:parseInt(document.getElementById('setSelisih')?.textContent?.replace(/-/g,'').replace(/[^0-9]/g,''))||0,waktu:new Date().toLocaleTimeString('id-ID')};if(document.getElementById('setSelisih')?.textContent?.includes('-'))data.selisih=-Math.abs(data.selisih);setoranHistory.unshift({id:'SET-'+Date.now(),...data});saveAllData();syncToGoogleSheets('addSetoran',data);Swal.fire('Sukses','Setoran disimpan!','success');loadSetoranHistory();}
function loadSetoranHistory(){const el=document.getElementById('setHistory');if(!el)return;const data=setoranHistory.filter(s=>s.sales===currentUser?.name);if(data.length===0){el.innerHTML='<p class="text-sm text-center">📭 Belum ada setoran.</p>';return;}let h='<table style="width:100%;font-size:0.65rem;"><tr><th>Tgl</th><th>Total</th><th>Setor</th><th>Selisih</th></tr>';data.slice(0,20).forEach(s=>{h+=`<tr><td style="padding:4px;">${s.tanggal}</td><td style="text-align:right;">Rp${(s.total||0).toLocaleString()}</td><td style="text-align:right;">Rp${(s.setor||0).toLocaleString()}</td><td style="text-align:right;color:${(s.selisih||0)<0?'#EF4444':'#10B981'};">Rp${(s.selisih||0).toLocaleString()}</td></tr>`;});h+='</table>';el.innerHTML=h;}

function showStrukSetoran(d){document.getElementById('strukContent').innerHTML=`<div id="strukPrintArea" style="text-align:center;padding:15px;font-size:0.7rem;max-width:320px;margin:0 auto;">${settings.logo?`<img src="${settings.logo}" style="width:60px;height:60px;border-radius:50%;margin-bottom:8px;">`:''}<h3 style="color:#0A4D8C;">${settings.namaToko}</h3><p>SETORAN SALES</p><p>📞 ${NOMOR_TELEPON}</p><hr><p>Sales: ${d.sales}</p><p>Tgl: ${d.tanggal}</p><hr><table style="width:100%;font-size:0.6rem;"><tr><td style="font-weight:bold;">Grand Total COD</td><td style="text-align:right;">Rp${(parseInt(d.grandCOD)||0).toLocaleString()}</td></tr>

// ============ LAPORAN SETORAN ============
function loadLaporanSetoran(c){
  let h='<div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-file-invoice-dollar"></i> 📊 Laporan Setoran Semua Sales</div><button class="btn-refresh btn-sm" onclick="refreshAllData()">🔄 Sync</button></div>';
  let salesUsers = allUsers.filter(u => u.role === 'sales' || u.role === 'admin').map(u => u.name);
  const uniqueSalesFromHistory = [...new Set(salesHistory.map(s => s.user))];
  uniqueSalesFromHistory.forEach(u => { if(!salesUsers.includes(u)) salesUsers.push(u); });
  if(salesUsers.length === 0){ h+='<p class="text-center text-sm">📭 Tidak ada data sales.</p></div>'; c.innerHTML = h; return; }
  const today = new Date().toISOString().split('T')[0];
  let grandTotalCOD = 0, grandTotalSetor = 0, grandSelisih = 0;
  salesUsers.sort();
  salesUsers.forEach(sn => {
    const codSalesToday = salesHistory.filter(s => s.date === today && s.user === sn && s.status === 'cod');
    const codTotalToday = codSalesToday.reduce((sum, s) => sum + (s.total || 0), 0);
    const setoranUser = setoranHistory.filter(s => s.sales === sn);
    const totalSetoranUser = setoranUser.reduce((sum, s) => sum + (s.total || 0), 0);
    const totalSetorUser = setoranUser.reduce((sum, s) => sum + (s.setor || 0), 0);
    const totalSelisihUser = setoranUser.reduce((sum, s) => sum + (s.selisih || 0), 0);
    const allCODUser = salesHistory.filter(s => s.user === sn && s.status === 'cod');
    const totalCODAll = allCODUser.reduce((sum, s) => sum + (s.total || 0), 0);
    const countCODAll = allCODUser.length;
    if(codTotalToday > 0 || totalSetoranUser > 0 || allCODUser.length > 0){
      grandTotalCOD += codTotalToday; grandTotalSetor += totalSetorUser; grandSelisih += totalSelisihUser;
      h += `<div class="user-section"><h4>👤 ${sn}</h4><div style="font-size:0.7rem;margin-bottom:8px;"><span class="status-badge status-cod">📊 Total COD: Rp${totalCODAll.toLocaleString()} (${countCODAll} transaksi)</span></div>`;
      if(codTotalToday > 0){ h += `<div style="background:#D1FAE5;padding:8px;border-radius:8px;margin-bottom:8px;"><strong>💰 COD Hari Ini:</strong> Rp${codTotalToday.toLocaleString()}</div>`; }
      h += `<table style="width:100%;font-size:0.65rem;margin-bottom:8px;"><tr><th>Total Setoran</th><td style="text-align:right;">Rp${totalSetoranUser.toLocaleString()}</td></tr>
      <tr><th>Total Disetor</th><td style="text-align:right;">Rp${totalSetorUser.toLocaleString()}</td></tr>
      <tr><th>Total Selisih</th><td style="text-align:right;color:${totalSelisihUser < 0 ? '#EF4444' : (totalSelisihUser > 0 ? '#10B981' : '#666')};">Rp${totalSelisihUser.toLocaleString()}</td></tr>
    </table>`;
      if(setoranUser.length > 0){
        h += `<details><summary style="cursor:pointer;color:var(--biru);font-weight:600;">📋 Detail Setoran (${setoranUser.length} kali)</summary><table style="margin-top:8px;width:100%;font-size:0.6rem;"><tr><th>Tgl</th><th>Total</th><th>Setor</th><th>Selisih</th></tr>`;
        setoranUser.sort((a,b)=>(b.tanggal||'').localeCompare(a.tanggal||'')).slice(0,10).forEach(s=>{h+=`<tr><td style="padding:4px;">${s.tanggal||'-'}</td><td style="text-align:right;">Rp${(s.total||0).toLocaleString()}</td><td style="text-align:right;">Rp${(s.setor||0).toLocaleString()}</td><td style="text-align:right;color:${(s.selisih||0)<0?'#EF4444':'#10B981'};">Rp${(s.selisih||0).toLocaleString()}</td></tr>`;});h+=`</table></details>`;}
      if(allCODUser.length > 0){ h += `<details><summary style="cursor:pointer;color:var(--biru);font-weight:600;">📦 Transaksi COD (${allCODUser.length})</summary><table style="margin-top:8px;width:100%;font-size:0.6rem;"><tr><th>Tgl</th><th>Customer</th><th>Total</th></tr>`;allCODUser.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,5).forEach(s=>{h+=`<tr><td style="padding:4px;">${s.date||'-'}</td><td style="padding:4px;">${(s.customer||'').substring(0,15)}</td><td style="text-align:right;">Rp${(s.total||0).toLocaleString()}</td></tr>`;});h+=`</table></details>`;}
      h += `</div>`;
    }
  });
  if(grandTotalCOD > 0 || grandTotalSetor > 0){ h += `<div class="total-box">📊 RINGKASAN SEMUA SALES<br>Total COD Hari Ini: Rp${grandTotalCOD.toLocaleString()}<br>Total Disetor: Rp${grandTotalSetor.toLocaleString()}<br><span style="color:${grandSelisih < 0 ? '#EF4444' : '#10B981'};">Total Selisih: Rp${grandSelisih.toLocaleString()}</span></div>`; }
  else { h += `<div class="total-box">ℹ️ Tidak ada transaksi COD atau setoran untuk hari ini.</div>`; }
  h += `</div><div class="card text-center"><button class="btn btn-primary btn-sm" onclick="refreshAllData()"><i class="fas fa-sync-alt"></i> Refresh Data</button> <button class="btn btn-success btn-sm" onclick="exportSetoranToCSV()"><i class="fas fa-download"></i> Export CSV</button></div>`;
  c.innerHTML = h;
}
function exportSetoranToCSV(){let csvRows=[['Nama Sales','Tanggal Setor','Total Setoran','Jumlah Disetor','Selisih','Grand COD','Makan','Tips','Parkir','Flazz','Bensin','Transfer','Cicilan','Tagihan','Waktu']];setoranHistory.forEach(s=>{csvRows.push([s.sales||'',s.tanggal||'',(s.total||0),(s.setor||0),(s.selisih||0),(s.grandCOD||0),(s.makan||0),(s.tips||0),(s.parkir||0),(s.flazz||0),(s.bensin||0),(s.transfer||0),(s.cicilan||0),(s.tagihan||0),s.waktu||'']);});const csvContent=csvRows.map(row=>row.join(',')).join('\n');const blob=new Blob([csvContent],{type:'text/csv;charset=utf-8;'});const link=document.createElement('a');const url=URL.createObjectURL(blob);link.href=url;link.setAttribute('download',`laporan_setoran_${new Date().toISOString().split('T')[0]}.csv`);document.body.appendChild(link);link.click();document.body.removeChild(link);URL.revokeObjectURL(url);Swal.fire('Sukses','File CSV telah diunduh','success');}

        <div><select id="status-${s.id}" onchange="updateStatusTransaksi('${s.id}',this.value)" class="btn-sm" style="padding:4px;font-size:0.6rem;"><option value="cod" ${s.status==='cod'?'selected':''}>COD</option><option value="transfer" ${s.status==='transfer'?'selected':''}>Transfer</option><option value="qris" ${s.status==='qris'?'selected':''}>QRIS</option><option value="belumbayar" ${s.status==='belumbayar'?'selected':''}>Belum Bayar</option></select>

function toggleDetail(id){
  const el=document.getElementById(id);
  if(el){
    el.classList.toggle('show');
    const icon=document.getElementById('icon-'+id);
    if(icon) icon.style.transform=el.classList.contains('show')?'rotate(180deg)':'rotate(0deg)';
  }
}
function updateStatusTransaksi(id,newStatus){
  const idx=salesHistory.findIndex(s=>s.id===id);
  if(idx!==-1){
    salesHistory[idx].status=newStatus;
    saveAllData();
    syncToGoogleSheets('updateSaleStatus',{id,status:newStatus});
    Swal.fire('Sukses','Status transaksi diperbarui!','success');
    renderContent();
  }
}
function printStrukById(id){
  const sale=salesHistory.find(s=>s.id===id);
  if(sale) showStruk(sale);
  else Swal.fire('Error','Data tidak ditemukan','error');
}

// ============ KEUANGAN, GUDANG, DLL ============
function loadKeuangan(container){let h='<div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-chart-pie"></i> 📊 Laporan Keuangan</div><button class="btn-refresh btn-sm" onclick="refreshAllData()">🔄 Sync</button></div>';if(salesHistory.length===0){h+='<p class="text-center">Belum ada data.</p></div>';container.innerHTML=h;return;}const perUser={};allUsers.filter(u=>u.role==='sales'||u.role==='admin').forEach(u=>{perUser[u.name]={sales:0,total:0,profit:0,qty:0};});salesHistory.forEach(s=>{if(perUser[s.user]){perUser[s.user].sales++;perUser[s.user].total+=s.total||0;perUser[s.user].profit+=s.totalProfit||0;perUser[s.user].qty+=s.totalQty||0;}});h+='<h4 style="font-size:0.75rem;">👤 Per Sales (Semua Data)</h4><table style="width:100%;font-size:0.65rem;"><tr><th>User</th><th>Transaksi</th><th>QTY</th><th>Total</th><th>Profit</th></tr>';Object.entries(perUser).forEach(([name,u])=>{h+=`<tr><td style="padding:4px;">${name}</td><td style="text-align:center;">${u.sales}</td><td style="text-align:center;">${u.qty}</td><td style="text-align:right;">Rp${u.total.toLocaleString()}</td><td style="text-align:right;">Rp${u.profit.toLocaleString()}</td></tr>`;});h+='</table></div>';container.innerHTML=h;}
function loadRekapStockIn(container){let h='<div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-warehouse"></i> 📊 Rekap Gudang (Barang Masuk)</div><button class="btn-refresh btn-sm" onclick="refreshAllData()">🔄 Sync</button></div>';if(stockInHistory.length===0){h+='<p class="text-center">Belum ada data barang masuk</p></div>';container.innerHTML=h;return;}const tq=stockInHistory.reduce((s,i)=>s+(i.qty||0),0),tm=stockInHistory.reduce((s,i)=>s+((i.qty||0)*(i.hargaModal||0)),0);h+=`<div class="flex-row mb-2"><div class="summary-box"><small>Entry</small><br><b>${stockInHistory.length}</b></div><div class="summary-box"><small>Total QTY</small><br><b>${tq}</b></div><div class="summary-box"><small>Total Modal</small><br><b>Rp${tm.toLocaleString()}</b></div></div>`;['kiriman','titipan'].forEach(status=>{const data=stockInHistory.filter(s=>s.status===status);if(data.length===0)return;const tQ=data.reduce((s,i)=>s+(i.qty||0),0),tRp=data.reduce((s,i)=>s+((i.qty||0)*(i.hargaModal||0)),0);h+=`<h4 style="font-size:0.75rem;margin-top:12px;"><span class="status-badge status-${status}">${status.toUpperCase()}</span> | QTY: ${tQ} | Rp${tRp.toLocaleString()}</h4><table style="width:100%;font-size:0.65rem;"><tr><th>Driver</th><th>Entry</th><th>QTY</th><th>Total Modal</th></tr>`;const perDriver={};data.forEach(s=>{const d=s.driver||'Tanpa Driver';if(!perDriver[d])perDriver[d]={driver:d,jumlah:0,totalQty:0,totalRp:0};perDriver[d].jumlah++;perDriver[d].totalQty+=s.qty||0;perDriver[d].totalRp+=(s.qty||0)*(s.hargaModal||0);});Object.values(perDriver).forEach(d=>{h+=`<tr><td style="padding:4px;">${d.driver}</td><td style="text-align:center;">${d.jumlah}</td><td style="text-align:center;">${d.totalQty}</td><td style="text-align:right;">Rp${d.totalRp.toLocaleString()}</td></tr>`;});h+='<td>';});h+='</div>';container.innerHTML=h;}

async function saveStockIn(){const sku=document.getElementById('stkSku')?.value,qty=document.getElementById('stkQty')?.value;if(!sku||!qty)return Swal.fire('Error','Lengkapi data','error');const p=products.find(x=>x.sku===sku);const entry={sku,nama:p?.nama||'',qty:parseInt(qty),hargaModal:parseFloat(document.getElementById('stkModal')?.value)||0,driver:document.getElementById('stkDriver')?.value,rit:document.getElementById('stkRit')?.value,status:document.getElementById('stkStatus')?.value,date:new Date().toISOString().split('T')[0],id:'STK-'+Date.now(),totalModal:parseInt(qty)*parseFloat(document.getElementById('stkModal')?.value||0)};stockInHistory.unshift(entry);if(p){p.stokMasuk=(p.stokMasuk||0)+parseInt(qty);p.stokAkhir=(p.stokAwal||0)+p.stokMasuk-p.stokKeluar;}saveAllData();syncToGoogleSheets('addStockIn',entry);Swal.fire('Sukses','Barang masuk dicatat','success');loadStockHistory();}

function showAddProduct(){document.getElementById('prodForm').innerHTML='<div class="card"><div class="card-title">Tambah Produk Baru</div><div class="form-group"><label>SKU *</label><input id="newSku" placeholder="Contoh: AQ003"></div><div class="form-group"><label>Nama Produk *</label><input id="newNama" placeholder="Nama produk"></div><div class="flex-row"><div class="form-group col-1"><label>Harga Modal</label><input type="number" id="newModal" value="0"></div><div class="form-group col-1"><label>Harga Jual</label><input type="number" id="newJual" value="0"></div></div><div class="form-group"><label>Stok Awal</label><input type="number" id="newStok" value="0"></div><button class="btn-primary btn-block" onclick="saveNewProduct()">Simpan Produk</button><button class="btn-outline btn-block mt-2" onclick="document.getElementById(\'prodForm\').innerHTML=\'\'">Batal</button></div>';}
async function saveNewProduct(){const d={sku:document.getElementById('newSku')?.value.trim(),nama:document.getElementById('newNama')?.value.trim(),modal:parseFloat(document.getElementById('newModal')?.value)||0,jual:parseFloat(document.getElementById('newJual')?.value)||0,stokAwal:parseInt(document.getElementById('newStok')?.value)||0};if(!d.sku||!d.nama)return Swal.fire('Error','SKU & Nama wajib diisi','error');if(products.some(p=>p.sku===d.sku))return Swal.fire('Error','SKU sudah ada!','error');products.push({...d,stokMasuk:0,stokKeluar:0,stokAkhir:d.stokAwal});saveAllData();syncToGoogleSheets('addProduct',d);document.getElementById('prodForm').innerHTML='';navigateTo('produk');Swal.fire('Sukses','Produk ditambahkan','success');}
function editProduct(sku){const p=products.find(x=>String(x.sku)===String(sku));if(!p)return;document.getElementById('prodForm').innerHTML=`<div class="card"><div class="card-title">Edit Produk: ${p.sku}</div><div class="form-group"><label>Nama</label><input id="editNama" value="${p.nama||''}"></div><div class="flex-row"><div class="form-group col-1"><label>Modal</label><input type="number" id="editModal" value="${p.modal||0}"></div><div class="form-group col-1"><label>Jual</label><input type="number" id="editJual" value="${p.jual||0}"></div></div><button class="btn-primary btn-block" onclick="saveEditProduct('${p.sku}')">Update</button><button class="btn-danger btn-block mt-2" onclick="deleteProductConfirm('${p.sku}')">Hapus Produk</button><button class="btn-outline btn-block mt-2" onclick="document.getElementById('prodForm').innerHTML=''">Batal</button></div>`;}
async function saveEditProduct(sku){const nama=document.getElementById('editNama')?.value.trim(),modal=parseFloat(document.getElementById('editModal')?.value)||0,jual=parseFloat(document.getElementById('editJual')?.value)||0;if(!nama)return Swal.fire('Error','Nama wajib diisi','error');const idx=products.findIndex(x=>String(x.sku)===String(sku));if(idx!==-1){products[idx].nama=nama;products[idx].modal=modal;products[idx].jual=jual;}saveAllData();syncToGoogleSheets('updateProduct',{sku,nama,modal,jual});document.getElementById('prodForm').innerHTML='';navigateTo('produk');Swal.fire('Sukses','Produk diupdate','success');}
async function deleteProductConfirm(sku){const c=await Swal.fire({title:'Hapus produk?',text:`Produk ${sku} akan dihapus`,icon:'warning',showCancelButton:true,confirmButtonText:'Ya, Hapus'});if(c.isConfirmed){products=products.filter(x=>String(x.sku)!==String(sku));saveAllData();syncToGoogleSheets('deleteProduct',{sku});document.getElementById('prodForm').innerHTML='';navigateTo('produk');Swal.fire('Sukses','Produk dihapus','success');}}
function pagePelanggan(){let h='<div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-address-book"></i> Daftar Pelanggan</div><button class="btn-primary btn-sm" onclick="showAddPelangganForm()" style="padding:6px 12px;">+ Tambah</button></div><div id="pelangganList"></div></div>';return h;}
function showAddPelangganForm(){Swal.fire({title:'Tambah Pelanggan',input:'text',inputPlaceholder:'Nama Pelanggan',showCancelButton:true,confirmButtonText:'Tambah',preConfirm:(n)=>{if(!n)return Swal.showValidationMessage('Nama tidak boleh kosong');if(pelanggan.includes(n))return Swal.showValidationMessage('Nama sudah ada');pelanggan.push(n);saveAllData();syncToGoogleSheets('addPelanggan',{name:n});renderPelangganList();return n;}});}
function renderPelangganList(){const el=document.getElementById('pelangganList');if(!el)return;if(pelanggan.length===0){el.innerHTML='<p class="text-center text-sm">📭 Belum ada pelanggan</p>';return;}let h='<table style="width:100%;font-size:0.65rem;"><tr><th>No</th><th>Nama Pelanggan</th><th>Aksi</th><tr>';pelanggan.forEach((c,i)=>{h+=`<tr><td style="padding:4px;width:40px;">${i+1}</td><td style="padding:4px;">${c}</td><td style="padding:4px;"><button class="btn-danger btn-sm" onclick="deletePelanggan('${c}')" style="padding:4px 8px;"><i class="fas fa-trash"></i></button></td></tr>`;});h+='</table>';el.innerHTML=h;}
async function deletePelanggan(name){const c=await Swal.fire({title:'Hapus pelanggan?',text:name,icon:'warning',showCancelButton:true});if(c.isConfirmed){pelanggan=pelanggan.filter(p=>p!==name);saveAllData();syncToGoogleSheets('deletePelanggan',{name});renderPelangganList();Swal.fire('Sukses','Pelanggan dihapus','success');}}
function pagePengaturan(){return`<div class="card"><div class="card-title"><i class="fas fa-store"></i> Info Toko</div><div class="form-group"><label>Nama Toko</label><input id="setNama" value="${settings.namaToko||''}"></div><div class="form-group"><label>Tagline</label><input id="setTagline" value="${settings.tagline||''}"></div><div class="form-group"><label>Alamat</label><input id="setAlamat" value="${settings.alamat||''}"></div><button class="btn-primary btn-block" onclick="saveSettings()">Simpan</button></div><div class="card"><div class="card-title"><i class="fas fa-upload"></i> Upload Logo & QRIS</div><div class="form-group"><label>Logo</label><input type="file" accept="image/*" onchange="uploadLogo(event)">${settings.logo?'<img src="'+settings.logo+'" style="width:60px;height:60px;border-radius:50%;margin-top:8px;">':''}</div><div class="form-group"><label>QRIS</label><input type="file" accept="image/*" onchange="uploadQris(event)">${settings.qris?'<img src="'+settings.qris+'" style="width:80px;margin-top:8px;">':''}</div></div><div class="card"><div class="card-title"><i class="fas fa-university"></i> Bank</div>${banks.map(b=>`<div class="flex-between"><span>${b.logo} <b>${b.name}</b>: ${b.number} (${b.holder})</span><button class="btn-danger btn-sm" onclick="deleteBank('${b.name}')"><i class="fas fa-trash"></i></button></div>`).join('')}<div class="flex-row mt-2"><input id="bnkName" placeholder="Bank" style="flex:1;"><input id="bnkNum" placeholder="No.Rek" style="flex:1;"><input id="bnkHolder" placeholder="Pemilik" style="flex:1;"><button class="btn-primary btn-sm" onclick="addBank()">+</button></div></div><div class="card"><div class="card-title"><i class="fas fa-users"></i> User</div>${allUsers.map(u=>`<div class="flex-between"><span>🔑 ${u.name} (${u.role})</span></div>`).join('')}<div class="flex-row mt-2"><input id="newUserName" placeholder="User" style="flex:1;"><select id="newUserRole" style="flex:1;"><option value="admin">Admin</option><option value="sales">Sales</option><option value="driver">Driver</option></select><input id="newUserPass" value="123456" style="flex:1;"><button class="btn-primary btn-sm" onclick="addUserLogin()">+</button></div></div><div class="card"><div class="card-title"><i class="fas fa-truck"></i> Driver</div>${drivers.map(d=>`<div class="flex-between"><span>🚚 ${d}</span><button class="btn-danger btn-sm" onclick="deleteDriver('${d}')"><i class="fas fa-trash"></i></button></div>`).join('')}<div class="flex-row mt-2"><input id="drvName" placeholder="Driver" style="flex:2;"><button class="btn-primary btn-sm" onclick="addDriver()">+</button></div></div><div class="card"><div class="card-title"><i class="fas fa-database"></i> Backup & Restore</div><button class="btn-success btn-block mb-2" onclick="backupData()"><i class="fas fa-download"></i> Backup Data</button><button class="btn-warning btn-block" onclick="restoreData()"><i class="fas fa-upload"></i> Restore Data</button></div>`;}
async function saveSettings(){settings.namaToko=document.getElementById('setNama')?.value;settings.tagline=document.getElementById('setTagline')?.value;settings.alamat=document.getElementById('setAlamat')?.value;saveAllData();syncToGoogleSheets('updateSettings',settings);document.getElementById('headerAlamat').textContent=settings.alamat;Swal.fire('Sukses','Pengaturan disimpan','success');}
function uploadLogo(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){document.getElementById('logoImg').src=ev.target.result;settings.logo=ev.target.result;saveAllData();};r.readAsDataURL(f);}
function uploadQris(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){settings.qris=ev.target.result;saveAllData();Swal.fire('Sukses','QRIS diupload','success');};r.readAsDataURL(f);}
async function addBank(){const n=document.getElementById('bnkName')?.value,num=document.getElementById('bnkNum')?.value,h=document.getElementById('bnkHolder')?.value;if(!n||!num)return Swal.fire('Error','Bank dan No.Rek wajib','error');banks.push({name:n,number:num,holder:h||'',logo:'🏦'});saveAllData();syncToGoogleSheets('addBank',{name:n,number:num,holder:h});navigateTo('pengaturan');}
async function deleteBank(name){banks=banks.filter(b=>b.name!==name);saveAllData();syncToGoogleSheets('deleteBank',{name});navigateTo('pengaturan');}
async function addUserLogin(){const n=document.getElementById('newUserName')?.value,ro=document.getElementById('newUserRole')?.value,p=document.getElementById('newUserPass')?.value;if(!n)return Swal.fire('Error','Username wajib','error');if(allUsers.some(u=>u.name===n))return Swal.fire('Error','Username sudah ada','error');allUsers.push({name:n,role:ro,password:p||'123456'});saveAllData();syncToGoogleSheets('addUser',{name:n,role:ro,password:p});navigateTo('pengaturan');Swal.fire('Sukses','User ditambahkan','success');}
async function addDriver(){const n=document.getElementById('drvName')?.value;if(!n)return Swal.fire('Error','Nama driver wajib','error');if(drivers.includes(n))return Swal.fire('Error','Driver sudah ada','error');drivers.push(n);saveAllData();syncToGoogleSheets('addDriver',{name:n});navigateTo('pengaturan');}
async function deleteDriver(name){drivers=drivers.filter(d=>d!==name);saveAllData();syncToGoogleSheets('deleteDriver',{name});navigateTo('pengaturan');}
function backupData(){const data={products,pelanggan,salesHistory,stockInHistory,setoranHistory,drivers,banks,settings,allUsers};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`backup_tirta_${new Date().toISOString().split('T')[0]}.json`;a.click();URL.revokeObjectURL(a.href);Swal.fire('Sukses','Data berhasil dibackup','success');}
function restoreData(){const input=document.createElement('input');input.type='file';input.accept='application/json';input.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.products)products=d.products;if(d.pelanggan)pelanggan=d.pelanggan;if(d.salesHistory)salesHistory=d.salesHistory;if(d.stockInHistory)stockInHistory=d.stockInHistory;if(d.setoranHistory)setoranHistory=d.setoranHistory;if(d.drivers)drivers=d.drivers;if(d.banks)banks=d.banks;if(d.settings)settings={...settings,...d.settings};if(d.allUsers)allUsers=d.allUsers;saveAllData();refreshAllData();Swal.fire('Sukses','Data berhasil direstore','success');}catch(err){Swal.fire('Error','File tidak valid','error');}};r.readAsText(f);};input.click();}

document.addEventListener('DOMContentLoaded',()=>{loadAllData();initDarkMode();const savedUser=localStorage.getItem('tirtaUser');if(savedUser){currentUser=JSON.parse(savedUser);showMainApp();}});
</script>
</body>
</html>
