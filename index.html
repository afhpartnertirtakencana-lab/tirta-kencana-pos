<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Tirta Kencana · Air Minum</title>
  <!-- SweetAlert2 dari CDN yang reliable -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --biru: #0A4D8C;
      --kuning: #F5B41B;
      --biru-muda: #E6F0FA;
      --kuning-muda: #FFF8E1;
      --bg: #F1F5F9;
      --card: #FFFFFF;
      --border: #E2E8F0;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --radius: 16px;
      --text: #1E293B;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 12px;
      color: var(--text);
    }

    .app-container {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(10, 77, 140, 0.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 95vh;
    }

    @media (min-width: 768px) { .app-container { max-width: 720px; } }
    @media (min-width: 1024px) { .app-container { max-width: 1000px; } }

    .header {
      background: linear-gradient(135deg, #0A4D8C 0%, #0B5FA5 100%);
      color: white;
      padding: 18px 20px 14px;
      text-align: center;
    }
    .brand { font-size: 1.9rem; font-weight: 800; display: flex; justify-content: center; gap: 6px; }
    .tirta { color: #fff; }
    .kencana { color: #F5B41B; }
    .tagline { font-size: 0.7rem; opacity: 0.9; letter-spacing: 0.5px; margin: 4px 0; }
    .alamat { font-size: 0.65rem; opacity: 0.8; }
    .logo-header {
      width: 48px; height: 48px; background: white; border-radius: 50%;
      margin: 8px auto 0; overflow: hidden; border: 2px solid #F5B41B;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .logo-header img { width: 100%; height: 100%; object-fit: contain; }

    .nav-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 14px; background: #F8FAFC; border-bottom: 1px solid var(--border);
    }
    .user-info { display: flex; align-items: center; gap: 8px; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%; background: var(--biru);
      color: white; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem;
    }
    .role-tag {
      background: var(--kuning); color: #0A2540; padding: 3px 10px;
      border-radius: 20px; font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
    }
    .btn-logout {
      background: #EF4444; color: white; border: none; padding: 6px 14px;
      border-radius: 8px; font-size: 0.7rem; cursor: pointer; font-weight: 600;
    }

    .menu-tabs {
      display: flex; overflow-x: auto; gap: 4px; padding: 8px 10px;
      background: white; border-bottom: 1px solid var(--border);
    }
    .menu-tabs::-webkit-scrollbar { height: 0; }
    .tab {
      flex: 0 0 auto; padding: 7px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: white; font-size: 0.7rem;
      font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.2s;
      color: #64748B; display: flex; align-items: center; gap: 4px;
    }
    .tab i { font-size: 0.8rem; }
    .tab.active { background: var(--biru); color: white; border-color: var(--biru); }

    .content-area {
      flex: 1; padding: 12px; overflow-y: auto;
      max-height: calc(100vh - 280px);
    }
    .card {
      background: var(--card); border-radius: var(--radius); padding: 16px;
      box-shadow: var(--shadow); margin-bottom: 10px; border: 1px solid var(--border);
    }
    .card-title {
      font-weight: 700; font-size: 0.9rem; margin-bottom: 12px;
      color: var(--biru); display: flex; align-items: center; gap: 6px;
    }
    .card-title i { color: var(--kuning); }

    .form-group { margin-bottom: 8px; }
    .form-group label { display: block; font-size: 0.7rem; font-weight: 600; color: #475569; margin-bottom: 3px; }
    input, select, textarea {
      width: 100%; padding: 9px 12px; border-radius: 10px;
      border: 1px solid #CBD5E1; font-size: 0.8rem; outline: none; background: white;
    }
    input:focus, select:focus { border-color: var(--biru); box-shadow: 0 0 0 3px rgba(10,77,140,0.1); }

    .btn {
      padding: 10px 16px; border-radius: 12px; border: none; font-size: 0.8rem;
      font-weight: 600; cursor: pointer; display: inline-flex; align-items: center;
      gap: 6px; transition: 0.2s;
    }
    .btn-primary { background: var(--biru); color: white; }
    .btn-primary:hover { background: #083d6e; }
    .btn-warning { background: var(--kuning); color: #0A2540; }
    .btn-success { background: #10B981; color: white; }
    .btn-danger { background: #EF4444; color: white; }
    .btn-outline { background: white; border: 2px solid var(--biru); color: var(--biru); }
    .btn-sm { padding: 6px 10px; font-size: 0.7rem; border-radius: 8px; }
    .btn-block { width: 100%; justify-content: center; }

    .flex-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .col-2 { flex: 2; }
    .col-1 { flex: 1; }
    .total-box {
      background: var(--kuning-muda); padding: 10px 14px; border-radius: 12px;
      margin: 8px 0; text-align: right; font-weight: 700; font-size: 1.1rem; color: var(--biru);
    }
    .status-badge {
      padding: 3px 8px; border-radius: 10px; font-size: 0.6rem; font-weight: 600;
      display: inline-block;
    }
    .status-cod { background: #D1FAE5; color: #065F46; }
    .status-transfer { background: #DBEAFE; color: #1E40AF; }
    .status-qris { background: #FEF3C7; color: #92400E; }
    .status-belumbayar { background: #FEE2E2; color: #991B1B; }
    .status-kiriman { background: #E0E7FF; color: #3730A3; }
    .status-titipan { background: #FCE7F3; color: #9D174D; }
    table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
    th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: var(--biru-muda); color: var(--biru); font-weight: 700; font-size: 0.65rem; }
    .bottom-bar {
      text-align: center; font-size: 0.65rem; color: #64748B;
      padding: 10px; border-top: 1px solid var(--border); background: #F8FAFC;
    }
    .hidden { display: none !important; }
    .mb-2 { margin-bottom: 8px; }
    .mt-2 { margin-top: 8px; }
    .text-sm { font-size: 0.7rem; }
    .text-center { text-align: center; }
    .summary-box {
      flex: 1; text-align: center; padding: 10px; border-radius: 12px;
      font-size: 0.65rem;
    }
    .detail-group {
      margin: 8px 0; padding: 10px; background: #F8FAFC;
      border-radius: 10px; border-left: 3px solid var(--biru);
    }
    .detail-group h5 { font-size: 0.7rem; margin-bottom: 6px; color: var(--biru); }

    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0A4D8C, #0B5FA5);
    }
    .login-card {
      background: white;
      padding: 30px;
      border-radius: 24px;
      width: 340px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 20px;
      max-width: 400px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
    }
    
    .bank-info {
      background: #F0F9FF;
      border: 1px solid #BAE6FD;
      border-radius: 10px;
      padding: 10px;
      margin: 10px 0;
      font-size: 0.7rem;
    }
    
    .loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.8);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.2rem;
      color: var(--biru);
    }
  </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-container">
  <div class="login-card">
    <div class="brand" style="margin-bottom:10px;">
      <span style="color:#0A4D8C;">Tirta</span><span style="color:#F5B41B;">Kencana</span>
    </div>
    <p style="font-size:0.7rem;color:#64748B;margin-bottom:20px;">DO GOOD AND GOOD WILL COME TO YOU</p>
    <div class="form-group">
      <input type="text" id="loginUser" placeholder="Username" style="text-align:center;" autocomplete="off">
    </div>
    <div class="form-group">
      <input type="password" id="loginPass" placeholder="Password" style="text-align:center;">
    </div>
    <button class="btn btn-primary btn-block" id="btnLogin" onclick="doLogin()">
      <i class="fas fa-sign-in-alt"></i> Masuk
    </button>
    <p style="font-size:0.6rem;margin-top:10px;color:#94A3B8;">Admin: Admin / admin123 | Sales: Sales A / sales123</p>
    <p id="loginError" style="font-size:0.6rem;color:#EF4444;margin-top:8px;display:none;"></p>
  </div>
</div>

<!-- MAIN APP (hidden by default) -->
<div id="mainApp" class="app-container hidden">
  <div class="header">
    <div class="brand"><span class="tirta">Tirta</span><span class="kencana">Kencana</span></div>
    <div class="tagline">DO GOOD AND GOOD WILL COME TO YOU</div>
    <div class="alamat" id="headerAlamat">WTC Mangga 2 Lt UG A/53</div>
    <div class="logo-header" onclick="document.getElementById('logoFileInput').click()">
      <img id="logoImg" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle fill='%230A4D8C' cx='20' cy='20' r='18'/%3E%3Ctext x='20' y='26' text-anchor='middle' fill='white' font-size='16'%3E💧%3C/text%3E%3C/svg%3E" alt="Logo">
    </div>
    <input type="file" id="logoFileInput" accept="image/*" style="display:none" onchange="uploadLogo(event)">
  </div>

  <div class="nav-bar">
    <div class="user-info">
      <div class="avatar" id="userAvatar">A</div>
      <div>
        <div style="font-size:0.75rem;font-weight:600;" id="displayName">Admin</div>
        <span class="role-tag" id="displayRole">ADMIN</span>
      </div>
    </div>
    <button class="btn-logout" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i></button>
  </div>

  <div class="menu-tabs" id="menuTabs"></div>
  <div class="content-area" id="contentArea"></div>
  <div class="bottom-bar">Terima kasih sudah berbelanja · Tirta Kencana</div>
</div>

<!-- MODAL STRUK -->
<div class="modal-overlay" id="strukModal" onclick="closeStruk()">
  <div class="modal" id="strukContent" onclick="event.stopPropagation()"></div>
</div>

<script>
// ============================================
// KONFIGURASI
// ============================================
const GOOGLE_SHEETS_URL = '1IKMdWFbF2vkIqNZOUB3gW6hakWicwszFySSJ9HyFa08'; // Isi URL Web App Google Apps Script
const USE_GOOGLE_SHEETS = true; // Ubah true jika sudah deploy

// ============================================
// DEBUG HELPER
// ============================================
function log(msg, data) {
  console.log('[' + new Date().toLocaleTimeString() + ']', msg, data || '');
}

function showError(msg) {
  const el = document.getElementById('loginError');
  if (el) {
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3000);
  }
  console.error('ERROR:', msg);
}

// ============================================
// STATE
// ============================================
let currentUser = null;
let currentPage = 'penjualan';
let products = [];
let pelanggan = [];
let cart = [];
let salesHistory = [];
let stockInHistory = [];
let drivers = ['Hendri', 'Asep', 'Budi', 'Joko'];
let salesUsers = ['Sales A', 'Sales B'];
let banks = [
  { name: 'BCA', number: '6930099099', holder: 'Hendri', logo: '🏦' },
  { name: 'bluBCA', number: '002283588888', holder: 'Hendri', logo: '💳' }
];
let settings = {
  namaToko: 'Tirta Kencana',
  alamat: 'WTC Mangga 2 Lt UG A/53',
  tagline: 'DO GOOD AND GOOD WILL COME TO YOU',
  bottomLine: 'Terima kasih sudah berbelanja',
  logo: '',
  qris: ''
};
let allUsers = [
  { name: 'Admin', role: 'admin', password: 'admin123' },
  { name: 'Sales A', role: 'sales', password: 'sales123' },
  { name: 'Sales B', role: 'sales', password: 'sales123' }
];

// ============================================
// INIT
// ============================================
document.addEventListener('DOMContentLoaded', function() {
  log('App starting...');
  
  try {
    loadAllData();
    log('Data loaded');
    
    const savedUser = localStorage.getItem('tirtaUser');
    if (savedUser) {
      currentUser = JSON.parse(savedUser);
      log('User found:', currentUser.name);
      showMainApp();
    } else {
      log('No saved user, showing login');
      document.getElementById('loginPage').classList.remove('hidden');
    }
  } catch(e) {
    showError('Gagal memuat aplikasi: ' + e.message);
    document.getElementById('loginPage').classList.remove('hidden');
  }
});

// ============================================
// SYNC GOOGLE SHEETS
// ============================================
async function syncToGoogleSheets(action, data) {
  if (!USE_GOOGLE_SHEETS || !GOOGLE_SHEETS_URL) return false;
  
  try {
    await fetch(GOOGLE_SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action, data })
    });
    log('Synced:', action);
    return true;
  } catch(e) {
    log('Sync pending:', e.message);
    return false;
  }
}

// ============================================
// LOCAL STORAGE
// ============================================
function saveAllData() {
  try {
    const data = { products, pelanggan, salesHistory, stockInHistory, drivers, salesUsers, banks, settings, allUsers };
    localStorage.setItem('tirtaFullData', JSON.stringify(data));
  } catch(e) {
    log('Save error:', e.message);
  }
}

function loadAllData() {
  try {
    const saved = localStorage.getItem('tirtaFullData');
    if (saved) {
      const data = JSON.parse(saved);
      products = data.products || [];
      pelanggan = data.pelanggan || data.customers || [];
      salesHistory = data.salesHistory || [];
      stockInHistory = data.stockInHistory || [];
      drivers = data.drivers || drivers;
      salesUsers = data.salesUsers || salesUsers;
      banks = data.banks || banks;
      settings = { ...settings, ...(data.settings || {}) };
      allUsers = data.allUsers || allUsers;
    }
  } catch(e) {
    log('Load error:', e.message);
  }
  
  if (products.length === 0) {
    products = [
      { sku:'AQ001', nama:'Aqua 330ml', modal:2200, jual:3500, stokAwal:100, stokMasuk:0, stokKeluar:0, stokAkhir:100 },
      { sku:'AQ002', nama:'Aqua 600ml', modal:2500, jual:4000, stokAwal:150, stokMasuk:0, stokKeluar:0, stokAkhir:150 },
      { sku:'LS001', nama:'Le Minerale 330ml', modal:1500, jual:2500, stokAwal:80, stokMasuk:0, stokKeluar:0, stokAkhir:80 },
      { sku:'LS002', nama:'Le Minerale 600ml', modal:1800, jual:3000, stokAwal:90, stokMasuk:0, stokKeluar:0, stokAkhir:90 }
    ];
  }
  if (pelanggan.length === 0) {
    pelanggan = ['Warung Mpok', 'Toko Berkah', 'Kantin Sejahtera', 'Pak Budi', 'Bu Ani'];
  }
}

// ============================================
// AUTH (DIPERBAIKI)
// ============================================
function doLogin() {
  log('Login attempt...');
  
  try {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    
    if (!user || !pass) {
      showError('Isi username dan password!');
      return;
    }
    
    // Cari user
    const found = allUsers.find(u => u.name === user && u.password === pass);
    
    if (found) {
      log('Login success:', found.name);
      currentUser = { name: found.name, role: found.role };
      localStorage.setItem('tirtaUser', JSON.stringify(currentUser));
      showMainApp();
    } else {
      showError('Username atau password salah!');
    }
  } catch(e) {
    showError('Error: ' + e.message);
  }
}

// Tambahkan event listener untuk Enter key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const loginPage = document.getElementById('loginPage');
    if (loginPage && !loginPage.classList.contains('hidden')) {
      doLogin();
    }
  }
});

function doLogout() {
  localStorage.removeItem('tirtaUser');
  currentUser = null;
  cart = [];
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('mainApp').classList.add('hidden');
  log('Logged out');
}

function showMainApp() {
  try {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    
    document.getElementById('displayName').textContent = currentUser.name || 'User';
    document.getElementById('displayRole').textContent = (currentUser.role || 'sales').toUpperCase();
    document.getElementById('userAvatar').textContent = (currentUser.name || 'U').charAt(0).toUpperCase();
    
    if (settings.alamat) document.getElementById('headerAlamat').textContent = settings.alamat;
    if (settings.logo) document.getElementById('logoImg').src = settings.logo;
    
    log('Main app shown');
    renderMenuTabs();
    navigateTo('penjualan');
  } catch(e) {
    log('Error showing main app:', e.message);
  }
}

// ============================================
// NAVIGATION
// ============================================
function renderMenuTabs() {
  try {
    let html = `
      <button class="tab ${currentPage==='penjualan'?'active':''}" onclick="navigateTo('penjualan')"><i class="fas fa-cash-register"></i> Jual</button>
      <button class="tab ${currentPage==='rekap'?'active':''}" onclick="navigateTo('rekap')"><i class="fas fa-chart-bar"></i> Rekap</button>
    `;
    if (currentUser?.role === 'admin') {
      html += `
        <button class="tab ${currentPage==='inputbarang'?'active':''}" onclick="navigateTo('inputbarang')"><i class="fas fa-boxes"></i> Input</button>
        <button class="tab ${currentPage==='rekaptoko'?'active':''}" onclick="navigateTo('rekaptoko')"><i class="fas fa-warehouse"></i> Gudang</button>
        <button class="tab ${currentPage==='produk'?'active':''}" onclick="navigateTo('produk')"><i class="fas fa-cubes"></i> Produk</button>
        <button class="tab ${currentPage==='pelanggan'?'active':''}" onclick="navigateTo('pelanggan')"><i class="fas fa-address-book"></i> Pelanggan</button>
        <button class="tab ${currentPage==='pengaturan'?'active':''}" onclick="navigateTo('pengaturan')"><i class="fas fa-cog"></i> Atur</button>
      `;
    }
    document.getElementById('menuTabs').innerHTML = html;
  } catch(e) {
    log('Menu error:', e.message);
  }
}

function navigateTo(page) {
  currentPage = page;
  renderMenuTabs();
  renderContent();
}

function renderContent() {
  try {
    const c = document.getElementById('contentArea');
    if (!c) return;
    
    switch(currentPage) {
      case 'penjualan':
        c.innerHTML = getPenjualanHTML();
        initPenjualan();
        break;
      case 'rekap':
        loadRekapPenjualan(c);
        break;
      case 'inputbarang':
        c.innerHTML = getInputBarangHTML();
        initInputBarang();
        break;
      case 'rekaptoko':
        loadRekapStockIn(c);
        break;
      case 'produk':
        c.innerHTML = getProdukHTML();
        break;
      case 'pelanggan':
        c.innerHTML = getPelangganHTML();
        break;
      case 'pengaturan':
        c.innerHTML = getPengaturanHTML();
        break;
      default:
        c.innerHTML = '<p>Halaman tidak ditemukan</p>';
    }
  } catch(e) {
    log('Render error:', e.message);
  }
}

// ============================================
// API CALL (SEDERHANA)
// ============================================
function apiCall(action, data = {}) {
  const syncActions = ['createSale','updateSale','deleteSale','addStockIn','addProduct','updateProduct','deleteProduct','updateSettings','addPelanggan','deletePelanggan','addDriver','deleteDriver','addBank','deleteBank','addSalesUser','deleteSalesUser','addUser','deleteUser'];
  
  let result = { success: true };
  
  // Handle actions sederhana
  try {
    switch(action) {
      case 'getProducts': result = { success: true, data: products }; break;
      case 'getPelanggan': result = { success: true, data: pelanggan }; break;
      case 'getSales':
        let s = [...salesHistory];
        if (data.user && data.role === 'sales') s = s.filter(x => x.user === data.user);
        result = { success: true, data: s.slice(-200).reverse() };
        break;
      case 'getStockIn': result = { success: true, data: stockInHistory.slice(-100).reverse() }; break;
      case 'getSettings': result = { success: true, data: settings }; break;
      case 'getBanks': result = { success: true, data: banks }; break;
      case 'getDrivers': result = { success: true, data: drivers }; break;
      case 'getSalesUsers': result = { success: true, data: salesUsers }; break;
      case 'getUsers': result = { success: true, data: allUsers }; break;
      default:
        // Untuk create/update, panggil handleLocalAction
        result = handleLocalAction(action, data);
    }
  } catch(e) {
    result = { success: false, message: e.message };
  }
  
  if (result.success && syncActions.includes(action)) {
    syncToGoogleSheets(action, data);
  }
  
  return result;
}

function handleLocalAction(action, data) {
  // Simple CRUD operations
  switch(action) {
    case 'createSale': {
      const id = 'INV-' + Date.now();
      let total = 0, tq = 0, td = 0;
      const items = data.items.map(i => {
        const q = parseInt(i.qty)||0, h = parseFloat(i.harga)||0, d = parseFloat(i.disc)||0;
        const dt = d * q;
        const sub = (q * h) - dt;
        total += sub; tq += q; td += dt;
        return { ...i, qty: q, harga: h, disc: d, discTotal: dt, subtotal: sub };
      });
      
      salesHistory.unshift({
        id, user: data.user, customer: data.customer, status: data.status,
        items, total, totalQty: tq, totalDisc: td,
        date: data.date || new Date().toISOString().split('T')[0],
        time: new Date().toLocaleTimeString('id-ID')
      });
      
      if (!pelanggan.includes(data.customer)) pelanggan.push(data.customer);
      saveAllData();
      return { success: true, data: { id, total } };
    }
    case 'addStockIn': {
      const sid = 'STK-' + Date.now();
      const q = parseInt(data.qty)||0, m = parseFloat(data.hargaModal)||0;
      stockInHistory.unshift({
        id: sid, sku: data.sku, nama: data.nama||'', qty: q,
        hargaModal: m, totalModal: q*m,
        driver: data.driver||'', rit: data.rit||'', status: data.status||'kiriman',
        date: new Date().toISOString().split('T')[0]
      });
      saveAllData();
      return { success: true };
    }
    case 'addPelanggan':
      if (data.name && !pelanggan.includes(data.name)) { pelanggan.push(data.name); saveAllData(); }
      return { success: true, data: pelanggan };
    case 'deletePelanggan':
      pelanggan = pelanggan.filter(c => c !== data.name);
      saveAllData();
      return { success: true, data: pelanggan };
    case 'addProduct':
      if (!data.sku) return { success: false, message: 'SKU wajib' };
      const st = parseInt(data.stokAwal)||0;
      products.push({ sku:data.sku, nama:data.nama||'', modal:parseFloat(data.modal)||0, jual:parseFloat(data.jual)||0, stokAwal:st, stokMasuk:0, stokKeluar:0, stokAkhir:st });
      saveAllData();
      return { success: true };
    case 'updateSale':
      const si = salesHistory.findIndex(x => x.id === data.id);
      if (si === -1) return { success: false };
      if (data.status) salesHistory[si].status = data.status;
      if (data.items) {
        let nt=0,nq=0,nd=0;
        const ni = data.items.map(i => {
          const q=parseInt(i.qty)||0,h=parseFloat(i.harga)||0,d=parseFloat(i.disc)||0,dt=d*q;
          const sub=(q*h)-dt; nt+=sub; nq+=q; nd+=dt;
          return {...i,qty:q,harga:h,disc:d,discTotal:dt,subtotal:sub};
        });
        salesHistory[si].items=ni; salesHistory[si].total=nt; salesHistory[si].totalQty=nq; salesHistory[si].totalDisc=nd;
      }
      saveAllData();
      return { success: true };
    case 'deleteSale':
      salesHistory = salesHistory.filter(x => x.id !== data.id);
      saveAllData();
      return { success: true };
    case 'updateSettings':
      settings = { ...settings, ...data };
      saveAllData();
      return { success: true };
    case 'addDriver':
      if (!drivers.includes(data.name)) { drivers.push(data.name); saveAllData(); }
      return { success: true, data: drivers };
    case 'deleteDriver':
      drivers = drivers.filter(d => d !== data.name);
      saveAllData();
      return { success: true, data: drivers };
    default:
      return { success: true };
  }
}

function initPenjualan() {
  if (cart.length === 0) cart.push({ sku: '', qty: 1, disc: 0 });
  renderCart();
  onStatusChange();
}

function onPelangganSelect() {
  const s = document.getElementById('custSelect');
  const n = document.getElementById('custNewInput');
  if (s && s.value === '__new__') { n.style.display = 'block'; n.focus(); }
  else if (n) { n.style.display = 'none'; n.value = ''; }
}

function onStatusChange() {
  const st = document.getElementById('payStatus')?.value;
  const box = document.getElementById('bankInfoBox');
  if (!box) return;
  
  if (st === 'transfer') {
    let h = '<strong>🏦 Transfer ke:</strong><br>';
    banks.forEach(b => { h += `• ${b.logo} <b>${b.name}</b> | No: ${b.number} | A/n: ${b.holder}<br>`; });
    box.innerHTML = h; box.style.display = 'block';
  } else if (st === 'qris' && settings.qris) {
    box.innerHTML = `<strong>📱 QRIS:</strong><br><img src="${settings.qris}" style="width:100px;height:100px;margin-top:4px;">`;
    box.style.display = 'block';
  } else {
    box.style.display = 'none';
  }
}

function getSelectedPelanggan() {
  const s = document.getElementById('custSelect');
  const n = document.getElementById('custNewInput');
  if (!s) return '';
  return s.value === '__new__' ? (n ? n.value.trim() : '') : s.value;
}

function addCartItem() { cart.push({ sku: '', qty: 1, disc: 0 }); renderCart(); }
function removeCartItem(i) { cart.splice(i,1); renderCart(); }

function updateCart(i, field, val) {
  if (field === 'qty') cart[i].qty = parseInt(val) || 1;
  else if (field === 'disc') cart[i].disc = parseInt(val) || 0;
  else cart[i][field] = val;
  if (field === 'sku') {
    const p = products.find(x => x.sku === val);
    if (p) { cart[i].harga = p.jual; cart[i].nama = p.nama; }
  }
  renderCart();
}

function renderCart() {
  const el = document.getElementById('cartItems');
  if (!el) return;
  
  let html = '';
  cart.forEach((item, i) => {
    const p = products.find(x => x.sku === item.sku);
    const harga = p ? p.jual : (item.harga || 0);
    const discPerItem = item.disc || 0;
    const totalDisc = discPerItem * item.qty;
    const sub = (item.qty * harga) - totalDisc;
    
    let prodOpts = '<option value="">Pilih</option>';
    products.forEach(p => { prodOpts += `<option value="${p.sku}" ${item.sku===p.sku?'selected':''}>${p.sku}-${p.nama}(${p.stokAkhir})</option>`; });
    
    html += `<div class="flex-row" style="margin-bottom:6px;padding:6px;background:#F8FAFC;border-radius:8px;">
      <select onchange="updateCart(${i},'sku',this.value)" style="flex:2;font-size:0.7rem;">${prodOpts}</select>
      <input type="number" value="${item.qty}" onchange="updateCart(${i},'qty',this.value)" style="width:45px;font-size:0.7rem;" min="1">
      <span style="font-size:0.6rem;">xRp${harga.toLocaleString()}</span>
      <input type="number" value="${discPerItem}" onchange="updateCart(${i},'disc',this.value)" style="width:60px;font-size:0.7rem;" placeholder="Disc">
      <span style="font-size:0.65rem;color:#EF4444;">(-Rp${totalDisc.toLocaleString()})</span>
      <span style="font-size:0.7rem;font-weight:600;">Rp${sub.toLocaleString()}</span>
      <button class="btn btn-danger btn-sm" onclick="removeCartItem(${i})" style="padding:2px 6px;">✕</button>
    </div>`;
  });
  
  el.innerHTML = html;
  
  let sa = 0, td = 0;
  cart.forEach(item => {
    const p = products.find(x => x.sku === item.sku);
    const h = p ? p.jual : (item.harga || 0);
    sa += item.qty * h;
    td += (item.disc || 0) * item.qty;
  });
  
  document.getElementById('cartSubtotal').textContent = sa.toLocaleString();
  document.getElementById('cartDisc').textContent = td.toLocaleString();
  document.getElementById('cartTotal').textContent = (sa - td).toLocaleString();
}

async function saveSale() {
  const cust = getSelectedPelanggan();
  if (!cust) return Swal.fire('Error', 'Pilih pelanggan', 'error');
  
  const valid = cart.filter(i => i.sku && products.find(p => p.sku === i.sku));
  if (valid.length === 0) return Swal.fire('Error', 'Pilih produk', 'error');
  
  const result = await apiCall('createSale', {
    user: currentUser.name,
    customer: cust,
    status: document.getElementById('payStatus')?.value || 'cod',
    items: valid.map(i => {
      const p = products.find(x => x.sku === i.sku);
      return { sku:i.sku, nama:p?.nama||'', qty:i.qty, harga:p?.jual||(i.harga||0), disc:i.disc||0 };
    }),
    date: new Date().toISOString().split('T')[0]
  });
  
  if (result.success) {
    const lastSale = salesHistory[0];
    Swal.fire({
      title: '✅ Berhasil!',
      html: `ID: <b>${result.data.id}</b><br>Total: <b>Rp${lastSale.total.toLocaleString()}</b>`,
      icon: 'success',
      showDenyButton: true,
      showCancelButton: true,
      confirmButtonText: '🖨️ Cetak',
      denyButtonText: '📥 PNG',
      cancelButtonText: '💬 WA'
    }).then(choice => {
      showStruk(lastSale);
      if (choice.isConfirmed) cetakBluetooth();
      else if (choice.isDenied) downloadStrukPNG();
      else if (choice.dismiss === Swal.DismissReason.cancel) kirimWA();
    });
    
    cart = [{ sku: '', qty: 1, disc: 0 }];
    renderCart();
    document.getElementById('custSelect').value = '';
    document.getElementById('custNewInput').style.display = 'none';
  } else {
    Swal.fire('Error', result.message || 'Gagal', 'error');
  }
}

function showStruk(s) {
  let itemsHtml = '';
  s.items.forEach(i => {
    const dt = (i.disc||0) * (i.qty||0);
    const sub = (i.qty * i.harga) - dt;
    itemsHtml += `<tr><td>${i.nama||i.sku}</td><td>${i.qty}</td><td>Rp${i.harga.toLocaleString()}</td><td>${dt>0?'Rp'+dt.toLocaleString():'-'}</td><td>Rp${sub.toLocaleString()}</td></tr>`;
  });
  
  let bankHtml = '';
  if (s.status === 'transfer') {
    bankHtml = '<div class="bank-info" style="text-align:left;"><strong>🏦 Transfer:</strong><br>';
    banks.forEach(b => { bankHtml += `• ${b.logo} <b>${b.name}</b> | ${b.number} | ${b.holder}<br>`; });
    bankHtml += '</div>';
  } else if (s.status === 'qris' && settings.qris) {
    bankHtml = `<div style="text-align:center;"><p><strong>📱 QRIS</strong></p><img src="${settings.qris}" style="width:100px;"></div>`;
  }
  
  document.getElementById('strukContent').innerHTML = `
    <div id="strukPrintArea" style="text-align:center;padding:15px;font-size:0.7rem;max-width:320px;margin:0 auto;">
      ${settings.logo?`<img src="${settings.logo}" style="width:60px;height:60px;border-radius:50%;margin-bottom:8px;">`:''}
      <h3 style="color:#0A4D8C;margin:0;">${settings.namaToko}</h3>
      <p>${settings.tagline}</p><p>${settings.alamat}</p><hr>
      <p>No: ${s.id}</p><p>Tgl: ${s.date} ${s.time||''}</p>
      <p>Pelanggan: ${s.customer}</p><p>Sales: ${s.user}</p>
      <p>Status: <span class="status-badge status-${s.status}">${s.status.toUpperCase()}</span></p>
      ${bankHtml}<hr>
      <table style="width:100%;font-size:0.6rem;"><tr><th>Item</th><th>Qty</th><th>Harga</th><th>Disc</th><th>Sub</th></tr>${itemsHtml}</table>
      <hr>
      ${(s.totalDisc||0)>0?`<p style="color:#EF4444;">Diskon: -Rp${s.totalDisc.toLocaleString()}</p>`:''}
      <p style="font-weight:bold;font-size:0.9rem;">Total: Rp${(s.total||0).toLocaleString()}</p>
      <p>${settings.bottomLine}</p>
    </div>`;
  document.getElementById('strukModal').style.display = 'flex';
}

function closeStruk() { document.getElementById('strukModal').style.display = 'none'; }
async function cetakBluetooth() {
  try { const d = await navigator.bluetooth.requestDevice({ acceptAllDevices: true }); Swal.fire('Info', 'Terhubung: ' + d.name, 'success'); }
  catch(e) { Swal.fire('Info', 'Bluetooth tidak tersedia', 'info'); }
}
function downloadStrukPNG() {
  const el = document.getElementById('strukPrintArea');
  if (!el) return;
  html2canvas(el, { scale: 2, backgroundColor: '#FFFFFF' }).then(c => {
    const a = document.createElement('a');
    a.href = c.toDataURL('image/png');
    a.download = 'struk-' + Date.now() + '.png';
    a.click();
  });
}
function kirimWA() {
  const el = document.getElementById('strukPrintArea');
  if (!el) return;
  window.open('https://wa.me/?text=' + encodeURIComponent(el.innerText), '_blank');
}

async function loadRekapPenjualan(container) {
  let html = '<div class="card"><div class="card-title"><i class="fas fa-chart-bar"></i> 📊 Rekap Penjualan</div>';
  
  if (salesHistory.length > 0) {
    const totalTrans = salesHistory.length;
    const totalPend = salesHistory.reduce((s,x) => s + (x.total||0), 0);
    const totalQty = salesHistory.reduce((s,x) => s + (x.totalQty||0), 0);
    const totalDisc = salesHistory.reduce((s,x) => s + (x.totalDisc||0), 0);
    
    html += `<div class="flex-row mb-2">
      <div class="summary-box" style="background:#E6F0FA;"><small>Transaksi</small><br><b>${totalTrans}</b></div>
      <div class="summary-box" style="background:#FFF8E1;"><small>Pendapatan</small><br><b>Rp${totalPend.toLocaleString()}</b></div>
      <div class="summary-box" style="background:#D1FAE5;"><small>QTY</small><br><b>${totalQty}</b></div>
      <div class="summary-box" style="background:#FEE2E2;"><small>Diskon</small><br><b>Rp${totalDisc.toLocaleString()}</b></div>
    </div>`;
    
    // Per Status
    const perStatus = {};
    salesHistory.forEach(s => {
      const st = s.status || 'cod';
      if (!perStatus[st]) perStatus[st] = { status:st, jumlah:0, total:0, totalQty:0, customers:{}, skus:{} };
      perStatus[st].jumlah++;
      perStatus[st].total += s.total||0;
      perStatus[st].totalQty += s.totalQty||0;
      
      if (!perStatus[st].customers[s.customer]) perStatus[st].customers[s.customer] = { customer:s.customer, jumlah:0, total:0, qty:0 };
      perStatus[st].customers[s.customer].jumlah++;
      perStatus[st].customers[s.customer].total += s.total||0;
      perStatus[st].customers[s.customer].qty += s.totalQty||0;
      
      if (s.items) s.items.forEach(i => {
        const sk = i.sku||'?';
        if (!perStatus[st].skus[sk]) perStatus[st].skus[sk] = { sku:sk, nama:i.nama||'', jumlah:0, totalQty:0, total:0 };
        perStatus[st].skus[sk].jumlah++;
        perStatus[st].skus[sk].totalQty += i.qty||0;
        perStatus[st].skus[sk].total += ((i.qty||0)*(i.harga||0))-(i.disc||0);
      });
    });
    
    html += '<h4 style="font-size:0.75rem;margin-top:12px;">💳 Per Status (SKU & Customer)</h4>';
    Object.values(perStatus).forEach(st => {
      html += `<div class="detail-group"><h5><span class="status-badge status-${st.status}">${st.status.toUpperCase()}</span> | ${st.jumlah} Transaksi | QTY:${st.totalQty} | Rp${st.total.toLocaleString()}</h5>
        <p style="font-size:0.6rem;"><b>👤 Customer:</b></p><table style="margin-bottom:4px;"><tr><th>Customer</th><th>Jml</th><th>QTY</th><th>Total</th></tr>`;
      Object.values(st.customers).sort((a,b)=>b.total-a.total).forEach(c => {
        html += `<tr><td>${c.customer}</td><td>${c.jumlah}</td><td>${c.qty}</td><td>Rp${c.total.toLocaleString()}</td></tr>`;
      });
      html += `</table><p style="font-size:0.6rem;"><b>📦 SKU:</b></p><table><tr><th>SKU</th><th>Nama</th><th>Jml</th><th>QTY</th><th>Total</th></tr>`;
      Object.values(st.skus).sort((a,b)=>b.totalQty-a.totalQty).forEach(sk => {
        html += `<tr><td>${sk.sku}</td><td>${sk.nama}</td><td>${sk.jumlah}</td><td>${sk.totalQty}</td><td>Rp${sk.total.toLocaleString()}</td></tr>`;
      });
      html += `</table></div>`;
    });
    
    // Detail
    html += '<h4 style="font-size:0.75rem;">📋 Detail</h4><table><tr><th>ID</th><th>Tgl</th><th>Pelanggan</th><th>Status</th><th>QTY</th><th>Total</th><th>Aksi</th></tr>';
    salesHistory.slice(0,30).forEach(s => {
      html += `<tr><td style="font-size:0.55rem;">${s.id}</td><td>${s.date}</td><td>${s.customer}</td>
        <td>${currentUser?.role==='admin'?`<select onchange="editSaleStatus('${s.id}',this.value)" class="status-badge status-${s.status}" style="font-size:0.55rem;"><option value="cod" ${s.status==='cod'?'selected':''}>COD</option><option value="transfer" ${s.status==='transfer'?'selected':''}>Transfer</option><option value="qris" ${s.status==='qris'?'selected':''}>QRIS</option><option value="belumbayar" ${s.status==='belumbayar'?'selected':''}>Belum Bayar</option></select>`:`<span class="status-badge status-${s.status}">${s.status}</span>`}</td>
        <td>${s.totalQty||0}</td>
        <td>Rp${(s.total||0).toLocaleString()}</td>
        <td><button class="btn btn-warning btn-sm" onclick="cetakUlangStruk('${s.id}')" style="padding:2px 4px;">📄</button></td></tr>`;
    });
    html += '</table>';
  } else {
    html += '<p class="text-center">Belum ada data penjualan</p>';
  }
  html += '</div>';
  container.innerHTML = html;
}

function cetakUlangStruk(id) {
  const s = salesHistory.find(x => x.id === id);
  if (!s) return;
  showStruk(s);
  Swal.fire({ title:'Cetak Ulang', showDenyButton:true, showCancelButton:true,
    confirmButtonText:'🖨️', denyButtonText:'📥', cancelButtonText:'💬'
  }).then(r => {
    if (r.isConfirmed) cetakBluetooth();
    else if (r.isDenied) downloadStrukPNG();
    else if (r.dismiss === Swal.DismissReason.cancel) kirimWA();
  });
}

async function editSaleStatus(id, st) {
  await apiCall('updateSale', { id, status: st });
  Swal.fire({ title:'Sukses', icon:'success', timer:800, showConfirmButton:false });
  navigateTo('rekap');
}

async function loadStockHistory() {
  const el = document.getElementById('stkHistory');
  if (!el) return;
  
  if (stockInHistory.length > 0) {
    let html = '<table><tr><th>ID</th><th>SKU</th><th>Qty</th><th>Driver</th><th>Rit</th><th>Status</th><th>Tgl</th></tr>';
    stockInHistory.slice(0,20).forEach(s => {
      html += `<tr><td style="font-size:0.55rem;">${s.id}</td><td>${s.sku}</td><td>${s.qty}</td><td>${s.driver||'-'}</td><td>${s.rit||'-'}</td><td><span class="status-badge status-${s.status}">${s.status}</span></td><td>${s.date}</td></tr>`;
    });
    html += '</table>';
    el.innerHTML = html;
  } else {
    el.innerHTML = '<p class="text-sm text-center">Belum ada data</p>';
  }
}

async function loadRekapStockIn(container) {
  let html = '<div class="card"><div class="card-title"><i class="fas fa-warehouse"></i> 📊 Rekap Gudang</div>';
  
  if (stockInHistory.length > 0) {
    const tq = stockInHistory.reduce((s,i)=>s+(i.qty||0),0);
    const tm = stockInHistory.reduce((s,i)=>s+((i.qty||0)*(i.hargaModal||0)),0);
    
    html += `<div class="flex-row mb-2">
      <div class="summary-box" style="background:#E6F0FA;"><small>Entry</small><br><b>${stockInHistory.length}</b></div>
      <div class="summary-box" style="background:#D1FAE5;"><small>QTY</small><br><b>${tq}</b></div>
      <div class="summary-box" style="background:#FFF8E1;"><small>Modal</small><br><b>Rp${tm.toLocaleString()}</b></div>
    </div>`;
    
    // Per Driver
    const perDriver = {};
    stockInHistory.forEach(s => {
      const d = s.driver || 'Tanpa';
      if (!perDriver[d]) perDriver[d] = { driver:d, jumlah:0, totalQty:0, rits:{}, skus:{} };
      perDriver[d].jumlah++; perDriver[d].totalQty += s.qty||0;
      const r = s.rit || '-';
      if (!perDriver[d].rits[r]) perDriver[d].rits[r] = { rit:r, jumlah:0, qty:0 };
      perDriver[d].rits[r].jumlah++; perDriver[d].rits[r].qty += s.qty||0;
      const sk = s.sku || '?';
      if (!perDriver[d].skus[sk]) perDriver[d].skus[sk] = { sku:sk, nama:s.nama||'', jumlah:0, qty:0 };
      perDriver[d].skus[sk].jumlah++; perDriver[d].skus[sk].qty += s.qty||0;
    });
    
    html += '<h4 style="font-size:0.75rem;">🚚 Per Driver</h4>';
    Object.values(perDriver).forEach(d => {
      html += `<div class="detail-group"><h5>${d.driver} | Entry:${d.jumlah} | QTY:${d.totalQty}</h5>
        <p style="font-size:0.6rem;">Rit: ${Object.values(d.rits).map(r=>`${r.rit}(${r.jumlah}x,${r.qty}qty)`).join(' | ')}</p>
        <p style="font-size:0.6rem;">SKU: ${Object.values(d.skus).map(sk=>`${sk.sku}(${sk.jumlah}x,${sk.qty}qty)`).join(' | ')}</p></div>`;
    });
    
    html += '<h4 style="font-size:0.75rem;">📋 Detail</h4><table><tr><th>ID</th><th>SKU</th><th>Qty</th><th>Driver</th><th>Rit</th><th>Status</th><th>Tgl</th></tr>';
    stockInHistory.slice(0,30).forEach(s => {
      html += `<tr><td style="font-size:0.55rem;">${s.id}</td><td>${s.sku}</td><td>${s.qty}</td><td>${s.driver||'-'}</td><td>${s.rit||'-'}</td><td><span class="status-badge status-${s.status}">${s.status}</span></td><td>${s.date}</td></tr>`;
    });
    html += '</table>';
  } else {
    html += '<p class="text-center">Belum ada data</p>';
  }
  html += '</div>';
  container.innerHTML = html;
}

// PRODUK, PELANGGAN, PENGATURAN

function getProdukHTML() {
  let html = '<div class="card"><div class="card-title"><i class="fas fa-cubes"></i> Produk</div>';
  html += '<button class="btn btn-primary btn-sm mb-2" onclick="showAddProduct()">+ Tambah</button>';
  html += '<table><tr><th>SKU</th><th>Nama</th><th>Modal</th><th>Jual</th><th>Stok</th></tr>';
  products.forEach(p => {
    html += `<tr><td>${p.sku}</td><td>${p.nama}</td><td>Rp${(p.modal||0).toLocaleString()}</td><td>Rp${(p.jual||0).toLocaleString()}</td><td>${p.stokAkhir||0}</td></tr>`;
  });
  html += '</table></div><div id="prodForm"></div>';
  return html;
}

function showAddProduct() {
  document.getElementById('prodForm').innerHTML = `
    <div class="card"><div class="card-title">Tambah Produk</div>
    <div class="form-group"><label>SKU</label><input id="newSku"></div>
    <div class="form-group"><label>Nama</label><input id="newNama"></div>
    <div class="flex-row"><div class="form-group col-1"><label>Modal</label><input type="number" id="newModal" value="0"></div><div class="form-group col-1"><label>Jual</label><input type="number" id="newJual" value="0"></div></div>
    <div class="form-group"><label>Stok Awal</label><input type="number" id="newStok" value="0"></div>
    <button class="btn btn-primary btn-block" onclick="saveNewProduct()">Simpan</button></div>`;
}

async function saveNewProduct() {
  const d = {
    sku: document.getElementById('newSku')?.value,
    nama: document.getElementById('newNama')?.value,
    modal: parseFloat(document.getElementById('newModal')?.value),
    jual: parseFloat(document.getElementById('newJual')?.value),
    stokAwal: parseInt(document.getElementById('newStok')?.value)
  };
  if (!d.sku || !d.nama) return Swal.fire('Error', 'SKU & Nama wajib', 'error');
  
  await apiCall('addProduct', d);
  loadAllData();
  navigateTo('produk');
  Swal.fire('Sukses', 'Produk ditambahkan', 'success');
}

function getPelangganHTML() {
  let html = '<div class="card"><div class="card-title"><i class="fas fa-address-book"></i> Pelanggan</div>';
  html += '<div class="flex-row mb-2"><input id="newCustName" placeholder="Nama" style="flex:2;"><button class="btn btn-primary btn-sm" onclick="addPelanggan()">+</button></div>';
  html += '<table><tr><th>No</th><th>Nama</th></tr>';
  pelanggan.forEach((c,i) => { html += `<tr><td>${i+1}</td><td>${c}</td></tr>`; });
  html += '</table></div>';
  return html;
}

async function addPelanggan() {
  const n = document.getElementById('newCustName')?.value.trim();
  if (!n) return;
  await apiCall('addPelanggan', { name: n });
  loadAllData();
  navigateTo('pelanggan');
}

function getPengaturanHTML() {
  return `<div class="card"><div class="card-title"><i class="fas fa-store"></i> Info Toko</div>
    <div class="form-group"><label>Nama Toko</label><input id="setNama" value="${settings.namaToko||''}"></div>
    <div class="form-group"><label>Tagline</label><input id="setTagline" value="${settings.tagline||''}"></div>
    <div class="form-group"><label>Alamat</label><input id="setAlamat" value="${settings.alamat||''}"></div>
    <button class="btn btn-primary btn-block" onclick="saveSettings()">Simpan</button></div>`;
}

async function saveSettings() {
  settings.namaToko = document.getElementById('setNama')?.value || settings.namaToko;
  settings.tagline = document.getElementById('setTagline')?.value || settings.tagline;
  settings.alamat = document.getElementById('setAlamat')?.value || settings.alamat;
  await apiCall('updateSettings', settings);
  saveAllData();
  document.getElementById('headerAlamat').textContent = settings.alamat;
  Swal.fire('Sukses', 'Disimpan', 'success');
}

function uploadLogo(e) {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = function(ev) {
    document.getElementById('logoImg').src = ev.target.result;
    settings.logo = ev.target.result;
    apiCall('updateSettings', { logo: ev.target.result });
    saveAllData();
  };
  r.readAsDataURL(f);
}

function uploadQris(e) {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = function(ev) {
    settings.qris = ev.target.result;
    apiCall('updateSettings', { qris: ev.target.result });
    saveAllData();
    Swal.fire('Sukses', 'QRIS diupload', 'success');
  };
  r.readAsDataURL(f);
}
</script>
