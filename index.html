    @media(max-width:480px){body{padding:4px;}.app-container{border-radius:16px;}.header{padding:14px 16px 10px;}.brand{font-size:1.5rem;}.tab{font-size:0.65rem;padding:6px 10px;}input,select,textarea{font-size:0.75rem;padding:8px 10px;}.btn{font-size:0.75rem;padding:8px 12px;}table{font-size:0.65rem;}th,td{padding:4px 5px;}.card{padding:12px;}.card-title{font-size:0.8rem;}.form-group label{font-size:0.65rem;}.total-box{font-size:0.9rem;}}

    .login-container{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#0A4D8C,#0B5FA5);}
    .login-card{background:white;padding:30px;border-radius:24px;width:340px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.2);}

    .setoran-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);}

<script>
// ⚠️ GANTI dengan URL Web App Anda!
const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzVcFoJQyRQll17cx9_ACk2PYwnhKJNxAO8JdeU5sjcCpZg1kdsDa0e0-v8pR_rhYB3GQ/exec';
const USE_GOOGLE_SHEETS = true;
const NOMOR_TELEPON = '088211058000';
let autoSyncInterval;

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBtn').style.display = 'block'; });
function installApp() { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(r => { if (r.outcome === 'accepted') console.log('Installed'); deferredPrompt = null; document.getElementById('installBtn').style.display = 'none'; }); } else { Swal.fire('Info', 'Klik menu browser > Add to Home Screen', 'info'); } }
function toggleDarkMode() { document.body.classList.toggle('dark'); const d = document.body.classList.contains('dark'); localStorage.setItem('tirtaDarkMode', d ? '1' : '0'); document.querySelector('.btn-darkmode').textContent = d ? '☀️' : '🌙'; }
function initDarkMode() { if (localStorage.getItem('tirtaDarkMode') === '1') { document.body.classList.add('dark'); const b = document.querySelector('.btn-darkmode'); if (b) b.textContent = '☀️'; } }

let currentUser = null, currentPage = 'penjualan', rekapSubTab = 'ringkasan';
let products = [], pelanggan = [], cart = [], salesHistory = [], stockInHistory = [], setoranHistory = [];
let drivers = [], salesUsers = [], banks = [];
let settings = { namaToko: 'Tirta Kencana', alamat: 'WTC Mangga 2 Lt UG A/53', tagline: 'DO GOOD AND GOOD WILL COME TO YOU', bottomLine: 'Terima kasih sudah berbelanja', logo: '', qris: '', telepon: '088211058000' };
let allUsers = [];

// ================= STOK DINAMIS =================
function getStokMasuk(sku) { return stockInHistory.filter(s => s.sku === sku && s.status === 'kiriman').reduce((sum, s) => sum + (s.qty || 0), 0); }
function getStokKeluar(sku) { let qty = 0; salesHistory.forEach(s => { if (s.items) s.items.forEach(item => { if (item.sku === sku) qty += item.qty || 0; }); }); return qty; }
function getStokAkhir(sku) { const p = products.find(x => x.sku === sku); return p ? (p.stokAwal || 0) + getStokMasuk(sku) - getStokKeluar(sku) : 0; }

// ================= PENYIMPANAN =================
function saveAllData() { localStorage.setItem('tirtaFullData', JSON.stringify({ products, pelanggan, salesHistory, stockInHistory, setoranHistory, drivers, salesUsers, banks, settings, allUsers })); }
function loadAllData() {
  const s = localStorage.getItem('tirtaFullData');
  if (s) { try { const d = JSON.parse(s); products = d.products || []; pelanggan = d.pelanggan || []; salesHistory = d.salesHistory || []; stockInHistory = d.stockInHistory || []; setoranHistory = d.setoranHistory || []; drivers = d.drivers || []; salesUsers = d.salesUsers || []; banks = d.banks || []; settings = { ...settings, ...(d.settings || {}) }; allUsers = d.allUsers || []; } catch (e) {} }
  if (products.length === 0) products = [
    { sku: 'aq1500', nama: 'Aqua 1500 ml', modal: 50000, jual: 55000, stokAwal: 0 },
    { sku: 'aq200', nama: 'Aqua 200 ml', modal: 33000, jual: 40000, stokAwal: 3 },
    { sku: 'aq220b', nama: 'Aqua Cube', modal: 21000, jual: 38000, stokAwal: 0 },
    { sku: 'aq330', nama: 'Aqua 330 ml', modal: 35000, jual: 42000, stokAwal: 29 },
    { sku: 'aq600', nama: 'Aqua 600 ml', modal: 44000, jual: 49000, stokAwal: 0 },
    { sku: 'aqg', nama: 'Aqua Galon 19L', modal: 16750, jual: 23000, stokAwal: 5 }
  ];
  if (pelanggan.length === 0) pelanggan = ['Warung Mpok', 'Toko Berkah'];
  if (drivers.length === 0) drivers = ['Hendri', 'Asep'];
  if (banks.length === 0) banks = [{ name: 'BCA', number: '6930099099', holder: 'Hendri', logo: '🏦' }, { name: 'bluBCA', number: '002283588888', holder: 'Hendri', logo: '💳' }];
  if (allUsers.length === 0) allUsers = [
    { name: 'admin', role: 'admin', password: '020730' },
    { name: 'hasan', role: 'sales', password: '1234' },
    { name: 'ujang', role: 'sales', password: '1234' },
    { name: 'oji', role: 'driver', password: '1234' },
    { name: 'padong', role: 'driver', password: '1234' }
  ];
  if (!settings.telepon) settings.telepon = '088211058000';
}

// ================= SINKRONISASI =================
async function syncToGoogleSheets(action, data) { if (!USE_GOOGLE_SHEETS) return; try { const payload = JSON.stringify({ action, data }); await fetch(GOOGLE_SHEETS_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: payload }); } catch (e) { console.error('Sync error:', e); } }
async function testConnection() {
  Swal.fire({ title: '🔌 Tes Koneksi', text: 'Mengirim data uji...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  try { const resp = await fetch(GOOGLE_SHEETS_URL + '?action=test'); const result = await resp.json(); if (result.success) Swal.fire('✅ Berhasil', 'Koneksi ke server OK!', 'success'); else Swal.fire('⚠️ Gagal', 'Server merespons tetapi tidak sukses.', 'warning'); }
  catch (e) { Swal.fire('❌ Error', 'Tidak dapat terhubung ke server. Periksa URL.', 'error'); }
}
async function refreshAllData(silent = false) {
  if (!silent) Swal.fire({ title: '🔄 Sync', text: 'Menarik data...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  try {
    const r = await fetch(GOOGLE_SHEETS_URL + '?action=getAllData'); const d = await r.json();
    if (d.success && d.data) {
      if (d.data.products && d.data.products.length > 0) products = d.data.products.map(p => ({ sku: p.sku, nama: p.nama, modal: Number(p.modal)||0, jual: Number(p.jual)||0, stokAwal: Number(p.stokAwal)||0 }));
      if (d.data.pelanggan && d.data.pelanggan.length > 0) pelanggan = d.data.pelanggan;
      if (d.data.salesHistory && d.data.salesHistory.length > 0) salesHistory = d.data.salesHistory;
      if (d.data.stockInHistory && d.data.stockInHistory.length > 0) stockInHistory = d.data.stockInHistory;
      if (d.data.setoranHistory && d.data.setoranHistory.length > 0) setoranHistory = d.data.setoranHistory;
      if (d.data.drivers && d.data.drivers.length > 0) drivers = d.data.drivers;
      if (d.data.banks && d.data.banks.length > 0) banks = d.data.banks;

function loadLaporanSetoran(c) { const today = new Date().toISOString().split('T')[0]; let h = `<div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-file-invoice-dollar"></i> 📊 Laporan Setoran Semua Sales</div><button class="btn-refresh btn-sm" onclick="refreshAllData()">🔄 Sync</button></div><div class="form-group"><label>Pilih Tanggal</label><input type="date" id="lapSetTgl" value="${today}" onchange="loadLaporanSetoran(document.getElementById('contentArea'))"></div>`; const tgl = document.getElementById('lapSetTgl')?.value || today; let salesUsers = allUsers.filter(u => u.role === 'sales' || u.role === 'admin').map(u => u.name); const uniqueSalesFromHistory = [...new Set(salesHistory.map(s => s.user))]; uniqueSalesFromHistory.forEach(u => { if (!salesUsers.includes(u)) salesUsers.push(u); }); if (salesUsers.length === 0) { h += '<p class="text-center text-sm">📭 Tidak ada data sales.</p></div>'; c.innerHTML = h; return; } let grandTotalCOD = 0, grandTotalSetor = 0, grandSelisih = 0; salesUsers.sort(); salesUsers.forEach(sn => { const codSalesToday = salesHistory.filter(s => s.date === tgl && s.user === sn && s.status === 'cod'); const codTotalToday = codSalesToday.reduce((sum, s) => sum + (s.total || 0), 0); const setoranUser = setoranHistory.filter(s => s.sales === sn && s.tanggal === tgl); const totalSetoranUser = setoranUser.reduce((sum, s) => sum + (s.total || 0), 0); const totalSetorUser = setoranUser.reduce((sum, s) => sum + (s.setor || 0), 0); const totalSelisihUser = setoranUser.reduce((sum, s) => sum + (s.selisih || 0), 0); if (codTotalToday > 0 || totalSetoranUser > 0) { grandTotalCOD += codTotalToday; grandTotalSetor += totalSetorUser; grandSelisih += totalSelisihUser; h += `<div class="user-section"><h4>👤 ${sn}</h4>`; if (codTotalToday > 0) h += `<div style="background:#D1FAE5;padding:8px;border-radius:8px;margin-bottom:8px;"><strong>💰 COD ${tgl}:</strong> Rp${codTotalToday.toLocaleString()}</div>`; h += `<table style="width:100%;font-size:0.65rem;margin-bottom:8px;"><tr><th>Total Setoran</th><td style="text-align:right;">Rp${totalSetoranUser.toLocaleString()}</td></tr><tr><th>Total Disetor</th><td style="text-align:right;">Rp${totalSetorUser.toLocaleString()}</td></tr><tr><th>Total Selisih</th><td style="text-align:right;color:${totalSelisihUser < 0 ? '#EF4444' : (totalSelisihUser > 0 ? '#10B981' : '#666')};">Rp${totalSelisihUser.toLocaleString()}</td></tr></table>`; if (setoranUser.length > 0) { h += `<details><summary style="cursor:pointer;color:var(--biru);font-weight:600;">📋 Detail Setoran (${setoranUser.length})</summary><table style="margin-top:8px;width:100%;font-size:0.6rem;"><tr><th>Tgl</th><th>Total</th><th>Setor</th><th>Selisih</th></tr>`; setoranUser.forEach(s => { h += `<tr><td style="padding:4px;">${s.tanggal || '-'}</td><td style="text-align:right;">Rp${(s.total || 0).toLocaleString()}</td><td style="text-align:right;">Rp${(s.setor || 0).toLocaleString()}</td><td style="text-align:right;color:${(s.selisih || 0) < 0 ? '#EF4444' : '#10B981'};">Rp${(s.selisih || 0).toLocaleString()}</td></tr>`; }); h += `</table></details>`; } if (codSalesToday.length > 0) { h += `<details><summary style="cursor:pointer;color:var(--biru);font-weight:600;">📦 Transaksi COD (${codSalesToday.length})</summary><table style="margin-top:8px;width:100%;font-size:0.6rem;"><tr><th>Tgl</th><th>Customer</th><th>Total</th></tr>`; codSalesToday.forEach(s => { h += `<tr><td style="padding:4px;">${s.date || '-'}</td><td style="padding:4px;">${(s.customer || '').substring(0, 15)}</td><td style="text-align:right;">Rp${(s.total || 0).toLocaleString()}</td></tr>`; }); h += `</table></details>`; } h += `</div>`; } }); if (grandTotalCOD > 0 || grandTotalSetor > 0) h += `<div class="total-box">📊 RINGKASAN TANGGAL ${tgl}<br>Total COD: Rp${grandTotalCOD.toLocaleString()}<br>Total Disetor: Rp${grandTotalSetor.toLocaleString()}<br><span style="color:${grandSelisih < 0 ? '#EF4444' : '#10B981'};">Total Selisih: Rp${grandSelisih.toLocaleString()}</span></div>`; else h += `<div class="total-box">ℹ️ Tidak ada data setoran/COD untuk tanggal ${tgl}.</div>`; h += `</div><div class="card text-center"><button class="btn btn-success btn-sm" onclick="exportSetoranToCSV()"><i class="fas fa-download"></i> Export CSV</button></div>`; c.innerHTML = h; }
function exportSetoranToCSV() { let csvRows = [['Nama Sales', 'Tanggal Setor', 'Total Setoran', 'Jumlah Disetor', 'Selisih', 'Grand COD', 'Makan', 'Tips', 'Parkir', 'Flazz', 'Bensin', 'Transfer', 'Cicilan', 'Tagihan', 'Waktu']]; setoranHistory.forEach(s => { csvRows.push([s.sales || '', s.tanggal || '', (s.total || 0), (s.setor || 0), (s.selisih || 0), (s.grandCOD || 0), (s.makan || 0), (s.tips || 0), (s.parkir || 0), (s.flazz || 0), (s.bensin || 0), (s.transfer || 0), (s.cicilan || 0), (s.tagihan || 0), s.waktu || '']); }); const csvContent = csvRows.map(row => row.join(',')).join('\n'); const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }); const link = document.createElement('a'); const url = URL.createObjectURL(blob); link.href = url; link.setAttribute('download', `laporan_setoran_${new Date().toISOString().split('T')[0]}.csv`); document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url); Swal.fire('Sukses', 'File CSV telah diunduh', 'success'); }

function loadKeuangan(container) { const today = new Date().toISOString().split('T')[0]; let h = `<div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-chart-pie"></i> 📊 Laporan Keuangan</div><button class="btn-refresh btn-sm" onclick="refreshAllData()">🔄 Sync</button></div><div class="form-group"><label>Pilih Tanggal</label><input type="date" id="keuTgl" value="${today}" onchange="loadKeuangan(document.getElementById('contentArea'))"></div>`; const tgl = document.getElementById('keuTgl')?.value || today; const filteredSales = salesHistory.filter(s => s.date === tgl); if (filteredSales.length === 0) { h += `<p class="text-center">Belum ada data transaksi untuk ${tgl}.</p></div>`; container.innerHTML = h; return; } const perUser = {}; allUsers.filter(u => u.role === 'sales' || u.role === 'admin').forEach(u => { perUser[u.name] = { sales: 0, total: 0, profit: 0, qty: 0 }; }); filteredSales.forEach(s => { if (perUser[s.user]) { perUser[s.user].sales++; perUser[s.user].total += s.total || 0; perUser[s.user].profit += s.totalProfit || 0; perUser[s.user].qty += s.totalQty || 0; } }); h += `<h4 style="font-size:0.75rem;">👤 Per Sales (Tanggal ${tgl})</h4><table style="width:100%;font-size:0.65rem;"><tr><th>User</th><th>Transaksi</th><th>QTY</th><th>Total</th><th>Profit</th></tr>`; Object.entries(perUser).forEach(([name, u]) => { if (u.sales > 0) h += `<tr><td style="padding:4px;">${name}</td><td style="text-align:center;">${u.sales}</td><td style="text-align:center;">${u.qty}</td><td style="text-align:right;">Rp${u.total.toLocaleString()}</td><td style="text-align:right;">Rp${u.profit.toLocaleString()}</td></tr>`; }); h += '</table></div>'; container.innerHTML = h; }

async function saveEditProduct(sku) { const nama = document.getElementById('editNama')?.value.trim(), modal = parseFloat(document.getElementById('editModal')?.value) || 0, jual = parseFloat(document.getElementById('editJual')?.value) || 0; if (!nama) return Swal.fire('Error', 'Nama wajib diisi', 'error'); const idx = products.findIndex(x => String(x.sku) === String(sku)); if (idx !== -1) { products[idx].nama = nama; products[idx].modal = modal; products[idx].jual = jual; } saveAllData(); syncToGoogleSheets('updateProduct', { sku, nama, modal, jual }); document.getElementById('prodForm').innerHTML = ''; navigateTo('produk'); Swal.fire('Sukses', 'Produk diupdate', 'success'); }

function showAddPelangganForm() { Swal.fire({ title: 'Tambah Pelanggan', input: 'text', inputPlaceholder: 'Nama Pelanggan', showCancelButton: true, confirmButtonText: 'Tambah', preConfirm: (n) => { if (!n) return Swal.showValidationMessage('Nama tidak boleh kosong'); if (pelanggan.includes(n)) return Swal.showValidationMessage('Nama sudah ada'); pelanggan.push(n); saveAllData(); syncToGoogleSheets('addPelanggan', { name: n }); renderPelangganList(); return n; } }); }
function renderPelangganList() { const el = document.getElementById('pelangganList'); if (!el) return; if (pelanggan.length === 0) { el.innerHTML = '<p class="text-center text-sm">📭 Belum ada pelanggan</p>'; return; } let h = '<table style="width:100%;font-size:0.65rem;"><tr><th>No</th><th>Nama Pelanggan</th><th>Aksi</th></tr>'; pelanggan.forEach((c, i) => { h += `<tr><td style="padding:4px;width:40px;">${i + 1}</td><td style="padding:4px;">${c}</td><td style="padding:4px;"><button class="btn-danger btn-sm" onclick="deletePelanggan('${c}')" style="padding:4px 8px;"><i class="fas fa-trash"></i></button></td></tr>`; }); h += '</table>'; el.innerHTML = h; }
async function deletePelanggan(name) { const c = await Swal.fire({ title: 'Hapus pelanggan?', text: name, icon: 'warning', showCancelButton: true }); if (c.isConfirmed) { pelanggan = pelanggan.filter(p => p !== name); saveAllData(); syncToGoogleSheets('deletePelanggan', { name }); renderPelangganList(); Swal.fire('Sukses', 'Pelanggan dihapus', 'success'); } }

// ========= PENGATURAN =========
function pagePengaturan() { return `<div class="card"><div class="card-title"><i class="fas fa-store"></i> Info Toko</div><div class="form-group"><label>Nama Toko</label><input id="setNama" value="${settings.namaToko || ''}"></div><div class="form-group"><label>Tagline</label><input id="setTagline" value="${settings.tagline || ''}"></div><div class="form-group"><label>Alamat</label><input id="setAlamat" value="${settings.alamat || ''}"></div><div class="form-group"><label>No. Telepon</label><input id="setTelepon" value="${settings.telepon || '088211058000'}"></div><button class="btn-primary btn-block" onclick="saveSettings()">Simpan</button></div><div class="card"><div class="card-title"><i class="fas fa-upload"></i> Upload Logo & QRIS</div><div class="form-group"><label>Logo</label><input type="file" accept="image/*" onchange="uploadLogo(event)">${settings.logo ? '<img src="' + settings.logo + '" style="width:60px;height:60px;border-radius:50%;margin-top:8px;">' : ''}</div><div class="form-group"><label>QRIS</label><input type="file" accept="image/*" onchange="uploadQris(event)">${settings.qris ? '<img src="' + settings.qris + '" style="width:80px;margin-top:8px;">' : ''}</div></div><div class="card"><div class="card-title"><i class="fas fa-university"></i> Bank</div>${banks.map(b => `<div class="flex-between"><span>${b.logo} <b>${b.name}</b>: ${b.number} (${b.holder})</span><button class="btn-danger btn-sm" onclick="deleteBank('${b.name}')"><i class="fas fa-trash"></i></button></div>`).join('')}<div class="flex-row mt-2"><input id="bnkName" placeholder="Bank" style="flex:1;"><input id="bnkNum" placeholder="No.Rek" style="flex:1;"><input id="bnkHolder" placeholder="Pemilik" style="flex:1;"><button class="btn-primary btn-sm" onclick="addBank()">+</button></div></div><div class="card"><div class="card-title"><i class="fas fa-users"></i> User</div>${allUsers.map(u => `<div class="flex-between"><span>🔑 ${u.name} (${u.role})</span></div>`).join('')}<div class="flex-row mt-2"><input id="newUserName" placeholder="User" style="flex:1;"><select id="newUserRole" style="flex:1;"><option value="admin">Admin</option><option value="sales">Sales</option><option value="driver">Driver</option></select><input id="newUserPass" value="123456" style="flex:1;"><button class="btn-primary btn-sm" onclick="addUserLogin()">+</button></div></div><div class="card"><div class="card-title"><i class="fas fa-truck"></i> Driver</div>${drivers.map(d => `<div class="flex-between"><span>🚚 ${d}</span><button class="btn-danger btn-sm" onclick="deleteDriver('${d}')"><i class="fas fa-trash"></i></button></div>`).join('')}<div class="flex-row mt-2"><input id="drvName" placeholder="Driver" style="flex:2;"><button class="btn-primary btn-sm" onclick="addDriver()">+</button></div></div><div class="card"><div class="card-title"><i class="fas fa-database"></i> Backup & Restore</div><button class="btn-success btn-block mb-2" onclick="backupData()"><i class="fas fa-download"></i> Backup Data</button><button class="btn-warning btn-block" onclick="restoreData()"><i class="fas fa-upload"></i> Restore Data</button></div>`; }
async function saveSettings() { settings.namaToko = document.getElementById('setNama')?.value; settings.tagline = document.getElementById('setTagline')?.value; settings.alamat = document.getElementById('setAlamat')?.value; settings.telepon = document.getElementById('setTelepon')?.value || '088211058000'; saveAllData(); syncToGoogleSheets('updateSettings', settings); document.getElementById('headerAlamat').textContent = settings.alamat; Swal.fire('Sukses', 'Pengaturan disimpan', 'success'); }
function uploadLogo(e) { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = function (ev) { document.getElementById('logoImg').src = ev.target.result; settings.logo = ev.target.result; saveAllData(); }; r.readAsDataURL(f); }
function uploadQris(e) { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = function (ev) { settings.qris = ev.target.result; saveAllData(); Swal.fire('Sukses', 'QRIS diupload', 'success'); }; r.readAsDataURL(f); }
async function addBank() { const n = document.getElementById('bnkName')?.value, num = document.getElementById('bnkNum')?.value, h = document.getElementById('bnkHolder')?.value; if (!n || !num) return Swal.fire('Error', 'Bank dan No.Rek wajib', 'error'); banks.push({ name: n, number: num, holder: h || '', logo: '🏦' }); saveAllData(); syncToGoogleSheets('addBank', { name: n, number: num, holder: h }); navigateTo('pengaturan'); }
async function deleteBank(name) { banks = banks.filter(b => b.name !== name); saveAllData(); syncToGoogleSheets('deleteBank', { name }); navigateTo('pengaturan'); }
async function addUserLogin() { const n = document.getElementById('newUserName')?.value, ro = document.getElementById('newUserRole')?.value, p = document.getElementById('newUserPass')?.value; if (!n) return Swal.fire('Error', 'Username wajib', 'error'); if (allUsers.some(u => u.name === n)) return Swal.fire('Error', 'Username sudah ada', 'error'); allUsers.push({ name: n, role: ro, password: p || '123456' }); saveAllData(); syncToGoogleSheets('addUser', { name: n, role: ro, password: p }); navigateTo('pengaturan'); Swal.fire('Sukses', 'User ditambahkan', 'success'); }
async function addDriver() { const n = document.getElementById('drvName')?.value; if (!n) return Swal.fire('Error', 'Nama driver wajib', 'error'); if (drivers.includes(n)) return Swal.fire('Error', 'Driver sudah ada', 'error'); drivers.push(n); saveAllData(); syncToGoogleSheets('addDriver', { name: n }); navigateTo('pengaturan'); }
async function deleteDriver(name) { drivers = drivers.filter(d => d !== name); saveAllData(); syncToGoogleSheets('deleteDriver', { name }); navigateTo('pengaturan'); }
function backupData() { const data = { products, pelanggan, salesHistory, stockInHistory, setoranHistory, drivers, banks, settings, allUsers }; const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup_tirta_${new Date().toISOString().split('T')[0]}.json`; a.click(); URL.revokeObjectURL(a.href); Swal.fire('Sukses', 'Data berhasil dibackup', 'success'); }
function restoreData() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'application/json'; input.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => { try { const d = JSON.parse(ev.target.result); if (d.products) products = d.products; if (d.pelanggan) pelanggan = d.pelanggan; if (d.salesHistory) salesHistory = d.salesHistory; if (d.stockInHistory) stockInHistory = d.stockInHistory; if (d.setoranHistory) setoranHistory = d.setoranHistory; if (d.drivers) drivers = d.drivers; if (d.banks) banks = d.banks; if (d.settings) settings = { ...settings, ...d.settings }; if (d.allUsers) allUsers = d.allUsers; saveAllData(); refreshAllData(); Swal.fire('Sukses', 'Data berhasil direstore', 'success'); } catch (err) { Swal.fire('Error', 'File tidak valid', 'error'); } }; r.readAsText(f); }; input.click(); }

// ========= INIT =========
document.addEventListener('DOMContentLoaded', () => { loadAllData(); initDarkMode(); const savedUser = localStorage.getItem('tirtaUser'); if (savedUser) { currentUser = JSON.parse(savedUser); showMainApp(); } });
</script>
</body>
</html>
