<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Tirta Kencana · Air Minum</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    :root { --biru:#0A4D8C; --kuning:#F5B41B; --biru-muda:#E6F0FA; --kuning-muda:#FFF8E1; --bg:#F1F5F9; --card:#FFFFFF; --border:#E2E8F0; --shadow:0 2px 12px rgba(0,0,0,0.06); --radius:16px; --text:#1E293B; }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:12px;color:var(--text);}
    .app-container{max-width:500px;width:100%;background:white;border-radius:24px;box-shadow:0 20px 40px rgba(10,77,140,0.12);overflow:hidden;display:flex;flex-direction:column;min-height:95vh;}
    @media(min-width:768px){.app-container{max-width:720px;}}
    @media(min-width:1024px){.app-container{max-width:1000px;}}
    .header{background:linear-gradient(135deg,#0A4D8C 0%,#0B5FA5 100%);color:white;padding:18px 20px 14px;text-align:center;}
    .brand{font-size:1.9rem;font-weight:800;display:flex;justify-content:center;gap:6px;}
    .tirta{color:#fff;}.kencana{color:#F5B41B;}
    .tagline{font-size:0.7rem;opacity:0.9;letter-spacing:0.5px;margin:4px 0;}
    .alamat{font-size:0.65rem;opacity:0.8;}
    .logo-header{width:48px;height:48px;background:white;border-radius:50%;margin:8px auto 0;overflow:hidden;border:2px solid #F5B41B;display:flex;align-items:center;justify-content:center;cursor:pointer;}
    .logo-header img{width:100%;height:100%;object-fit:contain;}
    .nav-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#F8FAFC;border-bottom:1px solid var(--border);}
    .user-info{display:flex;align-items:center;gap:8px;}
    .avatar{width:32px;height:32px;border-radius:50%;background:var(--biru);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;}
    .role-tag{background:var(--kuning);color:#0A2540;padding:3px 10px;border-radius:20px;font-size:0.6rem;font-weight:700;text-transform:uppercase;}
    .btn-logout{background:#EF4444;color:white;border:none;padding:6px 14px;border-radius:8px;font-size:0.7rem;cursor:pointer;font-weight:600;}
    .btn-refresh{background:#10B981;color:white;border:none;padding:6px 10px;border-radius:8px;font-size:0.65rem;cursor:pointer;font-weight:600;margin-left:8px;animation: none;}
    .btn-refresh.loading{animation: spin 1s linear infinite;}
    @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
    .menu-tabs{display:flex;overflow-x:auto;gap:4px;padding:8px 10px;background:white;border-bottom:1px solid var(--border);}
    .menu-tabs::-webkit-scrollbar{height:0;}
    .tab{flex:0 0 auto;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:white;font-size:0.7rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:0.2s;color:#64748B;display:flex;align-items:center;gap:4px;}
    .tab i{font-size:0.8rem;}
    .tab.active{background:var(--biru);color:white;border-color:var(--biru);}
    .content-area{flex:1;padding:12px;overflow-y:auto;max-height:calc(100vh - 280px);}
    .card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:10px;border:1px solid var(--border);}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
    .card-title{font-weight:700;font-size:0.9rem;color:var(--biru);display:flex;align-items:center;gap:6px;}
    .card-title i{color:var(--kuning);}
    .form-group{margin-bottom:8px;}
    .form-group label{display:block;font-size:0.7rem;font-weight:600;color:#475569;margin-bottom:3px;}
    input,select,textarea{width:100%;padding:9px 12px;border-radius:10px;border:1px solid #CBD5E1;font-size:0.8rem;outline:none;background:white;}
    input:focus,select:focus{border-color:var(--biru);box-shadow:0 0 0 3px rgba(10,77,140,0.1);}
    .btn{padding:10px 16px;border-radius:12px;border:none;font-size:0.8rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:0.2s;}
    .btn-primary{background:var(--biru);color:white;}
    .btn-warning{background:var(--kuning);color:#0A2540;}
    .btn-success{background:#10B981;color:white;}
    .btn-danger{background:#EF4444;color:white;}
    .btn-outline{background:white;border:2px solid var(--biru);color:var(--biru);}
    .btn-sm{padding:6px 10px;font-size:0.7rem;border-radius:8px;}
    .btn-block{width:100%;justify-content:center;}
    .flex-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .flex-between{display:flex;justify-content:space-between;align-items:center;}
    .col-2{flex:2;}.col-1{flex:1;}
    .total-box{background:var(--kuning-muda);padding:10px 14px;border-radius:12px;margin:8px 0;text-align:right;font-weight:700;font-size:1.1rem;color:var(--biru);}
    .status-badge{padding:3px 8px;border-radius:10px;font-size:0.6rem;font-weight:600;display:inline-block;}
    .status-cod{background:#D1FAE5;color:#065F46;}
    .status-transfer{background:#DBEAFE;color:#1E40AF;}
    .status-qris{background:#FEF3C7;color:#92400E;}
    .status-belumbayar{background:#FEE2E2;color:#991B1B;}
    .status-kiriman{background:#E0E7FF;color:#3730A3;}
    .status-titipan{background:#FCE7F3;color:#9D174D;}
    table{width:100%;border-collapse:collapse;font-size:0.7rem;}
    th,td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);}
    th{background:var(--biru-muda);color:var(--biru);font-weight:700;font-size:0.65rem;}
    .bottom-bar{text-align:center;font-size:0.65rem;color:#64748B;padding:10px;border-top:1px solid var(--border);background:#F8FAFC;}
    .hidden{display:none!important;}
    .mb-2{margin-bottom:8px;}.mt-2{margin-top:8px;}
    .text-sm{font-size:0.7rem;}.text-center{text-align:center;}
    .summary-box{flex:1;text-align:center;padding:10px;border-radius:12px;font-size:0.65rem;}
    .detail-group{margin:8px 0;padding:10px;background:#F8FAFC;border-radius:10px;border-left:3px solid var(--biru);}
    .detail-group h5{font-size:0.7rem;margin-bottom:6px;color:var(--biru);}
    .login-container{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#0A4D8C,#0B5FA5);}
    .login-card{background:white;padding:30px;border-radius:24px;width:340px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.2);}
    .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;}
    .modal{background:white;border-radius:20px;padding:20px;max-width:400px;width:90%;max-height:85vh;overflow-y:auto;}
    .bank-info{background:#F0F9FF;border:1px solid #BAE6FD;border-radius:10px;padding:10px;margin:10px 0;font-size:0.7rem;}
    .section-title{font-size:0.7rem;font-weight:700;color:var(--biru);margin:12px 0 6px 0;padding-bottom:4px;border-bottom:2px solid var(--kuning);}
    .sync-indicator{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;}
    .sync-online{background:#10B981;}
    .sync-offline{background:#EF4444;}
    .sync-syncing{background:#F5B41B;animation:pulse 1s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  </style>
</head>
<body>

<div id="loginPage" class="login-container">
  <div class="login-card">
    <div class="brand" style="margin-bottom:10px;"><span style="color:#0A4D8C;">Tirta</span><span style="color:#F5B41B;">Kencana</span></div>
    <p style="font-size:0.7rem;color:#64748B;margin-bottom:20px;">DO GOOD AND GOOD WILL COME TO YOU</p>
    <div class="form-group"><input type="text" id="loginUser" placeholder="Username" style="text-align:center;" autocomplete="off"></div>
    <div class="form-group"><input type="password" id="loginPass" placeholder="Password" style="text-align:center;"></div>
    <button class="btn btn-primary btn-block" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Masuk</button>
    <p style="font-size:0.6rem;margin-top:10px;color:#94A3B8;">Admin: Admin/admin123 | Sales: Sales A/sales123 | Driver: Driver/driver123</p>
    <p id="loginError" style="font-size:0.6rem;color:#EF4444;margin-top:8px;display:none;"></p>
  </div>
</div>

<div id="mainApp" class="app-container hidden">
  <div class="header">
    <div class="brand"><span class="tirta">Tirta</span><span class="kencana">Kencana</span></div>
    <div class="tagline">DO GOOD AND GOOD WILL COME TO YOU</div>
    <div class="alamat" id="headerAlamat">WTC Mangga 2 Lt UG A/53</div>
    <div class="logo-header" onclick="document.getElementById('logoFileInput').click()"><img id="logoImg" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle fill='%230A4D8C' cx='20' cy='20' r='18'/%3E%3Ctext x='20' y='26' text-anchor='middle' fill='white' font-size='16'%3E💧%3C/text%3E%3C/svg%3E" alt="Logo"></div>
    <input type="file" id="logoFileInput" accept="image/*" style="display:none" onchange="uploadLogo(event)">
  </div>
  <div class="nav-bar">
    <div class="user-info">
      <div class="avatar" id="userAvatar">A</div>
      <div>
        <div style="font-size:0.75rem;font-weight:600;" id="displayName">Admin</div>
        <span class="role-tag" id="displayRole">ADMIN</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:0.6rem;display:flex;align-items:center;">
        <span class="sync-indicator sync-offline" id="syncDot"></span>
        <span id="syncStatus">Offline</span>
      </span>
      <button class="btn-refresh" onclick="refreshAllData()" title="Refresh data dari Google Sheets" id="btnRefreshAll">
        <i class="fas fa-sync-alt"></i> Sync
      </button>
      <button class="btn-logout" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>
  <div class="menu-tabs" id="menuTabs"></div>
  <div class="content-area" id="contentArea"></div>
  <div class="bottom-bar">Terima kasih sudah berbelanja · Tirta Kencana</div>
</div>

<div class="modal-overlay" id="strukModal" onclick="closeStruk()"><div class="modal" id="strukContent" onclick="event.stopPropagation()"></div></div>

<script>
// ============================================
// CONFIG
// ============================================
const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwYBZYwjX6jb1DxYrMODvro-zGhSNcBdhfPI-8iw6mszTqNKqo89X68TseaWIvAoi89/exec';
const USE_GOOGLE_SHEETS = true;

// ============================================
// STATE
// ============================================
let currentUser=null,currentPage='penjualan',isOnline=false,isSyncing=false;
let products=[],pelanggan=[],cart=[],salesHistory=[],stockInHistory=[];
let drivers=['Hendri','Asep','Budi','Joko'];
let salesUsers=['Sales A','Sales B'];
let banks=[{name:'BCA',number:'6930099099',holder:'Hendri',logo:'🏦'},{name:'bluBCA',number:'002283588888',holder:'Hendri',logo:'💳'}];
let settings={namaToko:'Tirta Kencana',alamat:'WTC Mangga 2 Lt UG A/53',tagline:'DO GOOD AND GOOD WILL COME TO YOU',bottomLine:'Terima kasih sudah berbelanja',logo:'',qris:''};
let allUsers=[{name:'Admin',role:'admin',password:'admin123'},{name:'Sales A',role:'sales',password:'sales123'},{name:'Sales B',role:'sales',password:'sales123'},{name:'Driver',role:'driver',password:'driver123'}];

// ============================================
// GOOGLE SHEETS API (FETCH DATA)
// ============================================
async function fetchFromGoogleSheets() {
  if (!USE_GOOGLE_SHEETS || !GOOGLE_SHEETS_URL || GOOGLE_SHEETS_URL.includes('YOUR')) return null;
  
  try {
    updateSyncStatus('syncing');
    
    const response = await fetch(GOOGLE_SHEETS_URL + '?action=getAllData');
    const result = await response.json();
    
    if (result.success && result.data) {
      // Update products
      if (result.data.products && result.data.products.length > 0) {
        products = result.data.products.map(p => ({
          sku: String(p.sku || ''),
          nama: String(p.nama || ''),
          modal: parseFloat(p.modal) || 0,
          jual: parseFloat(p.jual) || 0,
          stokAwal: parseInt(p.stokAwal) || 0,
          stokMasuk: parseInt(p.stokMasuk) || 0,
          stokKeluar: parseInt(p.stokKeluar) || 0,
          stokAkhir: parseInt(p.stokAkhir) || 0
        }));
      }
      
      // Update pelanggan
      if (result.data.pelanggan && result.data.pelanggan.length > 0) {
        pelanggan = result.data.pelanggan.map(c => String(c));
      }
      
      // Update sales history
      if (result.data.salesHistory) {
        salesHistory = result.data.salesHistory.map(s => ({
          id: String(s.id || ''),
          user: String(s.user || ''),
          customer: String(s.customer || ''),
          total: parseFloat(s.total) || 0,
          totalDisc: parseFloat(s.totalDisc) || 0,
          totalQty: parseInt(s.totalQty) || 0,
          status: String(s.status || 'cod'),
          date: String(s.date || ''),
          time: String(s.time || ''),
          items: (s.items || []).map(i => ({
            sku: String(i.sku || ''),
            nama: String(i.nama || ''),
            qty: parseInt(i.qty) || 0,
            harga: parseFloat(i.harga) || 0,
            disc: parseFloat(i.discPerItem || i.disc) || 0,
            discTotal: parseFloat(i.discTotal) || 0,
            subtotal: parseFloat(i.subtotal) || 0
          }))
        }));
      }
      
      // Update stock in history
      if (result.data.stockInHistory) {
        stockInHistory = result.data.stockInHistory.map(s => ({
          id: String(s.id || ''),
          sku: String(s.sku || ''),
          nama: String(s.nama || ''),
          qty: parseInt(s.qty) || 0,
          hargaModal: parseFloat(s.hargaModal) || 0,
          totalModal: parseFloat(s.totalModal) || 0,
          driver: String(s.driver || ''),
          rit: String(s.rit || ''),
          status: String(s.status || 'kiriman'),
          date: String(s.date || '')
        }));
      }
      
      // Update drivers
      if (result.data.drivers && result.data.drivers.length > 0) {
        drivers = result.data.drivers.map(d => String(d));
      }
      
      // Update banks
if (result.data.banks && result.data.banks.length > 0) {
  banks = result.data.banks;
}

// Update all users
if (result.data.allUsers && result.data.allUsers.length > 0) {
  allUsers = result.data.allUsers;
}
      
      saveAllData();
      updateSyncStatus('online');
      
      // Update header
      if (settings.alamat) document.getElementById('headerAlamat').textContent = settings.alamat;
      if (settings.logo) document.getElementById('logoImg').src = settings.logo;
      
      console.log('✅ Data loaded from Google Sheets');
      return result.data;
    }
    
    updateSyncStatus('online');
    return null;
  } catch(e) {
    console.log('Fetch error:', e.message);
    updateSyncStatus('offline');
    return null;
  }
}

async function syncToGoogleSheets(action, data) {
  if (!USE_GOOGLE_SHEETS || !GOOGLE_SHEETS_URL || GOOGLE_SHEETS_URL.includes('YOUR')) return false;
  
  updateSyncStatus('syncing');
  
  const url = GOOGLE_SHEETS_URL + '?action=' + encodeURIComponent(action) + '&data=' + encodeURIComponent(JSON.stringify(data));
  
  try {
    await fetch(url, { method: 'GET', mode: 'no-cors' });
    console.log('✅ Synced:', action);
    updateSyncStatus('online');
    return true;
  } catch(e) {
    console.log('❌ Sync:', e.message);
    updateSyncStatus('offline');
    return false;
  }
}

function updateSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncStatus');
  if (!dot || !text) return;
  
  dot.className = 'sync-indicator';
  switch(status) {
    case 'online':
      dot.classList.add('sync-online');
      text.textContent = 'Online';
      isOnline = true;
      break;
    case 'offline':
      dot.classList.add('sync-offline');
      text.textContent = 'Offline';
      isOnline = false;
      break;
    case 'syncing':
      dot.classList.add('sync-syncing');
      text.textContent = 'Syncing...';
      isSyncing = true;
      setTimeout(() => { if (isSyncing) updateSyncStatus('online'); isSyncing = false; }, 3000);
      break;
  }
}

// ============================================
// REFRESH ALL DATA (TOMBOOL REFRESH)
// ============================================
async function refreshAllData() {
  const btn = document.getElementById('btnRefreshAll');
  if (btn) {
    btn.classList.add('loading');
    btn.disabled = true;
  }
  
  Swal.fire({
    title: '🔄 Refresh Data',
    text: 'Menarik data dari Google Sheets...',
    allowOutsideClick: false,
    didOpen: () => Swal.showLoading()
  });
  
  const data = await fetchFromGoogleSheets();
  
  Swal.close();
  
  if (btn) {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
  
  if (data) {
    // Update tampilan header
    if (settings.alamat) document.getElementById('headerAlamat').textContent = settings.alamat;
    if (settings.logo) document.getElementById('logoImg').src = settings.logo;
    
    // Refresh halaman saat ini
    renderContent();
    
    Swal.fire({
      title: '✅ Sukses',
      text: 'Data berhasil diperbarui dari Google Sheets!',
      icon: 'success',
      timer: 1500,
      showConfirmButton: false
    });
  } else {
    Swal.fire({
      title: '⚠️ Perhatian',
      text: 'Tidak dapat terhubung ke Google Sheets. Data lokal yang ditampilkan.',
      icon: 'warning',
      timer: 2000,
      showConfirmButton: false
    });
  }
}

// Tombol refresh kecil di setiap card
function renderRefreshButton(page) {
  return `<button class="btn-refresh" onclick="refreshCurrentPage('${page}')" title="Refresh halaman ini" style="padding:4px 8px;font-size:0.6rem;">
    <i class="fas fa-sync-alt"></i>
  </button>`;
}

async function refreshCurrentPage(page) {
  const btn = event?.target?.closest('.btn-refresh');
  if (btn) { btn.classList.add('loading'); btn.disabled = true; }
  
  await fetchFromGoogleSheets();
  navigateTo(page);
  
  if (btn) { btn.classList.remove('loading'); btn.disabled = false; }
  
  Swal.fire({
    title: '✅ Refreshed',
    icon: 'success',
    timer: 800,
    showConfirmButton: false
  });
}

// ============================================
// STORAGE
// ============================================
function saveAllData(){localStorage.setItem('tirtaFullData',JSON.stringify({products,pelanggan,salesHistory,stockInHistory,drivers,salesUsers,banks,settings,allUsers}));}
function loadAllData(){const s=localStorage.getItem('tirtaFullData');if(s)try{const d=JSON.parse(s);products=d.products||[];pelanggan=d.pelanggan||d.customers||[];salesHistory=d.salesHistory||[];stockInHistory=d.stockInHistory||[];drivers=d.drivers||drivers;salesUsers=d.salesUsers||salesUsers;banks=d.banks||banks;settings={...settings,...(d.settings||{})};allUsers=d.allUsers||allUsers;}catch(e){} if(products.length===0){products=[{sku:'AQ001',nama:'Aqua 330ml',modal:2200,jual:3500,stokAwal:100,stokMasuk:0,stokKeluar:0,stokAkhir:100},{sku:'AQ002',nama:'Aqua 600ml',modal:2500,jual:4000,stokAwal:150,stokMasuk:0,stokKeluar:0,stokAkhir:150},{sku:'LS001',nama:'Le Minerale 330ml',modal:1500,jual:2500,stokAwal:80,stokMasuk:0,stokKeluar:0,stokAkhir:80},{sku:'LS002',nama:'Le Minerale 600ml',modal:1800,jual:3000,stokAwal:90,stokMasuk:0,stokKeluar:0,stokAkhir:90}];} if(pelanggan.length===0)pelanggan=['Warung Mpok','Toko Berkah','Kantin Sejahtera','Pak Budi','Bu Ani'];}

// ============================================
// AUTH
// ============================================
function doLogin(){const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value.trim();if(!u||!p){document.getElementById('loginError').textContent='Isi username & password!';document.getElementById('loginError').style.display='block';return;}const found=allUsers.find(x=>x.name===u&&x.password===p);if(found){currentUser={name:found.name,role:found.role};localStorage.setItem('tirtaUser',JSON.stringify(currentUser));showMainApp();}else{document.getElementById('loginError').textContent='Username/password salah!';document.getElementById('loginError').style.display='block';}}
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&!document.getElementById('loginPage').classList.contains('hidden'))doLogin();});
function doLogout(){localStorage.removeItem('tirtaUser');currentUser=null;cart=[];document.getElementById('loginPage').classList.remove('hidden');document.getElementById('mainApp').classList.add('hidden');}
async function showMainApp(){document.getElementById('loginPage').classList.add('hidden');document.getElementById('mainApp').classList.remove('hidden');document.getElementById('displayName').textContent=currentUser.name;document.getElementById('displayRole').textContent=currentUser.role.toUpperCase();document.getElementById('userAvatar').textContent=currentUser.name.charAt(0).toUpperCase();if(settings.alamat)document.getElementById('headerAlamat').textContent=settings.alamat;if(settings.logo)document.getElementById('logoImg').src=settings.logo;renderMenuTabs();navigateTo(currentUser.role==='driver'?'inputbarang':'penjualan');updateSyncStatus('syncing');await fetchFromGoogleSheets();}

// ============================================
// NAVIGATION (ROLE-BASED)
// ============================================
function renderMenuTabs(){
  let h='';const r=currentUser?.role;
  if(r==='admin'){h=`<button class="tab ${currentPage==='penjualan'?'active':''}" onclick="navigateTo('penjualan')"><i class="fas fa-cash-register"></i> Jual</button><button class="tab ${currentPage==='rekap'?'active':''}" onclick="navigateTo('rekap')"><i class="fas fa-chart-bar"></i> Rekap Jual</button><button class="tab ${currentPage==='inputbarang'?'active':''}" onclick="navigateTo('inputbarang')"><i class="fas fa-boxes"></i> Input</button><button class="tab ${currentPage==='rekaptoko'?'active':''}" onclick="navigateTo('rekaptoko')"><i class="fas fa-warehouse"></i> Rekap Gudang</button><button class="tab ${currentPage==='produk'?'active':''}" onclick="navigateTo('produk')"><i class="fas fa-cubes"></i> Produk</button><button class="tab ${currentPage==='pelanggan'?'active':''}" onclick="navigateTo('pelanggan')"><i class="fas fa-address-book"></i> Pelanggan</button><button class="tab ${currentPage==='pengaturan'?'active':''}" onclick="navigateTo('pengaturan')"><i class="fas fa-cog"></i> Atur</button>`;}
  else if(r==='sales'){h=`<button class="tab ${currentPage==='penjualan'?'active':''}" onclick="navigateTo('penjualan')"><i class="fas fa-cash-register"></i> Jual</button><button class="tab ${currentPage==='rekap'?'active':''}" onclick="navigateTo('rekap')"><i class="fas fa-chart-bar"></i> Rekap Jual</button>`;}
  else if(r==='driver'){h=`<button class="tab ${currentPage==='inputbarang'?'active':''}" onclick="navigateTo('inputbarang')"><i class="fas fa-boxes"></i> Input Barang</button><button class="tab ${currentPage==='rekaptoko'?'active':''}" onclick="navigateTo('rekaptoko')"><i class="fas fa-warehouse"></i> Rekap Gudang</button>`;}
  document.getElementById('menuTabs').innerHTML=h;
}
function navigateTo(p){currentPage=p;renderMenuTabs();renderContent();}
function renderContent(){const c=document.getElementById('contentArea');switch(currentPage){case'penjualan':c.innerHTML=pagePenjualan();initPenjualan();break;case'rekap':loadRekapPenjualan(c);break;case'inputbarang':c.innerHTML=pageInputBarang();initInputBarang();break;case'rekaptoko':loadRekapStockIn(c);break;case'produk':c.innerHTML=pageProduk();break;case'pelanggan':c.innerHTML=pagePelanggan();break;case'pengaturan':c.innerHTML=pagePengaturan();break;}}

// ============================================
// API CALL
// ============================================
function apiCall(action,data={}){let result={success:true};switch(action){case'createSale':{const id='INV-'+Date.now();let total=0,tq=0,td=0;const items=data.items.map(i=>{const q=parseInt(i.qty)||0,h=parseFloat(i.harga)||0,dp=parseFloat(i.disc)||0;const dt=dp*q,sub=(q*h)-dt;total+=sub;tq+=q;td+=dt;return{...i,qty:q,harga:h,disc:dp,discTotal:dt,subtotal:sub};});const ns={id,user:data.user,customer:data.customer,status:data.status,items,total,totalQty:tq,totalDisc:td,date:data.date||new Date().toISOString().split('T')[0],time:new Date().toLocaleTimeString('id-ID')};salesHistory.unshift(ns);data.items.forEach(i=>{const p=products.find(x=>x.sku===i.sku);if(p){p.stokKeluar=(p.stokKeluar||0)+(parseInt(i.qty)||0);p.stokAkhir=(p.stokAwal||0)+(p.stokMasuk||0)-p.stokKeluar;}});if(!pelanggan.includes(data.customer))pelanggan.push(data.customer);saveAllData();syncToGoogleSheets('createSale',ns);result={success:true,data:{id,total}};break;}case'addStockIn':{const sid='STK-'+Date.now();const q=parseInt(data.qty)||0,m=parseFloat(data.hargaModal)||0;const entry={id:sid,sku:data.sku,nama:data.nama||'',qty:q,hargaModal:m,totalModal:q*m,driver:data.driver||'',rit:data.rit||'',status:data.status||'kiriman',date:new Date().toISOString().split('T')[0]};stockInHistory.unshift(entry);const p=products.find(x=>x.sku===data.sku);if(p){p.stokMasuk=(p.stokMasuk||0)+q;p.stokAkhir=(p.stokAwal||0)+p.stokMasuk-p.stokKeluar;}saveAllData();syncToGoogleSheets('addStockIn',entry);result={success:true};break;}case'updateStockIn':{const si=stockInHistory.findIndex(x=>x.id===data.id);if(si===-1)return{success:false};if(data.qty!==undefined){stockInHistory[si].qty=parseInt(data.qty);stockInHistory[si].totalModal=stockInHistory[si].qty*stockInHistory[si].hargaModal;}if(data.status!==undefined)stockInHistory[si].status=data.status;if(data.driver!==undefined)stockInHistory[si].driver=data.driver;if(data.rit!==undefined)stockInHistory[si].rit=data.rit;saveAllData();syncToGoogleSheets('updateStockIn',data);result={success:true};break;}case'addPelanggan':if(data.name&&!pelanggan.includes(data.name)){pelanggan.push(data.name);saveAllData();syncToGoogleSheets('addPelanggan',data);}result={success:true,data:pelanggan};break;case'deletePelanggan':pelanggan=pelanggan.filter(c=>c!==data.name);saveAllData();syncToGoogleSheets('deletePelanggan',data);result={success:true,data:pelanggan};break;case'addProduct':{if(!data.sku)return{success:false,message:'SKU wajib'};const st=parseInt(data.stokAwal)||0;products.push({sku:data.sku,nama:data.nama||'',modal:parseFloat(data.modal)||0,jual:parseFloat(data.jual)||0,stokAwal:st,stokMasuk:0,stokKeluar:0,stokAkhir:st});saveAllData();syncToGoogleSheets('addProduct',data);result={success:true};break;}case'updateProduct':{const pi=products.findIndex(x=>x.sku===data.sku);if(pi===-1)return{success:false};if(data.nama!==undefined)products[pi].nama=data.nama;if(data.modal!==undefined)products[pi].modal=parseFloat(data.modal);if(data.jual!==undefined)products[pi].jual=parseFloat(data.jual);saveAllData();syncToGoogleSheets('updateProduct',data);result={success:true};break;}case'deleteProduct':{products=products.filter(p=>p.sku!==data.sku);saveAllData();syncToGoogleSheets('deleteProduct',data);result={success:true};break;}case'updateSale':{const si=salesHistory.findIndex(x=>x.id===data.id);if(si===-1)return{success:false};if(data.status)salesHistory[si].status=data.status;if(data.items){let nt=0,nq=0,nd=0;const ni=data.items.map(i=>{const q=parseInt(i.qty)||0,h=parseFloat(i.harga)||0,dp=parseFloat(i.disc)||0;const dt=dp*q,sub=(q*h)-dt;nt+=sub;nq+=q;nd+=dt;return{...i,qty:q,harga:h,disc:dp,discTotal:dt,subtotal:sub};});salesHistory[si].items=ni;salesHistory[si].total=nt;salesHistory[si].totalQty=nq;salesHistory[si].totalDisc=nd;}saveAllData();syncToGoogleSheets('updateSale',data);result={success:true};break;}case'deleteSale':salesHistory=salesHistory.filter(x=>x.id!==data.id);saveAllData();syncToGoogleSheets('deleteSale',data);result={success:true};break;case'updateSettings':settings={...settings,...data};saveAllData();syncToGoogleSheets('updateSettings',data);result={success:true};break;case'addDriver':if(!drivers.includes(data.name)){drivers.push(data.name);saveAllData();syncToGoogleSheets('addDriver',data);}result={success:true,data:drivers};break;case'deleteDriver':drivers=drivers.filter(d=>d!==data.name);saveAllData();syncToGoogleSheets('deleteDriver',data);result={success:true,data:drivers};break;case'addBank':banks.push({name:data.name,number:data.number,holder:data.holder||'',logo:data.logo||'🏦'});saveAllData();syncToGoogleSheets('addBank',data);result={success:true};break;case'deleteBank':banks=banks.filter(b=>b.name!==data.name);saveAllData();syncToGoogleSheets('deleteBank',data);result={success:true};break;case'addSalesUser':if(!salesUsers.includes(data.name)){salesUsers.push(data.name);saveAllData();syncToGoogleSheets('addSalesUser',data);}result={success:true,data:salesUsers};break;case'deleteSalesUser':salesUsers=salesUsers.filter(x=>x!==data.name);saveAllData();syncToGoogleSheets('deleteSalesUser',data);result={success:true,data:salesUsers};break;case'addUser':if(!allUsers.find(u=>u.name===data.name)){allUsers.push({name:data.name,role:data.role,password:data.password||'123456'});if(data.role==='sales'&&!salesUsers.includes(data.name))salesUsers.push(data.name);saveAllData();syncToGoogleSheets('addUser',data);}result={success:true};break;case'deleteUser':allUsers=allUsers.filter(u=>u.name!==data.name);salesUsers=salesUsers.filter(x=>x!==data.name);saveAllData();syncToGoogleSheets('deleteUser',data);result={success:true};break;default:result={success:true,data:[]};}return result;}

function pagePenjualan(){let co='<option value="">-- Pilih Pelanggan --</option><option value="__new__">+ Tambah Baru</option>';pelanggan.forEach(c=>{co+=`<option value="${c}">${c}</option>`;});return`<div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-user-check"></i> Data Penjualan</div>${renderRefreshButton('penjualan')}</div><div class="form-group"><label>Sales</label><input value="${currentUser?.name||''}" readonly style="background:#E6F0FA;font-weight:600;"></div><div class="form-group"><label>Pelanggan</label><select id="custSelect" onchange="onPelangganSelect()">${co}</select><input id="custNewInput" placeholder="Nama Pelanggan Baru" style="margin-top:4px;display:none;"></div><div class="form-group"><label>Status</label><select id="payStatus" onchange="onStatusChange()"><option value="cod">COD</option><option value="transfer">Transfer</option><option value="qris">QRIS</option><option value="belumbayar">Belum Bayar</option></select></div><div id="bankInfoBox" style="display:none;" class="bank-info"></div></div><div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-shopping-cart"></i> Item (Diskon × QTY)</div></div><div id="cartItems"></div><button class="btn btn-outline btn-sm" onclick="addCartItem()"><i class="fas fa-plus"></i> Tambah</button><div class="total-box"><div style="font-size:0.7rem;">Subtotal: Rp <span id="cartSubtotal">0</span></div><div style="font-size:0.7rem;color:#EF4444;">Diskon: -Rp <span id="cartDisc">0</span></div><div style="font-size:1.1rem;font-weight:800;">Total: Rp <span id="cartTotal">0</span></div></div><button class="btn btn-primary btn-block" onclick="saveSale()"><i class="fas fa-save"></i> Simpan</button></div>`;}
function initPenjualan(){if(cart.length===0)cart.push({sku:'',qty:1,disc:0});renderCart();onStatusChange();}
function onPelangganSelect(){const s=document.getElementById('custSelect'),n=document.getElementById('custNewInput');if(s.value==='__new__'){n.style.display='block';n.focus();}else{n.style.display='none';n.value='';}}
function onStatusChange(){const st=document.getElementById('payStatus')?.value,box=document.getElementById('bankInfoBox');if(st==='transfer'){let h='<strong>🏦 Transfer:</strong><br>';banks.forEach(b=>{h+=`• ${b.logo} <b>${b.name}</b> | ${b.number} | ${b.holder}<br>`;});box.innerHTML=h;box.style.display='block';}else if(st==='qris'&&settings.qris){box.innerHTML=`<strong>📱 QRIS</strong><br><img src="${settings.qris}" style="width:100px;">`;box.style.display='block';}else{box.style.display='none';}}
function getSelectedPelanggan(){const s=document.getElementById('custSelect'),n=document.getElementById('custNewInput');return s.value==='__new__'?n.value.trim():s.value;}
function addCartItem(){cart.push({sku:'',qty:1,disc:0});renderCart();}
function removeCartItem(i){cart.splice(i,1);renderCart();}
function updateCart(i,f,v){if(f==='qty')cart[i].qty=parseInt(v)||1;else if(f==='disc')cart[i].disc=parseInt(v)||0;else cart[i][f]=v;if(f==='sku'){const p=products.find(x=>x.sku===v);if(p){cart[i].harga=p.jual;cart[i].nama=p.nama;}}renderCart();}
function renderCart(){const el=document.getElementById('cartItems');if(!el)return;el.innerHTML=cart.map((item,i)=>{const p=products.find(x=>x.sku===item.sku),h=p?p.jual:(item.harga||0),dp=item.disc||0,dt=dp*item.qty,sub=(item.qty*h)-dt;let po='<option value="">Pilih</option>';products.forEach(p=>{po+=`<option value="${p.sku}" ${item.sku===p.sku?'selected':''}>${p.sku}-${p.nama}(${p.stokAkhir})</option>`;});return`<div class="flex-row" style="margin-bottom:6px;padding:6px;background:#F8FAFC;border-radius:8px;"><select onchange="updateCart(${i},'sku',this.value)" style="flex:2;font-size:0.7rem;">${po}</select><input type="number" value="${item.qty}" onchange="updateCart(${i},'qty',this.value)" style="width:45px;font-size:0.7rem;" min="1" title="Qty"><span style="font-size:0.6rem;">× Rp${h.toLocaleString()}</span><input type="number" value="${dp}" onchange="updateCart(${i},'disc',this.value)" style="width:60px;font-size:0.7rem;" placeholder="Disc/item" title="Diskon per item"><span style="font-size:0.6rem;color:#EF4444;">(-Rp${dt.toLocaleString()})</span><span style="font-size:0.7rem;font-weight:600;">Rp${sub.toLocaleString()}</span><button class="btn btn-danger btn-sm" onclick="removeCartItem(${i})" style="padding:2px 6px;">✕</button></div>`;}).join('');let sa=0,td=0;cart.forEach(i=>{const p=products.find(x=>x.sku===i.sku),h=p?p.jual:(i.harga||0);sa+=i.qty*h;td+=(i.disc||0)*i.qty;});document.getElementById('cartSubtotal').textContent=sa.toLocaleString();document.getElementById('cartDisc').textContent=td.toLocaleString();document.getElementById('cartTotal').textContent=(sa-td).toLocaleString();}
async function saveSale(){const cust=getSelectedPelanggan();if(!cust)return Swal.fire('Error','Pilih pelanggan','error');const valid=cart.filter(i=>i.sku&&products.find(p=>p.sku===i.sku));if(valid.length===0)return Swal.fire('Error','Pilih produk','error');const r=await apiCall('createSale',{user:currentUser.name,customer:cust,status:document.getElementById('payStatus')?.value||'cod',items:valid.map(i=>{const p=products.find(x=>x.sku===i.sku);return{sku:i.sku,nama:p?.nama||'',qty:i.qty,harga:p?.jual||(i.harga||0),disc:i.disc||0};}),date:new Date().toISOString().split('T')[0]});if(r.success){const ls=salesHistory[0];Swal.fire({title:'✅ Berhasil!',html:`ID: <b>${r.data.id}</b><br>Total: <b>Rp${ls.total.toLocaleString()}</b>`,icon:'success',showDenyButton:true,showCancelButton:true,confirmButtonText:'🖨️ Cetak',denyButtonText:'📥 PNG',cancelButtonText:'💬 WA'}).then(ch=>{showStruk(ls);if(ch.isConfirmed)cetakBluetooth();else if(ch.isDenied)downloadStrukPNG();else if(ch.dismiss===Swal.DismissReason.cancel)kirimWA();});cart=[{sku:'',qty:1,disc:0}];renderCart();document.getElementById('custSelect').value='';document.getElementById('custNewInput').style.display='none';}}

function showStruk(s){let ih='';s.items.forEach(i=>{const dp=i.disc||0,dt=dp*(i.qty||0),sub=(i.qty*i.harga)-dt;ih+=`<tr><td>${i.nama||i.sku}</td><td>${i.qty}</td><td>Rp${i.harga.toLocaleString()}</td><td>${dt>0?'Rp'+dt.toLocaleString():'-'}</td><td>Rp${sub.toLocaleString()}</td></tr>`;});let bh='';if(s.status==='transfer'){bh='<div class="bank-info" style="text-align:left;"><strong>🏦 Transfer:</strong><br>';banks.forEach(b=>{bh+=`• ${b.logo} <b>${b.name}</b> | ${b.number} | ${b.holder}<br>`;});bh+='</div>';}else if(s.status==='qris'&&settings.qris)bh=`<div style="text-align:center;"><strong>📱 QRIS</strong><br><img src="${settings.qris}" style="width:100px;"></div>`;document.getElementById('strukContent').innerHTML=`<div id="strukPrintArea" style="text-align:center;padding:15px;font-size:0.7rem;max-width:320px;margin:0 auto;">${settings.logo?`<img src="${settings.logo}" style="width:60px;height:60px;border-radius:50%;margin-bottom:8px;">`:''}<h3 style="color:#0A4D8C;margin:0;">${settings.namaToko}</h3><p>${settings.tagline}</p><p>${settings.alamat}</p><hr><p>No: ${s.id}</p><p>Tgl: ${s.date} ${s.time||''}</p><p>Pelanggan: ${s.customer}</p><p>Sales: ${s.user}</p><p>Status: <span class="status-badge status-${s.status}">${s.status.toUpperCase()}</span></p>${bh}<hr><table style="width:100%;font-size:0.6rem;"><tr><th>Item</th><th>Qty</th><th>Harga</th><th>Disc</th><th>Sub</th></tr>${ih}</table><hr>${(s.totalDisc||0)>0?`<p style="color:#EF4444;">Diskon: -Rp${s.totalDisc.toLocaleString()}</p>`:''}<p style="font-weight:bold;font-size:0.9rem;">Total: Rp${(s.total||0).toLocaleString()}</p><p>${settings.bottomLine}</p></div>`;document.getElementById('strukModal').style.display='flex';}
function closeStruk(){document.getElementById('strukModal').style.display='none';}
async function cetakBluetooth(){try{const d=await navigator.bluetooth.requestDevice({acceptAllDevices:true});Swal.fire('Info','Terhubung: '+d.name,'success');}catch(e){Swal.fire('Info','Bluetooth tidak tersedia','info');}}
function downloadStrukPNG(){const el=document.getElementById('strukPrintArea');if(!el)return;html2canvas(el,{scale:2,backgroundColor:'#FFFFFF'}).then(c=>{const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='struk-'+Date.now()+'.png';a.click();});}
function kirimWA(){const el=document.getElementById('strukPrintArea');if(!el)return;window.open('https://wa.me/?text='+encodeURIComponent(el.innerText),'_blank');}

async function loadRekapPenjualan(container){let h=`<div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-chart-bar"></i> 📊 Rekap Penjualan</div>${renderRefreshButton('rekap')}</div>`;if(salesHistory.length>0){const tt=salesHistory.length,tp=salesHistory.reduce((s,x)=>s+(x.total||0),0),tq=salesHistory.reduce((s,x)=>s+(x.totalQty||0),0),td=salesHistory.reduce((s,x)=>s+(x.totalDisc||0),0);h+=`<div class="flex-row mb-2"><div class="summary-box" style="background:#E6F0FA;"><small>Transaksi</small><br><b>${tt}</b></div><div class="summary-box" style="background:#FFF8E1;"><small>Pendapatan</small><br><b>Rp${tp.toLocaleString()}</b></div><div class="summary-box" style="background:#D1FAE5;"><small>QTY</small><br><b>${tq}</b></div><div class="summary-box" style="background:#FEE2E2;"><small>Diskon</small><br><b>Rp${td.toLocaleString()}</b></div></div>`;const ps={};salesHistory.forEach(s=>{const st=s.status||'cod';if(!ps[st])ps[st]={status:st,jumlah:0,total:0,totalQty:0,customers:{},skus:{}};ps[st].jumlah++;ps[st].total+=s.total||0;ps[st].totalQty+=s.totalQty||0;if(!ps[st].customers[s.customer])ps[st].customers[s.customer]={customer:s.customer,jumlah:0,total:0,qty:0};ps[st].customers[s.customer].jumlah++;ps[st].customers[s.customer].total+=s.total||0;ps[st].customers[s.customer].qty+=s.totalQty||0;if(s.items)s.items.forEach(i=>{const sk=i.sku||'?';if(!ps[st].skus[sk])ps[st].skus[sk]={sku:sk,nama:i.nama||'',jumlah:0,totalQty:0,total:0};ps[st].skus[sk].jumlah++;ps[st].skus[sk].totalQty+=i.qty||0;ps[st].skus[sk].total+=((i.qty||0)*(i.harga||0))-((i.disc||0)*(i.qty||0));});});h+='<h4 style="font-size:0.75rem;margin-top:12px;">💳 Per Status (Customer & SKU)</h4>';Object.values(ps).forEach(st=>{h+=`<div class="detail-group"><h5><span class="status-badge status-${st.status}">${st.status.toUpperCase()}</span> | ${st.jumlah} Transaksi | QTY:${st.totalQty} | Rp${st.total.toLocaleString()}</h5><p style="font-size:0.6rem;"><b>👤 Customer:</b></p><table style="margin-bottom:4px;"><tr><th>Customer</th><th>Jml</th><th>QTY</th><th>Total</th></tr>`;Object.values(st.customers).sort((a,b)=>b.total-a.total).forEach(c=>{h+=`<tr><td>${c.customer}</td><td>${c.jumlah}</td><td>${c.qty}</td><td>Rp${c.total.toLocaleString()}</td></tr>`;});h+=`</table><p style="font-size:0.6rem;"><b>📦 SKU:</b></p><table><tr><th>SKU</th><th>Nama</th><th>Jml</th><th>QTY</th><th>Total</th></tr>`;Object.values(st.skus).sort((a,b)=>b.totalQty-a.totalQty).forEach(sk=>{h+=`<tr><td>${sk.sku}</td><td>${sk.nama}</td><td>${sk.jumlah}</td><td>${sk.totalQty}</td><td>Rp${sk.total.toLocaleString()}</td></tr>`;});h+=`</table></div>`;});h+='<h4 style="font-size:0.75rem;">📋 Detail</h4><table><tr><th>ID</th><th>Tgl</th><th>Pelanggan</th><th>Status</th><th>QTY</th><th>Total</th><th>Aksi</th></tr>';salesHistory.slice(0,30).forEach(s=>{h+=`<tr><td style="font-size:0.55rem;">${s.id}</td><td>${s.date}</td><td>${s.customer}</td><td>${currentUser?.role==='admin'?`<select onchange="editSaleStatus('${s.id}',this.value)" class="status-badge status-${s.status}" style="font-size:0.55rem;"><option value="cod" ${s.status==='cod'?'selected':''}>COD</option><option value="transfer" ${s.status==='transfer'?'selected':''}>Transfer</option><option value="qris" ${s.status==='qris'?'selected':''}>QRIS</option><option value="belumbayar" ${s.status==='belumbayar'?'selected':''}>Belum Bayar</option></select>`:`<span class="status-badge status-${s.status}">${s.status}</span>`}</td><td>${s.totalQty||0}</td><td>Rp${(s.total||0).toLocaleString()}</td><td><button class="btn btn-warning btn-sm" onclick="cetakUlangStruk('${s.id}')" style="padding:2px 4px;">📄</button></td></tr>`;});h+='</table>';}else h+='<p class="text-center">Belum ada data</p>';h+='</div>';container.innerHTML=h;}
function cetakUlangStruk(id){const s=salesHistory.find(x=>x.id===id);if(!s)return;showStruk(s);Swal.fire({title:'Cetak Ulang',showDenyButton:true,showCancelButton:true,confirmButtonText:'🖨️',denyButtonText:'📥',cancelButtonText:'💬'}).then(r=>{if(r.isConfirmed)cetakBluetooth();else if(r.isDenied)downloadStrukPNG();else if(r.dismiss===Swal.DismissReason.cancel)kirimWA();});}
async function editSaleStatus(id,st){await apiCall('updateSale',{id,status:st});Swal.fire({title:'Sukses',icon:'success',timer:800,showConfirmButton:false});navigateTo('rekap');}

// INPUT BARANG
// ============================================
function pageInputBarang(){let po='<option value="">Pilih</option>';products.forEach(p=>{po+=`<option value="${p.sku}">${p.sku}-${p.nama}</option>`;});let dO='<option value="">-</option>';drivers.forEach(d=>{dO+=`<option>${d}</option>`;});return`<div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-boxes"></i> Input Barang</div>${renderRefreshButton('inputbarang')}</div><div class="form-group"><label>Produk</label><select id="stkSku">${po}</select></div><div class="flex-row"><div class="form-group col-1"><label>Qty</label><input type="number" id="stkQty" value="1" min="1"></div><div class="form-group col-1"><label>Modal</label><input type="number" id="stkModal" value="0"></div></div><div class="flex-row"><div class="form-group col-1"><label>Driver</label><select id="stkDriver">${dO}</select></div><div class="form-group col-1"><label>Rit</label><input id="stkRit" placeholder="Rit"></div></div><div class="form-group"><label>Status</label><select id="stkStatus"><option value="kiriman">Kiriman</option><option value="titipan">Titipan</option></select></div><button class="btn btn-primary btn-block" onclick="saveStockIn()">Simpan</button></div><div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-history"></i> Riwayat</div></div><div id="stkHistory"></div></div>`;}
function initInputBarang(){loadStockHistory();}
async function saveStockIn(){const sku=document.getElementById('stkSku')?.value,qty=document.getElementById('stkQty')?.value;if(!sku||!qty)return Swal.fire('Error','Lengkapi','error');const p=products.find(x=>x.sku===sku);await apiCall('addStockIn',{sku,nama:p?.nama||'',qty:parseInt(qty),hargaModal:parseFloat(document.getElementById('stkModal')?.value)||0,driver:document.getElementById('stkDriver')?.value,rit:document.getElementById('stkRit')?.value,status:document.getElementById('stkStatus')?.value});Swal.fire('Sukses','Barang masuk dicatat','success');loadStockHistory();}
async function loadStockHistory(){const el=document.getElementById('stkHistory');if(stockInHistory.length>0){let h='<table><tr><th>ID</th><th>SKU</th><th>Qty</th><th>Driver</th><th>Rit</th><th>Status</th><th>Tgl</th></tr>';stockInHistory.slice(0,20).forEach(s=>{h+=`<tr><td style="font-size:0.55rem;">${s.id}</td><td>${s.sku}</td><td>${s.qty}</td><td>${s.driver||'-'}</td><td>${s.rit||'-'}</td><td><span class="status-badge status-${s.status}">${s.status}</span></td><td>${s.date}</td></tr>`;});h+='</table>';el.innerHTML=h;}else el.innerHTML='<p class="text-sm text-center">Belum ada data</p>';}

// ============================================
// REKAP GUDANG (QTY & STATUS EDITABLE + REFRESH)
// ============================================
async function loadRekapStockIn(container){let h=`<div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-warehouse"></i> 📊 Rekap Gudang</div>${renderRefreshButton('rekaptoko')}</div>`;if(stockInHistory.length>0){const tq=stockInHistory.reduce((s,i)=>s+(i.qty||0),0),tm=stockInHistory.reduce((s,i)=>s+((i.qty||0)*(i.hargaModal||0)),0);h+=`<div class="flex-row mb-2"><div class="summary-box" style="background:#E6F0FA;"><small>Entry</small><br><b>${stockInHistory.length}</b></div><div class="summary-box" style="background:#D1FAE5;"><small>QTY</small><br><b>${tq}</b></div><div class="summary-box" style="background:#FFF8E1;"><small>Modal</small><br><b>Rp${tm.toLocaleString()}</b></div></div>`;const pd={};stockInHistory.forEach(s=>{const d=s.driver||'Tanpa';if(!pd[d])pd[d]={driver:d,jumlah:0,totalQty:0,rits:{},skus:{}};pd[d].jumlah++;pd[d].totalQty+=s.qty||0;const r=s.rit||'-';if(!pd[d].rits[r])pd[d].rits[r]={rit:r,jumlah:0,qty:0};pd[d].rits[r].jumlah++;pd[d].rits[r].qty+=s.qty||0;const sk=s.sku||'?';if(!pd[d].skus[sk])pd[d].skus[sk]={sku:sk,nama:s.nama||'',jumlah:0,qty:0};pd[d].skus[sk].jumlah++;pd[d].skus[sk].qty+=s.qty||0;});h+='<h4 style="font-size:0.75rem;">🚚 Per Driver</h4>';Object.values(pd).forEach(d=>{h+=`<div class="detail-group"><h5>${d.driver} | Entry:${d.jumlah} | QTY:${d.totalQty}</h5><p style="font-size:0.6rem;">Rit: ${Object.values(d.rits).map(r=>`${r.rit}(${r.jumlah}x,${r.qty}qty)`).join(' | ')}</p><p style="font-size:0.6rem;">SKU: ${Object.values(d.skus).map(sk=>`${sk.sku}(${sk.jumlah}x,${sk.qty}qty)`).join(' | ')}</p></div>`;});h+='<h4 style="font-size:0.75rem;">📋 Detail (Edit QTY & Status)</h4><table><tr><th>ID</th><th>SKU</th><th>Qty</th><th>Driver</th><th>Rit</th><th>Status</th><th>Tgl</th></tr>';stockInHistory.slice(0,30).forEach(s=>{h+=`<tr><td style="font-size:0.55rem;">${s.id}</td><td>${s.sku}</td><td><span style="cursor:pointer;background:#FEF3C7;padding:2px 6px;border-radius:6px;" onclick="editStockQty('${s.id}')" title="Klik edit QTY">${s.qty} ✎</span></td><td>${s.driver||'-'}</td><td>${s.rit||'-'}</td><td><select onchange="editStockStatus('${s.id}',this.value)" class="status-badge status-${s.status}" style="font-size:0.55rem;padding:2px;"><option value="kiriman" ${s.status==='kiriman'?'selected':''}>Kiriman</option><option value="titipan" ${s.status==='titipan'?'selected':''}>Titipan</option></select></td><td>${s.date}</td></tr>`;});h+='</table>';}else h+='<p class="text-center">Belum ada data</p>';h+='</div>';container.innerHTML=h;}
async function editStockQty(id){const s=stockInHistory.find(x=>x.id===id);if(!s)return;const{value:newQty}=await Swal.fire({title:'Edit QTY',input:'number',inputValue:s.qty,inputLabel:'Qty Baru',showCancelButton:true,inputValidator:(v)=>{if(!v||v<1)return'Qty minimal 1!';}});if(newQty){await apiCall('updateStockIn',{id,qty:parseInt(newQty),hargaModal:s.hargaModal});s.qty=parseInt(newQty);s.totalModal=s.qty*s.hargaModal;saveAllData();navigateTo('rekaptoko');Swal.fire('Sukses','QTY diupdate','success');}}
async function editStockStatus(id,newStatus){await apiCall('updateStockIn',{id,status:newStatus});const s=stockInHistory.find(x=>x.id===id);if(s)s.status=newStatus;saveAllData();Swal.fire({title:'Sukses',text:'Status diupdate',icon:'success',timer:800,showConfirmButton:false});}

// ============================================
// PRODUK (DENGAN TOMBOL HAPUS + REFRESH)
// ============================================
function pageProduk(){let h=`<div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-cubes"></i> Produk</div>${renderRefreshButton('produk')}</div><button class="btn btn-primary btn-sm mb-2" onclick="showAddProduct()">+ Tambah</button><table><tr><th>SKU</th><th>Nama</th><th>Modal</th><th>Jual</th><th>Stok</th><th>Aksi</th></tr>`;products.forEach(p=>{h+=`<tr><td>${p.sku}</td><td>${p.nama}</td><td>Rp${(p.modal||0).toLocaleString()}</td><td>Rp${(p.jual||0).toLocaleString()}</td><td>${p.stokAkhir||0}</td><td><button class="btn btn-warning btn-sm" onclick="editProduct('${p.sku}')" style="padding:2px 6px;"><i class="fas fa-edit"></i></button> <button class="btn btn-danger btn-sm" onclick="deleteProductConfirm('${p.sku}')" style="padding:2px 6px;"><i class="fas fa-trash"></i></button></td></tr>`;});h+='</table></div><div id="prodForm"></div>';return h;}
function showAddProduct(){document.getElementById('prodForm').innerHTML='<div class="card"><div class="card-title">Tambah Produk</div><div class="form-group"><label>SKU</label><input id="newSku"></div><div class="form-group"><label>Nama</label><input id="newNama"></div><div class="flex-row"><div class="form-group col-1"><label>Modal</label><input type="number" id="newModal" value="0"></div><div class="form-group col-1"><label>Jual</label><input type="number" id="newJual" value="0"></div></div><div class="form-group"><label>Stok Awal</label><input type="number" id="newStok" value="0"></div><button class="btn btn-primary btn-block" onclick="saveNewProduct()">Simpan</button></div>';}
async function saveNewProduct(){const d={sku:document.getElementById('newSku')?.value,nama:document.getElementById('newNama')?.value,modal:parseFloat(document.getElementById('newModal')?.value),jual:parseFloat(document.getElementById('newJual')?.value),stokAwal:parseInt(document.getElementById('newStok')?.value)};if(!d.sku||!d.nama)return Swal.fire('Error','SKU & Nama wajib','error');await apiCall('addProduct',d);loadAllData();navigateTo('produk');Swal.fire('Sukses','Ditambahkan','success');}
function editProduct(sku){const p=products.find(x=>x.sku===sku);if(!p)return;document.getElementById('prodForm').innerHTML=`<div class="card"><div class="card-title">Edit: ${sku}</div><div class="form-group"><label>Nama</label><input id="editNama" value="${p.nama}"></div><div class="flex-row"><div class="form-group col-1"><label>Modal</label><input type="number" id="editModal" value="${p.modal}"></div><div class="form-group col-1"><label>Jual</label><input type="number" id="editJual" value="${p.jual}"></div></div><button class="btn btn-primary btn-block" onclick="saveEditProduct('${sku}')">Update</button></div>`;}
async function saveEditProduct(sku){const d={sku,nama:document.getElementById('editNama')?.value,modal:parseFloat(document.getElementById('editModal')?.value),jual:parseFloat(document.getElementById('editJual')?.value)};await apiCall('updateProduct',d);loadAllData();navigateTo('produk');Swal.fire('Sukses','Diupdate','success');}
async function deleteProductConfirm(sku){const c=await Swal.fire({title:'Hapus Produk?',text:`Hapus ${sku}?`,icon:'warning',showCancelButton:true,confirmButtonText:'Ya, Hapus'});if(c.isConfirmed){await apiCall('deleteProduct',{sku});loadAllData();navigateTo('produk');Swal.fire('Sukses','Dihapus','success');}}

// ============================================
// PELANGGAN
// ============================================
function pagePelanggan(){let h=`<div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-address-book"></i> Pelanggan</div>${renderRefreshButton('pelanggan')}</div><div class="flex-row mb-2"><input id="newCustName" placeholder="Nama" style="flex:2;"><button class="btn btn-primary btn-sm" onclick="addPelanggan()">+</button></div><table><tr><th>No</th><th>Nama</th><th>Aksi</th></tr>`;pelanggan.forEach((c,i)=>{h+=`<tr><td>${i+1}</td><td>${c}</td><td><button class="btn btn-danger btn-sm" onclick="deletePelangganConfirm('${c}')"><i class="fas fa-trash"></i></button></td></tr>`;});h+='</table></div>';return h;}
async function addPelanggan(){const n=document.getElementById('newCustName')?.value.trim();if(!n)return;await apiCall('addPelanggan',{name:n});loadAllData();navigateTo('pelanggan');}
async function deletePelangganConfirm(name){const c=await Swal.fire({title:'Hapus?',icon:'warning',showCancelButton:true});if(c.isConfirmed){await apiCall('deletePelanggan',{name});loadAllData();navigateTo('pelanggan');}}

// ============================================
// PENGATURAN
// ============================================
function pagePengaturan(){return`<div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-store"></i> Info Toko</div>${renderRefreshButton('pengaturan')}</div><div class="form-group"><label>Nama Toko</label><input id="setNama" value="${settings.namaToko||''}"></div><div class="form-group"><label>Tagline</label><input id="setTagline" value="${settings.tagline||''}"></div><div class="form-group"><label>Alamat</label><input id="setAlamat" value="${settings.alamat||''}"></div><div class="form-group"><label>Bottom Line</label><input id="setBottomLine" value="${settings.bottomLine||''}"></div><button class="btn btn-primary btn-block" onclick="saveSettings()">Simpan</button></div><div class="card"><div class="card-title"><i class="fas fa-upload"></i> Upload</div><div class="form-group"><label>Logo</label><input type="file" accept="image/*" onchange="uploadLogo(event)">${settings.logo?'<img src="'+settings.logo+'" style="width:60px;height:60px;border-radius:50%;margin-top:8px;">':''}</div><div class="form-group"><label>QRIS</label><input type="file" accept="image/*" onchange="uploadQris(event)">${settings.qris?'<img src="'+settings.qris+'" style="width:80px;margin-top:8px;">':''}</div></div><div class="card"><div class="card-title"><i class="fas fa-university"></i> Bank</div>${banks.map(b => `<div class="flex-between"><span>${b.logo||'🏦'} <b>${b.name||''}</b>: ${b.number||''} (${b.holder||''})</span><button class="btn btn-danger btn-sm" onclick="deleteBank('${b.name}')"><i class="fas fa-trash"></i></button></div>`).join('')}<div class="flex-row mt-2"><input id="bnkName" placeholder="Bank" style="flex:1;"><input id="bnkNum" placeholder="No.Rek" style="flex:1;"><input id="bnkHolder" placeholder="Pemilik" style="flex:1;"><button class="btn btn-primary btn-sm" onclick="addBank()">+</button></div></div><div class="card"><div class="card-title"><i class="fas fa-users"></i> Sales & User</div><h5 style="font-size:0.7rem;">Sales: ${salesUsers.join(', ')}</h5><div class="flex-row mt-2"><input id="newSalesName" placeholder="Sales" style="flex:2;"><button class="btn btn-primary btn-sm" onclick="addSalesUser()">+</button></div><h5 style="font-size:0.7rem;margin-top:8px;">Users:</h5>${allUsers.map(u => `<div class="flex-between"><span>🔑 <b>${u.name||''}</b> (${u.role||''})</span><button class="btn btn-danger btn-sm" onclick="deleteUserLogin('${u.name}')"><i class="fas fa-trash"></i></button></div>`).join('')}<div class="flex-row mt-2"><input id="newUserName" placeholder="User" style="flex:1;"><select id="newUserRole" style="flex:1;"><option value="admin">Admin</option><option value="sales">Sales</option><option value="driver">Driver</option></select><input id="newUserPass" placeholder="Pass" value="123456" style="flex:1;"><button class="btn btn-primary btn-sm" onclick="addUserLogin()">+</button></div></div><div class="card"><div class="card-title"><i class="fas fa-truck"></i> Driver</div>${drivers.map(d=>`<div class="flex-between"><span>🚚 ${d}</span><button class="btn btn-danger btn-sm" onclick="deleteDriver('${d}')"><i class="fas fa-trash"></i></button></div>`).join('')}<div class="flex-row mt-2"><input id="drvName" placeholder="Driver" style="flex:2;"><button class="btn btn-primary btn-sm" onclick="addDriver()">+</button></div></div>`;}

async function saveSettings(){settings.namaToko=document.getElementById('setNama')?.value;settings.tagline=document.getElementById('setTagline')?.value;settings.alamat=document.getElementById('setAlamat')?.value;settings.bottomLine=document.getElementById('setBottomLine')?.value;await apiCall('updateSettings',settings);saveAllData();document.getElementById('headerAlamat').textContent=settings.alamat;Swal.fire('Sukses','Disimpan','success');}
function uploadLogo(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){document.getElementById('logoImg').src=ev.target.result;settings.logo=ev.target.result;apiCall('updateSettings',{logo:ev.target.result});saveAllData();};r.readAsDataURL(f);}
function uploadQris(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){settings.qris=ev.target.result;apiCall('updateSettings',{qris:ev.target.result});saveAllData();Swal.fire('Sukses','QRIS diupload','success');};r.readAsDataURL(f);}
async function addBank(){const n=document.getElementById('bnkName')?.value.trim(),num=document.getElementById('bnkNum')?.value.trim(),h=document.getElementById('bnkHolder')?.value.trim();if(!n||!num)return Swal.fire('Error','Nama & nomor wajib','error');await apiCall('addBank',{name:n,number:num,holder:h});loadAllData();navigateTo('pengaturan');}
async function deleteBank(name){await apiCall('deleteBank',{name});loadAllData();navigateTo('pengaturan');}
async function addSalesUser(){const n=document.getElementById('newSalesName')?.value.trim();if(!n)return;const r=await apiCall('addSalesUser',{name:n});if(r.success){salesUsers=r.data;navigateTo('pengaturan');}}
async function deleteSalesUser(name){const r=await apiCall('deleteSalesUser',{name});if(r.success){salesUsers=r.data;navigateTo('pengaturan');}}
async function addUserLogin(){const n=document.getElementById('newUserName')?.value.trim(),ro=document.getElementById('newUserRole')?.value,p=document.getElementById('newUserPass')?.value;if(!n)return;await apiCall('addUser',{name:n,role:ro,password:p});loadAllData();navigateTo('pengaturan');Swal.fire('Sukses','User ditambahkan','success');}
async function deleteUserLogin(name){const c=await Swal.fire({title:'Hapus?',icon:'warning',showCancelButton:true});if(c.isConfirmed){await apiCall('deleteUser',{name});loadAllData();navigateTo('pengaturan');}}
async function addDriver(){const n=document.getElementById('drvName')?.value.trim();if(!n)return;const r=await apiCall('addDriver',{name:n});if(r.success){drivers=r.data;navigateTo('pengaturan');Swal.fire('Sukses','Driver ditambahkan','success');}}
async function deleteDriver(name){const r=await apiCall('deleteDriver',{name});if(r.success){drivers=r.data;navigateTo('pengaturan');}}

// ============================================
// INIT
// ============================================
document.addEventListener('DOMContentLoaded',()=>{loadAllData();const savedUser=localStorage.getItem('tirtaUser');if(savedUser){currentUser=JSON.parse(savedUser);showMainApp();}});
</script>
</body>
</html>
