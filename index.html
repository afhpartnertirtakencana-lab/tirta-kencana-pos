<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0A4D8C">
  <title>Tirta Kencana · Air Minum</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    :root{--biru:#0A4D8C;--kuning:#F4B400;--bg:#F1F5F9;--card:#FFFFFF;--border:#E2E8F0;--text:#1E293B;--merah:#EF4444;--hijau:#10B981;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:8px;color:var(--text);}
    .app-container{max-width:500px;width:100%;background:var(--card);border-radius:24px;box-shadow:0 2px 12px rgba(0,0,0,0.06);overflow:hidden;display:flex;flex-direction:column;min-height:95vh;}
    @media(min-width:768px){.app-container{max-width:720px;}}
    .header{background:linear-gradient(135deg,#0A4D8C,#0B5FA5);color:white;padding:18px 20px 14px;text-align:center;}
    .brand{font-size:1.9rem;font-weight:800;display:flex;justify-content:center;gap:6px;}.tirta{color:#fff;}.kencana{color:var(--kuning);}
    .tagline{font-size:0.7rem;margin:4px 0;}.alamat{font-size:0.65rem;opacity:0.8;}
    .nav-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#F8FAFC;border-bottom:1px solid var(--border);}
    .user-info{display:flex;align-items:center;gap:8px;}
    .avatar{width:32px;height:32px;border-radius:50%;background:var(--biru);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;}
    .role-tag{background:var(--kuning);color:#0A2540;padding:3px 10px;border-radius:20px;font-size:0.6rem;font-weight:700;text-transform:uppercase;}
    .btn-logout{background:var(--merah);color:white;border:none;padding:6px 14px;border-radius:8px;font-size:0.7rem;cursor:pointer;}
    .btn-refresh{background:var(--hijau);color:white;border:none;padding:6px 10px;border-radius:8px;font-size:0.65rem;cursor:pointer;margin-left:4px;}
    .menu-tabs{display:flex;overflow-x:auto;gap:4px;padding:8px 10px;border-bottom:1px solid var(--border);}
    .tab{flex:0 0 auto;padding:7px 14px;border-radius:20px;border:1px solid var(--border);font-size:0.7rem;font-weight:600;cursor:pointer;white-space:nowrap;color:#64748B;display:flex;align-items:center;gap:4px;}
    .tab.active{background:var(--biru);color:white;border-color:var(--biru);}
    .content-area{flex:1;padding:12px;overflow-y:auto;max-height:calc(100vh - 250px);}
    .card{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:10px;border:1px solid var(--border);}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
    .card-title{font-weight:700;font-size:0.9rem;color:var(--biru);display:flex;align-items:center;gap:6px;}.card-title i{color:var(--kuning);}
    .form-group{margin-bottom:8px;}.form-group label{display:block;font-size:0.7rem;font-weight:600;color:#475569;margin-bottom:3px;}
    input,select{width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--border);font-size:0.8rem;outline:none;}
    .btn{padding:10px 16px;border-radius:12px;border:none;font-size:0.8rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
    .btn-primary{background:var(--biru);color:white;}.btn-success{background:var(--hijau);color:white;}.btn-sm{padding:6px 10px;font-size:0.7rem;border-radius:8px;}.btn-block{width:100%;justify-content:center;}
    .flex-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}.col-1{flex:1;}
    .summary-box{flex:1;text-align:center;padding:10px;border-radius:12px;font-size:0.65rem;}
    .status-badge{padding:3px 8px;border-radius:10px;font-size:0.6rem;font-weight:600;display:inline-block;}
    .status-cod{background:#D1FAE5;color:#065F46;}.status-transfer{background:#DBEAFE;color:#1E40AF;}
    .status-qris{background:#FEF3C7;color:#92400E;}.status-belumbayar{background:#FEE2E2;color:#991B1B;}
    table{width:100%;border-collapse:collapse;font-size:0.7rem;}th,td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);}
    th{background:#E6F0FA;color:var(--biru);font-weight:700;font-size:0.65rem;}
    .bottom-bar{text-align:center;font-size:0.65rem;color:#64748B;padding:10px;border-top:1px solid var(--border);}
    .hidden{display:none!important;}.mb-2{margin-bottom:8px;}.text-center{text-align:center;}.text-sm{font-size:0.7rem;}
    .user-section{border:2px solid var(--kuning);border-radius:12px;padding:10px;margin:10px 0;background:#FFF8E1;}
    .login-container{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#0A4D8C,#0B5FA5);}
    .login-card{background:white;padding:30px;border-radius:24px;width:340px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.2);}
    .debug-box{background:#1a1a2e;color:#0f0;padding:8px;border-radius:8px;font-size:0.55rem;margin:8px 0;font-family:monospace;max-height:100px;overflow-y:auto;}
  </style>
</head>
<body>

<div id="loginPage" class="login-container">
  <div class="login-card">
    <div class="brand"><span style="color:#0A4D8C;">Tirta</span><span style="color:#F4B400;">Kencana</span></div>
    <p style="font-size:0.7rem;color:#64748B;margin-bottom:20px;">DO GOOD AND GOOD WILL COME TO YOU</p>
    <div class="form-group"><input type="text" id="loginUser" placeholder="Username" style="text-align:center;"></div>
    <div class="form-group"><input type="password" id="loginPass" placeholder="Password" style="text-align:center;"></div>
    <button class="btn btn-primary btn-block" onclick="doLogin()">Masuk</button>
    <p style="font-size:0.6rem;margin-top:10px;color:#94A3B8;">Admin: Admin/admin123</p>
  </div>
</div>

<div id="mainApp" class="app-container hidden">
  <div class="header">
    <div class="brand"><span class="tirta">Tirta</span><span class="kencana">Kencana</span></div>
    <div class="tagline">DO GOOD AND GOOD WILL COME TO YOU</div>
    <div class="alamat" id="headerAlamat">WTC Mangga 2 Lt UG A/53</div>
  </div>
  <div class="nav-bar">
    <div class="user-info"><div class="avatar" id="userAvatar">A</div><div><div id="displayName" style="font-size:0.75rem;font-weight:600;">Admin</div><span class="role-tag" id="displayRole">ADMIN</span></div></div>
    <div>
      <button class="btn-refresh" onclick="refreshAllData()">🔄 Sync</button>
      <button class="btn-logout" onclick="doLogout()">Keluar</button>
    </div>
  </div>
  <div class="menu-tabs" id="menuTabs"></div>
  <div class="content-area" id="contentArea"></div>
  <div class="bottom-bar">Terima kasih sudah berbelanja · Tirta Kencana</div>
</div>

<script>
// CONFIG
const GOOGLE_SHEETS_URL='https://script.google.com/macros/s/AKfycbz5kcAi9G2KTolWa4H9yEjy9qdwBTLDK2wXmWYJFyVVwpMXQQgaNybPGYVT95kRGOCu/exec';
const USE_GOOGLE_SHEETS=true;

// STATE
let currentUser=null,currentPage='penjualan';
let products=[],pelanggan=[],cart=[],salesHistory=[],stockInHistory=[],setoranHistory=[];
let drivers=[],salesUsers=[],banks=[];
let settings={namaToko:'Tirta Kencana',alamat:'WTC Mangga 2 Lt UG A/53',tagline:'DO GOOD AND GOOD WILL COME TO YOU',bottomLine:'Terima kasih sudah berbelanja'};
let allUsers=[];
let debugMsgs=[];

function debug(msg){debugMsgs.push(msg);console.log(msg);if(debugMsgs.length>20)debugMsgs.shift();}

// STORAGE
function saveAllData(){localStorage.setItem('tirtaFullData',JSON.stringify({products,pelanggan,salesHistory,stockInHistory,setoranHistory,drivers,salesUsers,banks,settings,allUsers}));}
function loadAllData(){const s=localStorage.getItem('tirtaFullData');if(s)try{const d=JSON.parse(s);products=d.products||[];pelanggan=d.pelanggan||[];salesHistory=d.salesHistory||[];stockInHistory=d.stockInHistory||[];setoranHistory=d.setoranHistory||[];drivers=d.drivers||[];salesUsers=d.salesUsers||[];banks=d.banks||[];settings={...settings,...(d.settings||{})};allUsers=d.allUsers||[];}catch(e){}
  if(products.length===0)products=[{sku:'AQ001',nama:'Aqua 330ml',modal:2200,jual:3500,stokAwal:100,stokMasuk:0,stokKeluar:0,stokAkhir:100}];
  if(pelanggan.length===0)pelanggan=['Warung Mpok'];
  if(drivers.length===0)drivers=['Hendri','Asep'];
  if(banks.length===0)banks=[{name:'BCA',number:'6930099099',holder:'Hendri',logo:'🏦'}];
  if(allUsers.length===0)allUsers=[{name:'Admin',role:'admin',password:'admin123'},{name:'Sales A',role:'sales',password:'sales123'},{name:'Driver',role:'driver',password:'driver123'}];
}

// SYNC
async function syncToGoogleSheets(action,data){if(!USE_GOOGLE_SHEETS)return;try{await fetch(GOOGLE_SHEETS_URL+'?action='+action+'&data='+encodeURIComponent(JSON.stringify(data)),{method:'GET',mode:'no-cors'});}catch(e){}}

async function refreshAllData(){
  debug('🔄 refreshAllData() called');
  debug('salesHistory before sync: '+salesHistory.length);
  
  try{
    const r=await fetch(GOOGLE_SHEETS_URL+'?action=getAllData');
    const d=await r.json();
    debug('Server response: success='+d.success);
    
    if(d.success&&d.data){
      if(d.data.products&&d.data.products.length>0)products=d.data.products;
      if(d.data.pelanggan&&d.data.pelanggan.length>0)pelanggan=d.data.pelanggan;
      
      // INI YANG PENTING - JANGAN OVERWRITE DENGAN ARRAY KOSONG
      if(d.data.salesHistory&&d.data.salesHistory.length>0){
        salesHistory=d.data.salesHistory;
        debug('✅ salesHistory updated: '+salesHistory.length);
      } else {
        debug('⚠️ salesHistory from server is EMPTY! Keeping local data: '+salesHistory.length);
      }
      
      if(d.data.stockInHistory&&d.data.stockInHistory.length>0){
        stockInHistory=d.data.stockInHistory;
        debug('✅ stockInHistory updated: '+stockInHistory.length);
      }
      
      if(d.data.setoranHistory&&d.data.setoranHistory.length>0)setoranHistory=d.data.setoranHistory;
      if(d.data.drivers&&d.data.drivers.length>0)drivers=d.data.drivers;
      if(d.data.banks&&d.data.banks.length>0)banks=d.data.banks;
      if(d.data.settings)settings={...settings,...d.data.settings};
      if(d.data.allUsers&&d.data.allUsers.length>0){allUsers=d.data.allUsers;salesUsers=allUsers.filter(u=>u.role==='sales'||u.role==='admin').map(u=>u.name);}
      if(salesUsers.length===0)salesUsers=['Sales A','Sales B'];
      
      saveAllData();
      if(settings.alamat)document.getElementById('headerAlamat').textContent=settings.alamat;
      
      debug('After sync - salesHistory: '+salesHistory.length+' | stockInHistory: '+stockInHistory.length);
      
      // RENDER ULANG
      renderContent();
    }
  }catch(e){debug('❌ Error: '+e.message);}
}

// AUTH
function doLogin(){const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value.trim();if(!u||!p)return;const f=allUsers.find(x=>x.name===u&&x.password===p);if(f){currentUser={name:f.name,role:f.role};localStorage.setItem('tirtaUser',JSON.stringify(currentUser));showMainApp();}}
function doLogout(){localStorage.removeItem('tirtaUser');currentUser=null;document.getElementById('loginPage').classList.remove('hidden');document.getElementById('mainApp').classList.add('hidden');}
function showMainApp(){document.getElementById('loginPage').classList.add('hidden');document.getElementById('mainApp').classList.remove('hidden');document.getElementById('displayName').textContent=currentUser.name;document.getElementById('displayRole').textContent=currentUser.role.toUpperCase();document.getElementById('userAvatar').textContent=currentUser.name.charAt(0).toUpperCase();renderMenuTabs();navigateTo('penjualan');}

// NAVIGATION
function renderMenuTabs(){let h='';const r=currentUser?.role;
  if(r==='admin')h=`<button class="tab ${currentPage==='penjualan'?'active':''}" onclick="navigateTo('penjualan')">Jual</button><button class="tab ${currentPage==='rekap'?'active':''}" onclick="navigateTo('rekap')">Rekap</button><button class="tab ${currentPage==='gudang'?'active':''}" onclick="navigateTo('gudang')">Gudang</button>`;
  else if(r==='sales')h=`<button class="tab ${currentPage==='penjualan'?'active':''}" onclick="navigateTo('penjualan')">Jual</button><button class="tab ${currentPage==='rekap'?'active':''}" onclick="navigateTo('rekap')">Rekap</button>`;
  document.getElementById('menuTabs').innerHTML=h;
}
function navigateTo(p){currentPage=p;renderMenuTabs();renderContent();}
function renderContent(){const c=document.getElementById('contentArea');switch(currentPage){case'penjualan':c.innerHTML=pagePenjualan();initPenjualan();break;case'rekap':loadRekap(c);break;case'gudang':loadGudang(c);break;}}

// PENJUALAN
function pagePenjualan(){let co='<option value="">Pilih</option>';pelanggan.forEach(c=>{co+=`<option>${c}</option>`;});return`<div class="card"><div class="card-title">Data Penjualan</div><div class="form-group"><label>Sales</label><input value="${currentUser?.name||''}" readonly></div><div class="form-group"><label>Pelanggan</label><select id="custSelect">${co}</select></div><div class="form-group"><label>Status</label><select id="payStatus"><option value="cod">COD</option><option value="transfer">Transfer</option></select></div></div><div class="card"><div class="card-title">Item</div><div id="cartItems"></div><button class="btn btn-sm" onclick="addCartItem()">+ Tambah</button><div style="text-align:right;font-weight:700;margin:8px 0;">Total: Rp <span id="cartTotal">0</span></div><button class="btn btn-primary btn-block" onclick="saveSale()">Simpan</button></div>`;}
function initPenjualan(){if(cart.length===0)cart.push({sku:'',qty:1,disc:0});renderCart();}
function addCartItem(){cart.push({sku:'',qty:1,disc:0});renderCart();}
function removeCartItem(i){cart.splice(i,1);renderCart();}
function updateCart(i,f,v){if(f==='qty')cart[i].qty=parseInt(v)||1;else if(f==='disc')cart[i].disc=parseInt(v)||0;else cart[i][f]=v;if(f==='sku'){const p=products.find(x=>x.sku===v);if(p){cart[i].harga=p.jual;cart[i].nama=p.nama;cart[i].modal=p.modal;}}renderCart();}
function renderCart(){const el=document.getElementById('cartItems');if(!el)return;el.innerHTML=cart.map((item,i)=>{const p=products.find(x=>x.sku===item.sku),h=p?p.jual:(item.harga||0),dp=item.disc||0,dt=dp*item.qty,sub=(item.qty*h)-dt;let po='<option value="">Pilih</option>';products.forEach(p=>{po+=`<option value="${p.sku}" ${item.sku===p.sku?'selected':''}>${p.sku}-${p.nama}(${p.stokAkhir})</option>`;});return`<div class="flex-row" style="margin-bottom:4px;"><select onchange="updateCart(${i},'sku',this.value)" style="flex:2;font-size:0.7rem;">${po}</select><input type="number" value="${item.qty}" onchange="updateCart(${i},'qty',this.value)" style="width:50px;" min="1"><input type="number" value="${dp}" onchange="updateCart(${i},'disc',this.value)" style="width:60px;" placeholder="Disc"><span style="font-size:0.7rem;">Rp${sub.toLocaleString()}</span><button onclick="removeCartItem(${i})">✕</button></div>`;}).join('');let sa=0,td=0;cart.forEach(i=>{const p=products.find(x=>x.sku===i.sku),h=p?p.jual:(i.harga||0);sa+=i.qty*h;td+=(i.disc||0)*i.qty;});document.getElementById('cartTotal').textContent=(sa-td).toLocaleString();}
async function saveSale(){const cust=document.getElementById('custSelect')?.value;if(!cust)return;const valid=cart.filter(i=>i.sku&&products.find(p=>p.sku===i.sku));if(valid.length===0)return;const status=document.getElementById('payStatus')?.value||'cod';const items=valid.map(i=>{const p=products.find(x=>x.sku===i.sku);const hj=p?p.jual:(i.harga||0);const hm=p?p.modal:(i.modal||0);const q=parseInt(i.qty)||0;const dp=parseInt(i.disc)||0;const profit=(hj-dp-hm)*q;const dt=dp*q;const sub=(q*hj)-dt;return{sku:i.sku,nama:p?.nama||'',qty:q,harga:hj,disc:dp,modal:hm,discTotal:dt,subtotal:sub,profit:profit};});let total=0,tq=0,td=0,tp=0;items.forEach(i=>{total+=i.subtotal;tq+=i.qty;td+=i.discTotal;tp+=i.profit;});const ns={id:'INV-'+Date.now(),user:currentUser.name,customer:cust,status,items,total,totalQty:tq,totalDisc:td,totalProfit:tp,date:new Date().toISOString().split('T')[0],time:new Date().toLocaleTimeString('id-ID')};salesHistory.unshift(ns);items.forEach(i=>{const p=products.find(x=>x.sku===i.sku);if(p){p.stokKeluar=(p.stokKeluar||0)+i.qty;p.stokAkhir=(p.stokAwal||0)+(p.stokMasuk||0)-p.stokKeluar;}});if(!pelanggan.includes(cust))pelanggan.push(cust);saveAllData();syncToGoogleSheets('createSale',ns);debug('✅ Penjualan disimpan: '+ns.id+' | salesHistory now: '+salesHistory.length);cart=[{sku:'',qty:1,disc:0}];renderCart();document.getElementById('custSelect').value='';}

// REKAP - PERBAIKAN: AMBIL DATA LANGSUNG TANPA FILTER INPUT
function loadRekap(container){
  debug('📊 loadRekap() called | salesHistory: '+salesHistory.length);
  
  let h='<div class="card"><div class="card-header"><div class="card-title">📊 Rekap Penjualan</div><button class="btn-refresh btn-sm" onclick="refreshAllData()">🔄 Sync</button></div>';
  
  // DEBUG BOX
  h+='<div class="debug-box">'+debugMsgs.join('<br>')+'</div>';
  
  // TAMPILKAN SEMUA DATA TANPA FILTER (SAMA SEPERTI GUDANG)
  if(salesHistory.length===0){
    h+='<p class="text-center">📭 Belum ada data penjualan. <button class="btn btn-success btn-sm" onclick="navigateTo(\'penjualan\')">Buat Penjualan</button></p></div>';
    container.innerHTML=h;return;
  }
  
  const tt=salesHistory.length;
  const tp=salesHistory.reduce((s,x)=>s+(x.total||0),0);
  const tq=salesHistory.reduce((s,x)=>s+(x.totalQty||0),0);
  
  h+=`<div class="flex-row mb-2">
    <div class="summary-box" style="background:#E6F0FA;"><small>Transaksi</small><br><b>${tt}</b></div>
    <div class="summary-box" style="background:#FFF8E1;"><small>Pendapatan</small><br><b>Rp${tp.toLocaleString()}</b></div>
    <div class="summary-box" style="background:#D1FAE5;"><small>QTY</small><br><b>${tq}</b></div>
  </div>`;
  
  // TABEL SEDERHANA
  h+='<table><tr><th>Tgl</th><th>Customer</th><th>Sales</th><th>Status</th><th>Total</th></tr>';
  salesHistory.slice(0,50).forEach(s=>{
    h+=`<tr><td>${s.date}</td><td>${s.customer}</td><td>${s.user}</td><td><span class="status-badge status-${s.status}">${s.status}</span></td><td>Rp${(s.total||0).toLocaleString()}</td></tr>`;
  });
  h+='</table></div>';
  
  container.innerHTML=h;
}

// GUDANG - SAMA SEPERTI SEBELUMNYA (BERHASIL)
function loadGudang(container){
  let h='<div class="card"><div class="card-header"><div class="card-title">📊 Rekap Gudang</div><button class="btn-refresh btn-sm" onclick="refreshAllData()">🔄 Sync</button></div>';
  h+='<div class="debug-box">'+debugMsgs.join('<br>')+'</div>';
  
  if(stockInHistory.length===0){
    h+='<p class="text-center">📭 Belum ada data.</p></div>';
    container.innerHTML=h;return;
  }
  
  const tq=stockInHistory.reduce((s,i)=>s+(i.qty||0),0);
  h+=`<div class="flex-row mb-2"><div class="summary-box" style="background:#D1FAE5;">Total QTY: <b>${tq}</b></div></div>`;
  h+='<table><tr><th>Tgl</th><th>SKU</th><th>Qty</th><th>Driver</th></tr>';
  stockInHistory.slice(0,50).forEach(s=>{
    h+=`<tr><td>${s.date}</td><td>${s.sku}</td><td>${s.qty}</td><td>${s.driver||'-'}</td></tr>`;
  });
  h+='</table></div>';
  container.innerHTML=h;
}

// INIT
document.addEventListener('DOMContentLoaded',()=>{loadAllData();const savedUser=localStorage.getItem('tirtaUser');if(savedUser){currentUser=JSON.parse(savedUser);showMainApp();}});
</script>
</body>
</html>
