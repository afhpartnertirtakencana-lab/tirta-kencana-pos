<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0A4D8C">
  <title>Tirta Kencana · Air Minum</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{--biru:#0A4D8C;--kuning:#F4B400;--bg:#F1F5F9;--card:#FFFFFF;--border:#E2E8F0;--text:#1E293B;--merah:#EF4444;--hijau:#10B981;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:8px;color:var(--text);}
    .app-container{max-width:500px;width:100%;background:var(--card);border-radius:24px;box-shadow:0 2px 12px rgba(0,0,0,0.06);overflow:hidden;display:flex;flex-direction:column;min-height:95vh;}
    @media(min-width:768px){.app-container{max-width:720px;}}
    .header{background:linear-gradient(135deg,#0A4D8C,#0B5FA5);color:white;padding:18px 20px 14px;text-align:center;}
    .brand{font-size:1.9rem;font-weight:800;display:flex;justify-content:center;gap:6px;}.tirta{color:#fff;}.kencana{color:var(--kuning);}
    .tagline{font-size:0.7rem;margin:4px 0;}.alamat{font-size:0.65rem;opacity:0.8;}
    .logo-circle{width:45px;height:45px;background:white;border-radius:50%;margin:8px auto 0;overflow:hidden;border:2px solid var(--kuning);display:flex;align-items:center;justify-content:center;}
    .logo-circle span{font-size:26px;}
    .nav-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#F8FAFC;border-bottom:1px solid var(--border);}
    .user-info{display:flex;align-items:center;gap:8px;}.avatar{width:32px;height:32px;border-radius:50%;background:var(--biru);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;}
    .role-tag{background:var(--kuning);color:#0A2540;padding:3px 10px;border-radius:20px;font-size:0.6rem;font-weight:700;}
    .btn-logout{background:var(--merah);color:white;border:none;padding:6px 14px;border-radius:8px;font-size:0.7rem;cursor:pointer;}
    .btn-refresh{background:var(--hijau);color:white;border:none;padding:6px 10px;border-radius:8px;font-size:0.65rem;cursor:pointer;}
    .menu-tabs{display:flex;overflow-x:auto;gap:4px;padding:8px 10px;border-bottom:1px solid var(--border);}
    .tab{flex:0 0 auto;padding:7px 14px;border-radius:20px;border:1px solid var(--border);font-size:0.7rem;font-weight:600;cursor:pointer;white-space:nowrap;color:#64748B;display:flex;align-items:center;gap:4px;}
    .tab.active{background:var(--biru);color:white;border-color:var(--biru);}
    .content-area{flex:1;padding:12px;overflow-y:auto;max-height:calc(100vh - 280px);}
    .card{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:10px;border:1px solid var(--border);}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
    .card-title{font-weight:700;font-size:0.9rem;color:var(--biru);display:flex;align-items:center;gap:6px;}
    .form-group{margin-bottom:8px;}.form-group label{display:block;font-size:0.7rem;font-weight:600;color:#475569;margin-bottom:3px;}
    input,select{width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--border);font-size:0.8rem;outline:none;}
    input[readonly]{background:#E6F0FA;font-weight:600;}
    .btn{padding:10px 16px;border-radius:12px;border:none;font-size:0.8rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
    .btn-primary{background:var(--biru);color:white;}.btn-success{background:var(--hijau);color:white;}.btn-sm{padding:6px 10px;font-size:0.7rem;border-radius:8px;}.btn-block{width:100%;justify-content:center;}
    .flex-row{display:flex;gap:6px;align-items:center;}.col-1{flex:1;}
    .total-box{background:#FFF8E1;padding:10px 14px;border-radius:12px;margin:8px 0;text-align:right;font-weight:700;font-size:1.1rem;color:var(--biru);}
    .status-badge{padding:3px 8px;border-radius:10px;font-size:0.6rem;font-weight:600;display:inline-block;}
    .status-cod{background:#D1FAE5;color:#065F46;}.status-transfer{background:#DBEAFE;color:#1E40AF;}
    table{width:100%;border-collapse:collapse;font-size:0.7rem;}th,td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);}
    th{background:#E6F0FA;color:var(--biru);font-weight:700;font-size:0.65rem;}
    .bottom-bar{text-align:center;font-size:0.65rem;color:#64748B;padding:10px;border-top:1px solid var(--border);}
    .hidden{display:none!important;}.mb-2{margin-bottom:8px;}.text-center{text-align:center;}.text-sm{font-size:0.7rem;}
    .summary-box{flex:1;text-align:center;padding:10px;border-radius:12px;font-size:0.65rem;}
    .user-section{border:2px solid var(--kuning);border-radius:12px;padding:10px;margin:10px 0;background:#FFF8E1;}
    .login-container{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#0A4D8C,#0B5FA5);}
    .login-card{background:white;padding:30px;border-radius:24px;width:340px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.2);}
    .cart-sku{flex:2.5!important;font-size:0.7rem!important;min-width:110px!important;}
    .cart-qty{width:45px!important;font-size:0.7rem!important;}.cart-disc{width:55px!important;font-size:0.7rem!important;}
    @media(max-width:480px){.cart-sku{flex:2!important;font-size:0.65rem!important;min-width:90px!important;}}
  </style>
</head>
<body>

<div id="loginPage" class="login-container">
  <div class="login-card">
    <div class="brand" style="margin-bottom:10px;"><span style="color:#0A4D8C;">Tirta</span><span style="color:#F4B400;">Kencana</span></div>
    <p style="font-size:0.7rem;color:#64748B;margin-bottom:20px;">DO GOOD AND GOOD WILL COME TO YOU</p>
    <div class="form-group"><input type="text" id="loginUser" placeholder="Username" style="text-align:center;"></div>
    <div class="form-group"><input type="password" id="loginPass" placeholder="Password" style="text-align:center;"></div>
    <button class="btn btn-primary btn-block" onclick="doLogin()">Masuk</button>
    <p style="font-size:0.6rem;margin-top:10px;color:#94A3B8;">Admin/admin123</p>
  </div>
</div>

<div id="mainApp" class="app-container hidden">
  <div class="header">
    <div class="brand"><span class="tirta">Tirta</span><span class="kencana">Kencana</span></div>
    <div class="tagline">DO GOOD AND GOOD WILL COME TO YOU</div>
    <div class="alamat" id="headerAlamat">WTC Mangga 2 Lt UG A/53</div>
    <div class="logo-circle"><span>💧</span></div>
  </div>
  <div class="nav-bar">
    <div class="user-info"><div class="avatar" id="userAvatar">A</div><div><div id="displayName" style="font-size:0.75rem;font-weight:600;">Admin</div><span class="role-tag" id="displayRole">ADMIN</span></div></div>
    <div><button class="btn-refresh" onclick="refreshAllData()">🔄 Sync</button><button class="btn-logout" onclick="doLogout()">Keluar</button></div>
  </div>
  <div class="menu-tabs" id="menuTabs"></div>
  <div class="content-area" id="contentArea"></div>
  <div class="bottom-bar">Terima kasih sudah berbelanja · Tirta Kencana</div>
</div>

<script>
const GURL='https://script.google.com/macros/s/AKfycbz5kcAi9G2KTolWa4H9yEjy9qdwBTLDK2wXmWYJFyVVwpMXQQgaNybPGYVT95kRGOCu/exec';
const USE_GS=true;

let cu=null,cp='penjualan';
let products=[],pelanggan=[],cart=[],salesHistory=[],stockInHistory=[],setoranHistory=[];
let drivers=[],salesUsers=[],banks=[];
let settings={namaToko:'Tirta Kencana',alamat:'WTC Mangga 2 Lt UG A/53',tagline:'DO GOOD AND GOOD WILL COME TO YOU',bottomLine:'Terima kasih sudah berbelanja'};
let allUsers=[];

function save(){localStorage.setItem('tk',JSON.stringify({products,pelanggan,salesHistory,stockInHistory,setoranHistory,drivers,salesUsers,banks,settings,allUsers}));}
function load(){const s=localStorage.getItem('tk');if(s)try{const d=JSON.parse(s);products=d.products||[];pelanggan=d.pelanggan||[];salesHistory=d.salesHistory||[];stockInHistory=d.stockInHistory||[];setoranHistory=d.setoranHistory||[];drivers=d.drivers||[];salesUsers=d.salesUsers||[];banks=d.banks||[];settings={...settings,...(d.settings||{})};allUsers=d.allUsers||[];}catch(e){}
  if(products.length===0)products=[{sku:'AQ001',nama:'Aqua 330ml',modal:2200,jual:3500,stokAwal:100}];
  if(pelanggan.length===0)pelanggan=['Warung Mpok'];
  if(allUsers.length===0)allUsers=[{name:'Admin',role:'admin',password:'admin123'},{name:'Sales A',role:'sales',password:'sales123'}];
}

async function sync(action,data){if(!USE_GS)return;try{await fetch(GURL+'?action='+action+'&data='+encodeURIComponent(JSON.stringify(data)),{method:'GET',mode:'no-cors'});}catch(e){}}

async function refresh(){
  try{
    const r=await fetch(GURL+'?action=getAllData');
    const d=await r.json();
    if(d.success&&d.data){
      if(d.data.products&&d.data.products.length>0)products=d.data.products;
      if(d.data.pelanggan&&d.data.pelanggan.length>0)pelanggan=d.data.pelanggan;
      if(d.data.salesHistory&&d.data.salesHistory.length>0)salesHistory=d.data.salesHistory;
      if(d.data.stockInHistory&&d.data.stockInHistory.length>0)stockInHistory=d.data.stockInHistory;
      if(d.data.setoranHistory&&d.data.setoranHistory.length>0)setoranHistory=d.data.setoranHistory;
      if(d.data.drivers&&d.data.drivers.length>0)drivers=d.data.drivers;
      if(d.data.banks&&d.data.banks.length>0)banks=d.data.banks;
      if(d.data.settings)settings={...settings,...d.data.settings};
      if(d.data.allUsers&&d.data.allUsers.length>0){allUsers=d.data.allUsers;salesUsers=allUsers.filter(u=>u.role==='sales'||u.role==='admin').map(u=>u.name);}
      save();
      if(settings.alamat)document.getElementById('headerAlamat').textContent=settings.alamat;
      renderContent();
    }
  }catch(e){}
}

function login(){const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value.trim();if(!u||!p)return;const f=allUsers.find(x=>x.name===u&&x.password===p);if(f){cu={name:f.name,role:f.role};localStorage.setItem('tku',JSON.stringify(cu));show();}}
function logout(){localStorage.removeItem('tku');cu=null;document.getElementById('loginPage').classList.remove('hidden');document.getElementById('mainApp').classList.add('hidden');}
function show(){document.getElementById('loginPage').classList.add('hidden');document.getElementById('mainApp').classList.remove('hidden');document.getElementById('displayName').textContent=cu.name;document.getElementById('displayRole').textContent=cu.role.toUpperCase();document.getElementById('userAvatar').textContent=cu.name.charAt(0).toUpperCase();if(settings.alamat)document.getElementById('headerAlamat').textContent=settings.alamat;menu();nav('penjualan');}

function menu(){let h='';const r=cu?.role;
  if(r==='admin')h=`<button class="tab ${cp==='penjualan'?'active':''}" onclick="nav('penjualan')">Jual</button><button class="tab ${cp==='rekap'?'active':''}" onclick="nav('rekap')">Rekap</button><button class="tab ${cp==='setoran'?'active':''}" onclick="nav('setoran')">Setoran</button><button class="tab ${cp==='gudang'?'active':''}" onclick="nav('gudang')">Gudang</button>`;
  else h=`<button class="tab ${cp==='penjualan'?'active':''}" onclick="nav('penjualan')">Jual</button><button class="tab ${cp==='rekap'?'active':''}" onclick="nav('rekap')">Rekap</button><button class="tab ${cp==='setoran'?'active':''}" onclick="nav('setoran')">Setoran</button>`;
  document.getElementById('menuTabs').innerHTML=h;
}
function nav(p){cp=p;menu();renderContent();}
function renderContent(){const c=document.getElementById('contentArea');
  switch(cp){
    case'penjualan':c.innerHTML=pJual();iJual();break;
    case'rekap':rRekap(c);break;
    case'setoran':c.innerHTML=pSetoran();rSetoran();break;
    case'gudang':rGudang(c);break;
  }
}

// JUAL
function pJual(){let co='<option value="">Pilih</option>';pelanggan.forEach(c=>{co+=`<option>${c}</option>`;});return`<div class="card"><div class="card-title">Data Penjualan</div><div class="form-group"><label>Sales</label><input value="${cu?.name||''}" readonly></div><div class="form-group"><label>Pelanggan</label><select id="cs">${co}</select></div><div class="form-group"><label>Status</label><select id="ps"><option value="cod">COD</option><option value="transfer">Transfer</option></select></div></div><div class="card"><div class="card-title">Item</div><div id="ci"></div><button class="btn btn-sm" onclick="addCart()">+ Tambah</button><div class="total-box">Total: Rp <span id="ct">0</span></div><button class="btn btn-primary btn-block" onclick="saveSale()">Simpan</button></div>`;}
function iJual(){if(cart.length===0)cart.push({sku:'',qty:1,disc:0});rCart();}
function addCart(){cart.push({sku:'',qty:1,disc:0});rCart();}
function rmCart(i){cart.splice(i,1);rCart();}
function upCart(i,f,v){if(f==='qty')cart[i].qty=parseInt(v)||1;else if(f==='disc')cart[i].disc=parseInt(v)||0;else cart[i][f]=v;if(f==='sku'){const p=products.find(x=>x.sku===v);if(p){cart[i].harga=p.jual;cart[i].nama=p.nama;cart[i].modal=p.modal;}}rCart();}
function rCart(){const el=document.getElementById('ci');if(!el)return;el.innerHTML=cart.map((item,i)=>{const p=products.find(x=>x.sku===item.sku),h=p?p.jual:(item.harga||0),dp=item.disc||0,dt=dp*item.qty,sub=(item.qty*h)-dt;let po='<option value="">Pilih</option>';products.forEach(p=>{po+=`<option value="${p.sku}" ${item.sku===p.sku?'selected':''}>${p.sku}-${p.nama}(${p.stokAkhir})</option>`;});return`<div class="flex-row" style="margin-bottom:4px;"><select onchange="upCart(${i},'sku',this.value)" class="cart-sku">${po}</select><input type="number" value="${item.qty}" onchange="upCart(${i},'qty',this.value)" class="cart-qty" min="1"><input type="number" value="${dp}" onchange="upCart(${i},'disc',this.value)" class="cart-disc" placeholder="Disc"><span style="font-size:0.7rem;">Rp${sub.toLocaleString()}</span><button onclick="rmCart(${i})" style="color:red;border:none;background:none;cursor:pointer;">✕</button></div>`;}).join('');let sa=0,td=0;cart.forEach(i=>{const p=products.find(x=>x.sku===i.sku),h=p?p.jual:(i.harga||0);sa+=i.qty*h;td+=(i.disc||0)*i.qty;});document.getElementById('ct').textContent=(sa-td).toLocaleString();}
async function saveSale(){const cust=document.getElementById('cs')?.value;if(!cust)return;const valid=cart.filter(i=>i.sku&&products.find(p=>p.sku===i.sku));if(valid.length===0)return;const status=document.getElementById('ps')?.value||'cod';const items=valid.map(i=>{const p=products.find(x=>x.sku===i.sku);const hj=p?p.jual:(i.harga||0);const hm=p?p.modal:(i.modal||0);const q=parseInt(i.qty)||0;const dp=parseInt(i.disc)||0;return{sku:i.sku,nama:p?.nama||'',qty:q,harga:hj,disc:dp,modal:hm,discTotal:dp*q,subtotal:(q*hj)-(dp*q),profit:(hj-dp-hm)*q};});let total=0;items.forEach(i=>{total+=i.subtotal;});const ns={id:'INV-'+Date.now(),user:cu.name,customer:cust,status,items,total,totalQty:items.reduce((s,i)=>s+i.qty,0),date:new Date().toISOString().split('T')[0],time:new Date().toLocaleTimeString('id-ID')};salesHistory.unshift(ns);items.forEach(i=>{const p=products.find(x=>x.sku===i.sku);if(p){p.stokKeluar=(p.stokKeluar||0)+i.qty;p.stokAkhir=(p.stokAwal||0)+(p.stokMasuk||0)-p.stokKeluar;}});if(!pelanggan.includes(cust))pelanggan.push(cust);save();sync('createSale',ns);cart=[{sku:'',qty:1,disc:0}];rCart();document.getElementById('cs').value='';Swal.fire('Sukses','Penjualan disimpan!','success');}

// REKAP
function rRekap(c){let h='<div class="card"><div class="card-header"><div class="card-title">📊 Rekap Penjualan</div><button class="btn-refresh btn-sm" onclick="refresh()">🔄</button></div>';if(salesHistory.length===0){h+='<p class="text-center">Belum ada data.</p></div>';c.innerHTML=h;return;}const tt=salesHistory.length,tp=salesHistory.reduce((s,x)=>s+(x.total||0),0);h+=`<div class="flex-row mb-2"><div class="summary-box" style="background:#E6F0FA;">Transaksi: <b>${tt}</b></div><div class="summary-box" style="background:#FFF8E1;">Total: <b>Rp${tp.toLocaleString()}</b></div></div>`;h+='<table><tr><th>Tgl</th><th>Customer</th><th>Sales</th><th>Status</th><th>Total</th></tr>';salesHistory.slice(0,30).forEach(s=>{h+=`<tr><td>${s.date}</td><td>${s.customer}</td><td>${s.user}</td><td><span class="status-badge status-${s.status}">${s.status}</span></td><td>Rp${(s.total||0).toLocaleString()}</td></tr>`;});h+='</table></div>';c.innerHTML=h;}

// SETORAN - CARA SAMA SEPERTI REKAP
function pSetoran(){const today=new Date().toISOString().split('T')[0];return`<div class="card"><div class="card-header"><div class="card-title">💰 Setoran Sales</div><button class="btn-refresh btn-sm" onclick="refresh()">🔄</button></div><div class="form-group"><label>Tanggal</label><input type="date" id="stgl" value="${today}"></div><button class="btn btn-primary btn-block mb-2" onclick="saveSetoran()">💾 Simpan Setoran Hari Ini</button></div><div class="card"><div class="card-title">📋 Riwayat Setoran</div><div id="sv"></div></div>`;}

function rSetoran(){
  const el=document.getElementById('sv');
  if(!el)return;
  
  // CARA SAMA SEPERTI REKAP - langsung tampilkan data
  if(setoranHistory.length===0){
    el.innerHTML='<p class="text-center text-sm">📭 Belum ada setoran. Klik tombol Simpan di atas.</p>';
    return;
  }
  
  const today=document.getElementById('stgl')?.value||new Date().toISOString().split('T')[0];
  const salesList=allUsers.filter(u=>u.role==='sales'||u.role==='admin').map(u=>u.name);
  
  let h='';
  const totalAll=setoranHistory.reduce((s,x)=>s+(x.total||0),0);
  h+=`<div class="flex-row mb-2"><div class="summary-box" style="background:#E6F0FA;">Total Setoran: <b>Rp${totalAll.toLocaleString()}</b></div></div>`;
  
  salesList.forEach(sn=>{
    const data=setoranHistory.filter(s=>s.sales===sn);
    if(data.length===0)return;
    const total=data.reduce((s,x)=>s+(x.total||0),0);
    h+=`<div class="user-section"><h4>👤 ${sn} | Total: Rp${total.toLocaleString()}</h4><table><tr><th>Tgl</th><th>Total</th><th>Setor</th><th>Selisih</th></tr>`;
    data.slice(0,15).forEach(s=>{
      h+=`<tr><td>${s.tanggal}</td><td>Rp${(s.total||0).toLocaleString()}</td><td>Rp${(s.setor||0).toLocaleString()}</td><td style="color:${(s.selisih||0)<0?'#EF4444':'#10B981'}">Rp${(s.selisih||0).toLocaleString()}</td></tr>`;
    });
    h+='</table></div>';
  });
  
  el.innerHTML=h;
}

async function saveSetoran(){
  const today=document.getElementById('stgl')?.value||new Date().toISOString().split('T')[0];
  const salesList=allUsers.filter(u=>u.role==='sales'||u.role==='admin').map(u=>u.name);
  if(salesList.length===0)return Swal.fire('Error','Tidak ada sales','error');
  
  let saved=0;
  for(const sn of salesList){
    const codTotal=salesHistory.filter(s=>s.date===today&&s.user===sn&&s.status==='cod').reduce((sum,s)=>sum+(s.total||0),0);
    if(codTotal>0){
      const data={sales:sn,tanggal:today,grandCOD:codTotal,makan:0,tips:0,parkir:0,flazz:0,bensin:0,transfer:0,ket1:'',jml1:0,ket2:'',jml2:0,cicilan:0,tagihan:0,total:codTotal,setor:codTotal,selisih:0,waktu:new Date().toLocaleTimeString('id-ID')};
      setoranHistory.unshift({id:'SET-'+Date.now()+'-'+sn,...data});
      saved++;
    }
  }
  
  if(saved>0){save();sync('syncAll',{setoranHistory});Swal.fire('Sukses',`${saved} setoran disimpan!`,'success');}
  else{Swal.fire('Info','Tidak ada transaksi COD hari ini','info');}
  rSetoran();
}

// GUDANG
function rGudang(c){let h='<div class="card"><div class="card-header"><div class="card-title">📊 Rekap Gudang</div><button class="btn-refresh btn-sm" onclick="refresh()">🔄</button></div>';if(stockInHistory.length===0){h+='<p class="text-center">Belum ada data.</p></div>';c.innerHTML=h;return;}const tq=stockInHistory.reduce((s,i)=>s+(i.qty||0),0);h+=`<div class="flex-row mb-2"><div class="summary-box" style="background:#D1FAE5;">Total QTY: <b>${tq}</b></div></div>`;h+='<table><tr><th>Tgl</th><th>SKU</th><th>Qty</th><th>Driver</th></tr>';stockInHistory.slice(0,30).forEach(s=>{h+=`<tr><td>${s.date}</td><td>${s.sku}</td><td>${s.qty}</td><td>${s.driver||'-'}</td></tr>`;});h+='</table></div>';c.innerHTML=h;}

document.addEventListener('DOMContentLoaded',()=>{load();const u=localStorage.getItem('tku');if(u){cu=JSON.parse(u);show();}});
</script>
</body>
</html>
