<script>
// ⚠️ Ganti dengan URL Web App Anda yang sudah di-deploy
const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzVcFoJQyRQll17cx9_ACk2PYwnhKJNxAO8JdeU5sjcCpZg1kdsDa0e0-v8pR_rhYB3GQ/exec';
const USE_GOOGLE_SHEETS = true;
const NOMOR_TELEPON = '088211058000';
let autoSyncInterval;

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBtn').style.display = 'block'; });
function installApp() { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(r => { if (r.outcome === 'accepted') console.log('Installed'); deferredPrompt = null; document.getElementById('installBtn').style.display = 'none'; }); } else { Swal.fire('Info', 'Klik menu browser > Add to Home Screen', 'info'); } }
function toggleDarkMode() { document.body.classList.toggle('dark'); const d = document.body.classList.contains('dark'); localStorage.setItem('tirtaDarkMode', d ? '1' : '0'); document.querySelector('.btn-darkmode').textContent = d ? '☀️' : '🌙'; }
function initDarkMode() { if (localStorage.getItem('tirtaDarkMode') === '1') { document.body.classList.add('dark'); const b = document.querySelector('.btn-darkmode'); if (b) b.textContent = '☀️'; } }

let currentUser = null, currentPage = 'penjualan', rekapSubTab = 'ringkasan';
let products = [], pelanggan = [], cart = [], salesHistory = [], stockInHistory = [], setoranHistory = [];
let drivers = [], salesUsers = [], banks = [];
let settings = { namaToko: 'Tirta Kencana', alamat: 'WTC Mangga 2 Lt UG A/53', tagline: 'DO GOOD AND GOOD WILL COME TO YOU', bottomLine: 'Terima kasih sudah berbelanja', logo: '', qris: '', telepon: '088211058000' };
let allUsers = [];

// ================= FUNGSI STOK DINAMIS =================
function getStokMasuk(sku) {
  return stockInHistory.filter(s => s.sku === sku && s.status === 'kiriman').reduce((sum, s) => sum + (s.qty || 0), 0);
}
function getStokKeluar(sku) {
  let qty = 0;
  salesHistory.forEach(s => { if (s.items) s.items.forEach(item => { if (item.sku === sku) qty += item.qty || 0; }); });
  return qty;
}
function getStokAkhir(sku) {
  const p = products.find(x => x.sku === sku);
  return p ? (p.stokAwal || 0) + getStokMasuk(sku) - getStokKeluar(sku) : 0;
}

// ================= PENYIMPANAN & SINYALIR =================
function saveAllData() {
  localStorage.setItem('tirtaFullData', JSON.stringify({ products, pelanggan, salesHistory, stockInHistory, setoranHistory, drivers, salesUsers, banks, settings, allUsers }));
}
function loadAllData() {
  const s = localStorage.getItem('tirtaFullData');
  if (s) { try { const d = JSON.parse(s); products = d.products || []; pelanggan = d.pelanggan || []; salesHistory = d.salesHistory || []; stockInHistory = d.stockInHistory || []; setoranHistory = d.setoranHistory || []; drivers = d.drivers || []; salesUsers = d.salesUsers || []; banks = d.banks || []; settings = { ...settings, ...(d.settings || {}) }; allUsers = d.allUsers || []; } catch (e) {} }
  if (products.length === 0) products = [
    { sku: 'aq1500', nama: 'Aqua 1500 ml', modal: 50000, jual: 55000, stokAwal: 0 },
    { sku: 'aq200', nama: 'Aqua 200 ml', modal: 33000, jual: 40000, stokAwal: 3 },
    { sku: 'aq220b', nama: 'Aqua Cube', modal: 21000, jual: 38000, stokAwal: 0 },
    { sku: 'aq330', nama: 'Aqua 330 ml', modal: 35000, jual: 42000, stokAwal: 29 },
    { sku: 'aq600', nama: 'Aqua 600 ml', modal: 44000, jual: 49000, stokAwal: 0 },
    { sku: 'aqg', nama: 'Aqua Galon 19L', modal: 16750, jual: 23000, stokAwal: 5 }
  ];
  if (pelanggan.length === 0) pelanggan = ['Warung Mpok', 'Toko Berkah'];
  if (drivers.length === 0) drivers = ['Hendri', 'Asep'];
  if (banks.length === 0) banks = [{ name: 'BCA', number: '6930099099', holder: 'Hendri', logo: '🏦' }, { name: 'bluBCA', number: '002283588888', holder: 'Hendri', logo: '💳' }];
  if (allUsers.length === 0) allUsers = [
    { name: 'admin', role: 'admin', password: '020730' },
    { name: 'hasan', role: 'sales', password: '1234' },
    { name: 'ujang', role: 'sales', password: '1234' },
    { name: 'oji', role: 'driver', password: '1234' },
    { name: 'padong', role: 'driver', password: '1234' }
  ];
  if (!settings.telepon) settings.telepon = '088211058000';
}

async function syncToGoogleSheets(action, data) {
  if (!USE_GOOGLE_SHEETS) return;
  try {
    const payload = JSON.stringify({ action, data });
    await fetch(GOOGLE_SHEETS_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: payload });
  } catch (e) { console.error('Sync error:', e); }
}

async function testConnection() {
  Swal.fire({ title: '🔌 Tes Koneksi', text: 'Mengirim data uji...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  try {
    const resp = await fetch(GOOGLE_SHEETS_URL + '?action=test');
    const result = await resp.json();
    if (result.success) Swal.fire('✅ Berhasil', 'Koneksi ke server OK!', 'success');
    else Swal.fire('⚠️ Gagal', 'Server merespons tetapi tidak sukses.', 'warning');
  } catch (e) { Swal.fire('❌ Error', 'Tidak dapat terhubung ke server. Periksa URL.', 'error'); }
}

async function refreshAllData(silent = false) {
  if (!silent) Swal.fire({ title: '🔄 Sync', text: 'Menarik data...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  try {
    const r = await fetch(GOOGLE_SHEETS_URL + '?action=getAllData');
    const d = await r.json();
    if (d.success && d.data) {
      if (d.data.products && d.data.products.length > 0) products = d.data.products.map(p => ({ sku: p.sku, nama: p.nama, modal: Number(p.modal)||0, jual: Number(p.jual)||0, stokAwal: Number(p.stokAwal)||0 }));
      if (d.data.pelanggan && d.data.pelanggan.length > 0) pelanggan = d.data.pelanggan;
      if (d.data.salesHistory && d.data.salesHistory.length > 0) salesHistory = d.data.salesHistory;
      if (d.data.stockInHistory && d.data.stockInHistory.length > 0) stockInHistory = d.data.stockInHistory;
      if (d.data.setoranHistory && d.data.setoranHistory.length > 0) setoranHistory = d.data.setoranHistory;
      if (d.data.drivers && d.data.drivers.length > 0) drivers = d.data.drivers;
      if (d.data.banks && d.data.banks.length > 0) banks = d.data.banks;
      if (d.data.settings) settings = { ...settings, ...d.data.settings };
      if (d.data.allUsers && d.data.allUsers.length > 0) { allUsers = d.data.allUsers; salesUsers = allUsers.filter(u => u.role === 'sales' || u.role === 'admin').map(u => u.name); }
      saveAllData();
      if (settings.alamat) document.getElementById('headerAlamat').textContent = settings.alamat;
      if (settings.logo) document.getElementById('logoImg').src = settings.logo;
      if (currentPage === 'setoran' && document.getElementById('setGrandCOD')) hitungSetoran();
      renderContent();
      if (!silent) Swal.fire({ title: '✅ Sukses', text: 'Data diperbarui!', icon: 'success', timer: 1500, showConfirmButton: false });
    } else {
      if (!silent) Swal.fire({ title: '⚠️ Info', text: 'Server kosong. Data lokal tetap aman.', icon: 'warning' });
    }
  } catch (e) {
    if (!silent) Swal.fire({ title: '❌ Error', text: 'Gagal terhubung.', icon: 'error' });
  }
}

function doLogin() {
  if (allUsers.length === 0) {
    allUsers = [
      { name: 'admin', role: 'admin', password: '020730' },
      { name: 'hasan', role: 'sales', password: '1234' },
      { name: 'ujang', role: 'sales', password: '1234' },
      { name: 'oji', role: 'driver', password: '1234' },
      { name: 'padong', role: 'driver', password: '1234' }
    ];
    saveAllData();
  }
  const u = document.getElementById('loginUser').value.trim(), p = document.getElementById('loginPass').value.trim();
  if (!u || !p) return Swal.fire('Error', 'Isi username & password', 'error');
  const f = allUsers.find(x => x.name === u && x.password === p);
  if (f) { currentUser = { name: f.name, role: f.role }; localStorage.setItem('tirtaUser', JSON.stringify(currentUser)); showMainApp(); }
  else { Swal.fire('Error', 'Username/password salah!', 'error'); }
}
document.addEventListener('keydown', function (e) { if (e.key === 'Enter' && !document.getElementById('loginPage').classList.contains('hidden')) doLogin(); });
function doLogout() { clearInterval(autoSyncInterval); localStorage.removeItem('tirtaUser'); currentUser = null; cart = []; document.getElementById('loginPage').classList.remove('hidden'); document.getElementById('mainApp').classList.add('hidden'); }
async function showMainApp() {
  document.getElementById('loginPage').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('displayName').textContent = currentUser.name; document.getElementById('displayRole').textContent = currentUser.role.toUpperCase();
  document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
  if (settings.alamat) document.getElementById('headerAlamat').textContent = settings.alamat;
  if (settings.logo) document.getElementById('logoImg').src = settings.logo;
  initDarkMode(); renderMenuTabs();
  await refreshAllData(true);
  clearInterval(autoSyncInterval); autoSyncInterval = setInterval(() => refreshAllData(true), 30000);
  navigateTo(currentUser.role === 'driver' ? 'inputbarang' : 'penjualan');
}

function renderMenuTabs() {
  let h = ''; const r = currentUser?.role;
  if (r === 'admin') h = `<button class="tab ${currentPage==='penjualan'?'active':''}" onclick="navigateTo('penjualan')"><i class="fas fa-cash-register"></i> Jual</button><button class="tab ${currentPage==='rekap'?'active':''}" onclick="navigateTo('rekap')"><i class="fas fa-chart-bar"></i> Rekap</button><button class="tab ${currentPage==='setoran'?'active':''}" onclick="navigateTo('setoran')"><i class="fas fa-money-bill-wave"></i> Setoran</button><button class="tab ${currentPage==='lapsetoran'?'active':''}" onclick="navigateTo('lapsetoran')"><i class="fas fa-file-invoice-dollar"></i> Lap. Setoran</button><button class="tab ${currentPage==='inputbarang'?'active':''}" onclick="navigateTo('inputbarang')"><i class="fas fa-boxes"></i> Input</button><button class="tab ${currentPage==='rekaptoko'?'active':''}" onclick="navigateTo('rekaptoko')"><i class="fas fa-warehouse"></i> Gudang</button><button class="tab ${currentPage==='keuangan'?'active':''}" onclick="navigateTo('keuangan')"><i class="fas fa-chart-pie"></i> Keuangan</button><button class="tab ${currentPage==='produk'?'active':''}" onclick="navigateTo('produk')"><i class="fas fa-cubes"></i> Produk</button><button class="tab ${currentPage==='pelanggan'?'active':''}" onclick="navigateTo('pelanggan')"><i class="fas fa-address-book"></i> Pelanggan</button><button class="tab ${currentPage==='pengaturan'?'active':''}" onclick="navigateTo('pengaturan')"><i class="fas fa-cog"></i> Atur</button>`;
  else if (r === 'sales') h = `<button class="tab ${currentPage==='penjualan'?'active':''}" onclick="navigateTo('penjualan')"><i class="fas fa-cash-register"></i> Jual</button><button class="tab ${currentPage==='rekap'?'active':''}" onclick="navigateTo('rekap')"><i class="fas fa-chart-bar"></i> Rekap</button><button class="tab ${currentPage==='setoran'?'active':''}" onclick="navigateTo('setoran')"><i class="fas fa-money-bill-wave"></i> Setoran</button>`;
  else if (r === 'driver') h = `<button class="tab ${currentPage==='inputbarang'?'active':''}" onclick="navigateTo('inputbarang')"><i class="fas fa-boxes"></i> Input</button><button class="tab ${currentPage==='rekaptoko'?'active':''}" onclick="navigateTo('rekaptoko')"><i class="fas fa-warehouse"></i> Gudang</button>`;
  document.getElementById('menuTabs').innerHTML = h;
}
function navigateTo(p) { currentPage = p; rekapSubTab = 'ringkasan'; renderMenuTabs(); renderContent(); }
function renderContent() { const c = document.getElementById('contentArea'); switch (currentPage) { case 'penjualan': c.innerHTML = pagePenjualan(); initPenjualan(); break; case 'rekap': loadRekapPenjualan(c); break; case 'setoran': c.innerHTML = pageSetoran(); initSetoran(); break; case 'lapsetoran': loadLaporanSetoran(c); break; case 'inputbarang': c.innerHTML = pageInputBarang(); initInputBarang(); break; case 'rekaptoko': loadRekapStockIn(c); break; case 'keuangan': loadKeuangan(c); break; case 'produk': c.innerHTML = pageProduk(); break; case 'pelanggan': c.innerHTML = pagePelanggan(); renderPelangganList(); break; case 'pengaturan': c.innerHTML = pagePengaturan(); break; } }

function pageProduk() {
  let h = `<div class="card"><div class="card-header"><div class="card-title"><i class="fas fa-cubes"></i> Manajemen Produk</div><button class="btn-primary btn-sm" onclick="showAddProduct()" style="padding:6px 12px;">+ Tambah</button></div>`;

  products.forEach(p => {
    const masuk = getStokMasuk(p.sku), keluar = getStokKeluar(p.sku), akhir = (p.stokAwal || 0) + masuk - keluar;
    h += `<tr><td style="font-weight:600;">${p.sku}</td><td>${p.nama}</td><td style="text-align:right;">Rp${(p.modal||0).toLocaleString()}</td><td style="text-align:right;">Rp${(p.jual||0).toLocaleString()}</td><td style="text-align:center;">${p.stokAwal||0}</td><td style="text-align:center;">${masuk}</td><td style="text-align:center;">${keluar}</td><td style="text-align:center;${akhir<10?'color:#EF4444;font-weight:bold;':''}">${akhir}</td><td><button class="btn-warning btn-sm" onclick="editProduct('${p.sku}')" style="padding:4px 8px;"><i class="fas fa-edit"></i></button> <button class="btn-danger btn-sm" onclick="deleteProductConfirm('${p.sku}')" style="padding:4px 8px;"><i class="fas fa-trash"></i></button></td></tr>`;
  });
  h += `</table></div></div><div id="prodForm"></div>`;
  return h;
}
