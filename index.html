<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Tirta Kencana · Air Minum</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --biru: #0A4D8C; --kuning: #F5B41B; --biru-muda: #E6F0FA; --kuning-muda: #FFF8E1;
      --bg: #F1F5F9; --card: #FFFFFF; --border: #E2E8F0; --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --radius: 16px; --text: #1E293B;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg); display: flex; justify-content: center;
      align-items: flex-start; min-height: 100vh; padding: 12px; color: var(--text);
    }
    .app-container {
      max-width: 500px; width: 100%; background: white; border-radius: 24px;
      box-shadow: 0 20px 40px rgba(10,77,140,0.12); overflow: hidden;
      display: flex; flex-direction: column; min-height: 95vh;
    }
    @media (min-width: 768px) { .app-container { max-width: 720px; } }
    @media (min-width: 1024px) { .app-container { max-width: 1000px; } }
    .header {
      background: linear-gradient(135deg, #0A4D8C 0%, #0B5FA5 100%);
      color: white; padding: 18px 20px 14px; text-align: center;
    }
    .brand { font-size: 1.9rem; font-weight: 800; display: flex; justify-content: center; gap: 6px; }
    .tirta { color: #fff; } .kencana { color: #F5B41B; }
    .tagline { font-size: 0.7rem; opacity: 0.9; letter-spacing: 0.5px; margin: 4px 0; }
    .alamat { font-size: 0.65rem; opacity: 0.8; }
    .logo-header {
      width: 48px; height: 48px; background: white; border-radius: 50%;
      margin: 8px auto 0; overflow: hidden; border: 2px solid #F5B41B;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .logo-header img { width: 100%; height: 100%; object-fit: contain; }
    .nav-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 14px; background: #F8FAFC; border-bottom: 1px solid var(--border);
    }
    .user-info { display: flex; align-items: center; gap: 8px; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%; background: var(--biru);
      color: white; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem;
    }
    .role-tag {
      background: var(--kuning); color: #0A2540; padding: 3px 10px;
      border-radius: 20px; font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
    }
    .btn-logout {
      background: #EF4444; color: white; border: none; padding: 6px 14px;
      border-radius: 8px; font-size: 0.7rem; cursor: pointer; font-weight: 600;
    }
    .menu-tabs {
      display: flex; overflow-x: auto; gap: 4px; padding: 8px 10px;
      background: white; border-bottom: 1px solid var(--border);
    }
    .menu-tabs::-webkit-scrollbar { height: 0; }
    .tab {
      flex: 0 0 auto; padding: 7px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: white; font-size: 0.7rem;
      font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.2s;
      color: #64748B; display: flex; align-items: center; gap: 4px;
    }
    .tab i { font-size: 0.8rem; }
    .tab.active { background: var(--biru); color: white; border-color: var(--biru); }
    .content-area { flex: 1; padding: 12px; overflow-y: auto; max-height: calc(100vh - 280px); }
    .card {
      background: var(--card); border-radius: var(--radius); padding: 16px;
      box-shadow: var(--shadow); margin-bottom: 10px; border: 1px solid var(--border);
    }
    .card-title {
      font-weight: 700; font-size: 0.9rem; margin-bottom: 12px;
      color: var(--biru); display: flex; align-items: center; gap: 6px;
    }
    .card-title i { color: var(--kuning); }
    .form-group { margin-bottom: 8px; }
    .form-group label { display: block; font-size: 0.7rem; font-weight: 600; color: #475569; margin-bottom: 3px; }
    input, select, textarea {
      width: 100%; padding: 9px 12px; border-radius: 10px;
      border: 1px solid #CBD5E1; font-size: 0.8rem; outline: none; background: white;
    }
    input:focus, select:focus { border-color: var(--biru); box-shadow: 0 0 0 3px rgba(10,77,140,0.1); }
    .btn {
      padding: 10px 16px; border-radius: 12px; border: none; font-size: 0.8rem;
      font-weight: 600; cursor: pointer; display: inline-flex; align-items: center;
      gap: 6px; transition: 0.2s;
    }
    .btn-primary { background: var(--biru); color: white; }
    .btn-warning { background: var(--kuning); color: #0A2540; }
    .btn-success { background: #10B981; color: white; }
    .btn-danger { background: #EF4444; color: white; }
    .btn-outline { background: white; border: 2px solid var(--biru); color: var(--biru); }
    .btn-sm { padding: 6px 10px; font-size: 0.7rem; border-radius: 8px; }
    .btn-block { width: 100%; justify-content: center; }
    .flex-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .col-2 { flex: 2; } .col-1 { flex: 1; }
    .total-box {
      background: var(--kuning-muda); padding: 10px 14px; border-radius: 12px;
      margin: 8px 0; text-align: right; font-weight: 700; font-size: 1.1rem; color: var(--biru);
    }
    .status-badge { padding: 3px 8px; border-radius: 10px; font-size: 0.6rem; font-weight: 600; display: inline-block; }
    .status-cod { background: #D1FAE5; color: #065F46; }
    .status-transfer { background: #DBEAFE; color: #1E40AF; }
    .status-qris { background: #FEF3C7; color: #92400E; }
    .status-belumbayar { background: #FEE2E2; color: #991B1B; }
    .status-kiriman { background: #E0E7FF; color: #3730A3; }
    .status-titipan { background: #FCE7F3; color: #9D174D; }
    table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
    th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: var(--biru-muda); color: var(--biru); font-weight: 700; font-size: 0.65rem; }
    .bottom-bar {
      text-align: center; font-size: 0.65rem; color: #64748B;
      padding: 10px; border-top: 1px solid var(--border); background: #F8FAFC;
    }
    .hidden { display: none !important; }
    .mb-2 { margin-bottom: 8px; } .mt-2 { margin-top: 8px; }
    .text-sm { font-size: 0.7rem; } .text-center { text-align: center; }
    .summary-box { flex: 1; text-align: center; padding: 10px; border-radius: 12px; font-size: 0.65rem; }
    .detail-group {
      margin: 8px 0; padding: 10px; background: #F8FAFC;
      border-radius: 10px; border-left: 3px solid var(--biru);
    }
    .login-container {
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
      background: linear-gradient(135deg, #0A4D8C, #0B5FA5);
    }
    .login-card {
      background: white; padding: 30px; border-radius: 24px; width: 340px;
      text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
    }
    .modal {
      background: white; border-radius: 20px; padding: 20px;
      max-width: 400px; width: 90%; max-height: 85vh; overflow-y: auto;
    }
    .bank-info {
      background: #F0F9FF; border: 1px solid #BAE6FD;
      border-radius: 10px; padding: 10px; margin: 10px 0; font-size: 0.7rem;
    }
    .section-title {
      font-size: 0.7rem; font-weight: 700; color: var(--biru);
      margin: 12px 0 6px 0; padding-bottom: 4px; border-bottom: 2px solid var(--kuning);
    }
  </style>
</head>
<body>

<div id="loginPage" class="login-container">
  <div class="login-card">
    <div class="brand" style="margin-bottom:10px;">
      <span style="color:#0A4D8C;">Tirta</span><span style="color:#F5B41B;">Kencana</span>
    </div>
    <p style="font-size:0.7rem;color:#64748B;margin-bottom:20px;">DO GOOD AND GOOD WILL COME TO YOU</p>
    <div class="form-group"><input type="text" id="loginUser" placeholder="Username" style="text-align:center;" autocomplete="off"></div>
    <div class="form-group"><input type="password" id="loginPass" placeholder="Password" style="text-align:center;"></div>
    <button class="btn btn-primary btn-block" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Masuk</button>
    <p style="font-size:0.6rem;margin-top:10px;color:#94A3B8;">Admin: Admin / admin123 | Sales: Sales A / sales123</p>
    <p id="loginError" style="font-size:0.6rem;color:#EF4444;margin-top:8px;display:none;"></p>
  </div>
</div>

<div id="mainApp" class="app-container hidden">
  <div class="header">
    <div class="brand"><span class="tirta">Tirta</span><span class="kencana">Kencana</span></div>
    <div class="tagline">DO GOOD AND GOOD WILL COME TO YOU</div>
    <div class="alamat" id="headerAlamat">WTC Mangga 2 Lt UG A/53</div>
    <div class="logo-header" onclick="document.getElementById('logoFileInput').click()">
      <img id="logoImg" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle fill='%230A4D8C' cx='20' cy='20' r='18'/%3E%3Ctext x='20' y='26' text-anchor='middle' fill='white' font-size='16'%3E💧%3C/text%3E%3C/svg%3E" alt="Logo">
    </div>
    <input type="file" id="logoFileInput" accept="image/*" style="display:none" onchange="uploadLogo(event)">
  </div>

  <div class="nav-bar">
    <div class="user-info">
      <div class="avatar" id="userAvatar">A</div>
      <div><div style="font-size:0.75rem;font-weight:600;" id="displayName">Admin</div><span class="role-tag" id="displayRole">ADMIN</span></div>
    </div>
    <button class="btn-logout" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i></button>
  </div>

  <div class="menu-tabs" id="menuTabs"></div>
  <div class="content-area" id="contentArea"></div>
  <div class="bottom-bar">Terima kasih sudah berbelanja · Tirta Kencana</div>
</div>

<div class="modal-overlay" id="strukModal" onclick="closeStruk()">
  <div class="modal" id="strukContent" onclick="event.stopPropagation()"></div>
</div>

<script>
// ============================================
// KONFIGURASI
// ============================================
const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycby8OcJbp5LUSoySHUYEPrVaGJWbtpTnh2BiJqRkf-ytn212ARFXgbH-Jq3s7BIsusTr/exec';
const USE_GOOGLE_SHEETS = true;

// ============================================
// STATE
// ============================================
let currentUser = null, currentPage = 'penjualan';
let products = [], pelanggan = [], cart = [], salesHistory = [], stockInHistory = [];
let drivers = ['Hendri', 'Asep', 'Budi', 'Joko'];
let salesUsers = ['Sales A', 'Sales B'];
let banks = [
  { name: 'BCA', number: '6930099099', holder: 'Hendri', logo: '🏦' },
  { name: 'bluBCA', number: '002283588888', holder: 'Hendri', logo: '💳' }
];
let settings = {
  namaToko: 'Tirta Kencana', alamat: 'WTC Mangga 2 Lt UG A/53',
  tagline: 'DO GOOD AND GOOD WILL COME TO YOU', bottomLine: 'Terima kasih sudah berbelanja',
  logo: '', qris: ''
};
let allUsers = [
  { name: 'Admin', role: 'admin', password: 'admin123' },
  { name: 'Sales A', role: 'sales', password: 'sales123' },
  { name: 'Sales B', role: 'sales', password: 'sales123' }
];

// ============================================
// SYNC GOOGLE SHEETS (FIXED - NO-CORS + FORM DATA)
// ============================================
async function syncToGoogleSheets(action, data) {
  if (!USE_GOOGLE_SHEETS || !GOOGLE_SHEETS_URL) return false;
  
  try {
    // Method 1: no-cors dengan text/plain
    await fetch(GOOGLE_SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: action, data: data })
    });
    console.log('✅ Synced:', action);
    return true;
  } catch(e) {
    console.log('Method 1 failed, trying method 2...');
    
    // Method 2: FormData
    try {
      const formData = new FormData();
      formData.append('action', action);
      formData.append('data', JSON.stringify(data));
      
      await fetch(GOOGLE_SHEETS_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: formData
      });
      console.log('✅ Synced (FormData):', action);
      return true;
    } catch(e2) {
      console.log('❌ Sync failed:', e2.message);
      return false;
    }
  }
}

// ============================================
// LOCAL STORAGE
// ============================================
function saveAllData() {
  localStorage.setItem('tirtaFullData', JSON.stringify({
    products, pelanggan, salesHistory, stockInHistory, drivers, salesUsers, banks, settings, allUsers
  }));
}
function loadAllData() {
  const s = localStorage.getItem('tirtaFullData');
  if (s) try {
    const d = JSON.parse(s);
    products = d.products || []; pelanggan = d.pelanggan || d.customers || [];
    salesHistory = d.salesHistory || []; stockInHistory = d.stockInHistory || [];
    drivers = d.drivers || drivers; salesUsers = d.salesUsers || salesUsers;
    banks = d.banks || banks; settings = { ...settings, ...(d.settings || {}) };
    allUsers = d.allUsers || allUsers;
  } catch(e) {}
  
  if (products.length === 0) {
    products = [
      { sku:'AQ001', nama:'Aqua 330ml', modal:2200, jual:3500, stokAwal:100, stokMasuk:0, stokKeluar:0, stokAkhir:100 },
      { sku:'AQ002', nama:'Aqua 600ml', modal:2500, jual:4000, stokAwal:150, stokMasuk:0, stokKeluar:0, stokAkhir:150 },
      { sku:'LS001', nama:'Le Minerale 330ml', modal:1500, jual:2500, stokAwal:80, stokMasuk:0, stokKeluar:0, stokAkhir:80 },
      { sku:'LS002', nama:'Le Minerale 600ml', modal:1800, jual:3000, stokAwal:90, stokMasuk:0, stokKeluar:0, stokAkhir:90 }
    ];
  }
  if (pelanggan.length === 0) pelanggan = ['Warung Mpok', 'Toko Berkah', 'Kantin Sejahtera', 'Pak Budi', 'Bu Ani'];
}

// ============================================
// AUTH
// ============================================
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  if (!u || !p) { document.getElementById('loginError').textContent = 'Isi username dan password!'; document.getElementById('loginError').style.display='block'; return; }
  
  const found = allUsers.find(x => x.name === u && x.password === p);
  if (found) {
    currentUser = { name: found.name, role: found.role };
    localStorage.setItem('tirtaUser', JSON.stringify(currentUser));
    showMainApp();
  } else {
    document.getElementById('loginError').textContent = 'Username atau password salah!';
    document.getElementById('loginError').style.display='block';
  }
}
document.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !document.getElementById('mainApp').classList.contains('hidden')===false && !document.getElementById('loginPage').classList.contains('hidden')) doLogin(); });

function doLogout() { localStorage.removeItem('tirtaUser'); currentUser=null; cart=[]; document.getElementById('loginPage').classList.remove('hidden'); document.getElementById('mainApp').classList.add('hidden'); }
function showMainApp() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('displayName').textContent = currentUser.name;
  document.getElementById('displayRole').textContent = currentUser.role.toUpperCase();
  document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
  if (settings.alamat) document.getElementById('headerAlamat').textContent = settings.alamat;
  if (settings.logo) document.getElementById('logoImg').src = settings.logo;
  renderMenuTabs(); navigateTo('penjualan');
}

// ============================================
// NAVIGATION
// ============================================
function renderMenuTabs() {
  let h = `<button class="tab ${currentPage==='penjualan'?'active':''}" onclick="navigateTo('penjualan')"><i class="fas fa-cash-register"></i> Jual</button>
    <button class="tab ${currentPage==='rekap'?'active':''}" onclick="navigateTo('rekap')"><i class="fas fa-chart-bar"></i> Rekap Jual</button>`;
  if (currentUser?.role === 'admin') h += `
    <button class="tab ${currentPage==='inputbarang'?'active':''}" onclick="navigateTo('inputbarang')"><i class="fas fa-boxes"></i> Input</button>
    <button class="tab ${currentPage==='rekaptoko'?'active':''}" onclick="navigateTo('rekaptoko')"><i class="fas fa-warehouse"></i> Rekap Gudang</button>
    <button class="tab ${currentPage==='produk'?'active':''}" onclick="navigateTo('produk')"><i class="fas fa-cubes"></i> Produk</button>
    <button class="tab ${currentPage==='pelanggan'?'active':''}" onclick="navigateTo('pelanggan')"><i class="fas fa-address-book"></i> Pelanggan</button>
    <button class="tab ${currentPage==='pengaturan'?'active':''}" onclick="navigateTo('pengaturan')"><i class="fas fa-cog"></i> Atur</button>`;
  document.getElementById('menuTabs').innerHTML = h;
}
function navigateTo(p) { currentPage = p; renderMenuTabs(); renderContent(); }

// ============================================
// RENDER CONTENT
// ============================================
function renderContent() {
  const c = document.getElementById('contentArea');
  switch(currentPage) {
    case 'penjualan': c.innerHTML = pagePenjualan(); initPenjualan(); break;
    case 'rekap': loadRekapPenjualan(c); break;
    case 'inputbarang': c.innerHTML = pageInputBarang(); initInputBarang(); break;
    case 'rekaptoko': loadRekapStockIn(c); break;
    case 'produk': c.innerHTML = pageProduk(); break;
    case 'pelanggan': c.innerHTML = pagePelanggan(); break;
    case 'pengaturan': c.innerHTML = pagePengaturan(); break;
  }
}

// ============================================
// API CALL
// ============================================
function apiCall(action, data = {}) {
  let result = { success: true };
  
  switch(action) {
    case 'createSale': {
      const id = 'INV-' + Date.now();
      let total = 0, tq = 0, td = 0;
      const items = data.items.map(i => {
        const q = parseInt(i.qty)||0, h = parseFloat(i.harga)||0, d = parseFloat(i.disc)||0;
        const dt = d * q, sub = (q*h) - dt;
        total += sub; tq += q; td += dt;
        return { ...i, qty:q, harga:h, disc:d, discTotal:dt, subtotal:sub };
      });
      salesHistory.unshift({ id, user:data.user, customer:data.customer, status:data.status, items, total, totalQty:tq, totalDisc:td, date:data.date||new Date().toISOString().split('T')[0], time:new Date().toLocaleTimeString('id-ID') });
      if (!pelanggan.includes(data.customer)) pelanggan.push(data.customer);
      data.items.forEach(i => { const p=products.find(x=>x.sku===i.sku); if(p){ p.stokKeluar=(p.stokKeluar||0)+(parseInt(i.qty)||0); p.stokAkhir=(p.stokAwal||0)+(p.stokMasuk||0)-p.stokKeluar; } });
      saveAllData(); syncToGoogleSheets('createSale', salesHistory[0]);
      result = { success: true, data: { id, total } }; break;
    }
    case 'addStockIn': {
      const sid = 'STK-' + Date.now();
      const q = parseInt(data.qty)||0, m = parseFloat(data.hargaModal)||0;
      const entry = { id:sid, sku:data.sku, nama:data.nama||'', qty:q, hargaModal:m, totalModal:q*m, driver:data.driver||'', rit:data.rit||'', status:data.status||'kiriman', date:new Date().toISOString().split('T')[0] };
      stockInHistory.unshift(entry);
      const p = products.find(x=>x.sku===data.sku); if(p){ p.stokMasuk=(p.stokMasuk||0)+q; p.stokAkhir=(p.stokAwal||0)+p.stokMasuk-p.stokKeluar; }
      saveAllData(); syncToGoogleSheets('addStockIn', entry);
      result = { success: true }; break;
    }
    case 'addPelanggan': if (data.name && !pelanggan.includes(data.name)) { pelanggan.push(data.name); saveAllData(); syncToGoogleSheets('addPelanggan', data); } result = { success: true, data: pelanggan }; break;
    case 'deletePelanggan': pelanggan = pelanggan.filter(c=>c!==data.name); saveAllData(); syncToGoogleSheets('deletePelanggan', data); result = { success: true, data: pelanggan }; break;
    case 'addProduct': {
      if (!data.sku) return { success: false, message: 'SKU wajib' };
      const st = parseInt(data.stokAwal)||0;
      products.push({ sku:data.sku, nama:data.nama||'', modal:parseFloat(data.modal)||0, jual:parseFloat(data.jual)||0, stokAwal:st, stokMasuk:0, stokKeluar:0, stokAkhir:st });
      saveAllData(); syncToGoogleSheets('addProduct', data);
      result = { success: true }; break;
    }
    case 'updateSale': {
      const si = salesHistory.findIndex(x=>x.id===data.id);
      if (si===-1) return { success: false };
      if (data.status) salesHistory[si].status = data.status;
      if (data.items) { let nt=0,nq=0,nd=0; const ni=data.items.map(i=>{ const q=parseInt(i.qty)||0,h=parseFloat(i.harga)||0,d=parseFloat(i.disc)||0,dt=d*q,sub=(q*h)-dt; nt+=sub; nq+=q; nd+=dt; return {...i,qty:q,harga:h,disc:d,discTotal:dt,subtotal:sub}; }); salesHistory[si].items=ni; salesHistory[si].total=nt; salesHistory[si].totalQty=nq; salesHistory[si].totalDisc=nd; }
      saveAllData(); syncToGoogleSheets('updateSale', data);
      result = { success: true }; break;
    }
    case 'deleteSale': salesHistory = salesHistory.filter(x=>x.id!==data.id); saveAllData(); syncToGoogleSheets('deleteSale', data); result = { success: true }; break;
    case 'updateSettings': settings = { ...settings, ...data }; saveAllData(); syncToGoogleSheets('updateSettings', data); result = { success: true }; break;
    case 'addDriver': if (!drivers.includes(data.name)) { drivers.push(data.name); saveAllData(); syncToGoogleSheets('addDriver', data); } result = { success: true, data: drivers }; break;
    case 'deleteDriver': drivers = drivers.filter(d=>d!==data.name); saveAllData(); syncToGoogleSheets('deleteDriver', data); result = { success: true, data: drivers }; break;
    case 'addBank': banks.push({ name:data.name, number:data.number, holder:data.holder||'', logo:data.logo||'🏦' }); saveAllData(); syncToGoogleSheets('addBank', data); result = { success: true }; break;
    case 'deleteBank': banks = banks.filter(b=>b.name!==data.name); saveAllData(); syncToGoogleSheets('deleteBank', data); result = { success: true }; break;
    case 'addSalesUser': if (!salesUsers.includes(data.name)) { salesUsers.push(data.name); saveAllData(); syncToGoogleSheets('addSalesUser', data); } result = { success: true, data: salesUsers }; break;
    case 'deleteSalesUser': salesUsers = salesUsers.filter(x=>x!==data.name); saveAllData(); syncToGoogleSheets('deleteSalesUser', data); result = { success: true, data: salesUsers }; break;
    case 'addUser': if (!allUsers.find(u=>u.name===data.name)) { allUsers.push({ name:data.name, role:data.role, password:data.password||'123456' }); if(data.role==='sales'&&!salesUsers.includes(data.name)) salesUsers.push(data.name); saveAllData(); syncToGoogleSheets('addUser', data); } result = { success: true }; break;
    case 'deleteUser': allUsers = allUsers.filter(u=>u.name!==data.name); salesUsers = salesUsers.filter(x=>x!==data.name); saveAllData(); syncToGoogleSheets('deleteUser', data); result = { success: true }; break;
    default: result = { success: true, data: [] };
  }
  return result;
}

function initPenjualan() { if (cart.length===0) cart.push({sku:'',qty:1,disc:0}); renderCart(); onStatusChange(); }
function onPelangganSelect() { const s=document.getElementById('custSelect'),n=document.getElementById('custNewInput'); if(s.value==='__new__'){n.style.display='block';n.focus();}else{n.style.display='none';n.value='';} }
function onStatusChange() { const st=document.getElementById('payStatus')?.value,box=document.getElementById('bankInfoBox'); if(st==='transfer'){let h='<strong>🏦 Transfer:</strong><br>';banks.forEach(b=>{h+=`• ${b.logo} <b>${b.name}</b> | ${b.number} | ${b.holder}<br>`;});box.innerHTML=h;box.style.display='block';}else if(st==='qris'&&settings.qris){box.innerHTML=`<strong>📱 QRIS</strong><br><img src="${settings.qris}" style="width:100px;">`;box.style.display='block';}else{box.style.display='none';} }
function getSelectedPelanggan() { const s=document.getElementById('custSelect'),n=document.getElementById('custNewInput'); return s.value==='__new__'?n.value.trim():s.value; }
function addCartItem() { cart.push({sku:'',qty:1,disc:0}); renderCart(); }
function removeCartItem(i) { cart.splice(i,1); renderCart(); }
function updateCart(i,f,v) { if(f==='qty')cart[i].qty=parseInt(v)||1; else if(f==='disc')cart[i].disc=parseInt(v)||0; else cart[i][f]=v; if(f==='sku'){const p=products.find(x=>x.sku===v);if(p){cart[i].harga=p.jual;cart[i].nama=p.nama;}} renderCart(); }
function renderCart() {
  const el=document.getElementById('cartItems'); if(!el)return;
  el.innerHTML = cart.map((item,i)=>{
    const p=products.find(x=>x.sku===item.sku), h=p?p.jual:(item.harga||0), dp=item.disc||0, dt=dp*item.qty, sub=(item.qty*h)-dt;
    let po='<option value="">Pilih</option>'; products.forEach(p=>{po+=`<option value="${p.sku}" ${item.sku===p.sku?'selected':''}>${p.sku}-${p.nama}(${p.stokAkhir})</option>`;});
    return `<div class="flex-row" style="margin-bottom:6px;padding:6px;background:#F8FAFC;border-radius:8px;">
      <select onchange="updateCart(${i},'sku',this.value)" style="flex:2;font-size:0.7rem;">${po}</select>
      <input type="number" value="${item.qty}" onchange="updateCart(${i},'qty',this.value)" style="width:45px;font-size:0.7rem;" min="1">
      <span style="font-size:0.6rem;">xRp${h.toLocaleString()}</span>
      <input type="number" value="${dp}" onchange="updateCart(${i},'disc',this.value)" style="width:60px;font-size:0.7rem;" placeholder="Disc">
      <span style="font-size:0.65rem;color:#EF4444;">(-Rp${dt.toLocaleString()})</span>
      <span style="font-size:0.7rem;font-weight:600;">Rp${sub.toLocaleString()}</span>
      <button class="btn btn-danger btn-sm" onclick="removeCartItem(${i})" style="padding:2px 6px;">✕</button></div>`;
  }).join('');
  let sa=0,td=0; cart.forEach(i=>{const p=products.find(x=>x.sku===i.sku),h=p?p.jual:(i.harga||0); sa+=i.qty*h; td+=(i.disc||0)*i.qty;});
  document.getElementById('cartSubtotal').textContent=sa.toLocaleString();
  document.getElementById('cartDisc').textContent=td.toLocaleString();
  document.getElementById('cartTotal').textContent=(sa-td).toLocaleString();
}
async function saveSale() {
  const cust=getSelectedPelanggan(); if(!cust)return Swal.fire('Error','Pilih pelanggan','error');
  const valid=cart.filter(i=>i.sku&&products.find(p=>p.sku===i.sku)); if(valid.length===0)return Swal.fire('Error','Pilih produk','error');
  const r=await apiCall('createSale',{user:currentUser.name,customer:cust,status:document.getElementById('payStatus')?.value||'cod',items:valid.map(i=>{const p=products.find(x=>x.sku===i.sku);return{sku:i.sku,nama:p?.nama||'',qty:i.qty,harga:p?.jual||(i.harga||0),disc:i.disc||0};}),date:new Date().toISOString().split('T')[0]});
  if(r.success){const ls=salesHistory[0]; Swal.fire({title:'✅ Berhasil!',html:`ID: <b>${r.data.id}</b><br>Total: <b>Rp${ls.total.toLocaleString()}</b>`,icon:'success',showDenyButton:true,showCancelButton:true,confirmButtonText:'🖨️ Cetak',denyButtonText:'📥 PNG',cancelButtonText:'💬 WA'}).then(ch=>{showStruk(ls);if(ch.isConfirmed)cetakBluetooth();else if(ch.isDenied)downloadStrukPNG();else if(ch.dismiss===Swal.DismissReason.cancel)kirimWA();}); cart=[{sku:'',qty:1,disc:0}];renderCart();document.getElementById('custSelect').value='';document.getElementById('custNewInput').style.display='none';}
}

function showStruk(s){let ih='';s.items.forEach(i=>{const dt=(i.disc||0)*(i.qty||0),sub=(i.qty*i.harga)-dt;ih+=`<tr><td>${i.nama||i.sku}</td><td>${i.qty}</td><td>Rp${i.harga.toLocaleString()}</td><td>${dt>0?'Rp'+dt.toLocaleString():'-'}</td><td>Rp${sub.toLocaleString()}</td></tr>`;});let bh='';if(s.status==='transfer'){bh='<div class="bank-info" style="text-align:left;"><strong>🏦 Transfer:</strong><br>';banks.forEach(b=>{bh+=`• ${b.logo} <b>${b.name}</b> | ${b.number} | ${b.holder}<br>`;});bh+='</div>';}else if(s.status==='qris'&&settings.qris)bh=`<div style="text-align:center;"><strong>📱 QRIS</strong><br><img src="${settings.qris}" style="width:100px;"></div>`;document.getElementById('strukContent').innerHTML=`<div id="strukPrintArea" style="text-align:center;padding:15px;font-size:0.7rem;max-width:320px;margin:0 auto;">${settings.logo?`<img src="${settings.logo}" style="width:60px;height:60px;border-radius:50%;margin-bottom:8px;">`:''}<h3 style="color:#0A4D8C;margin:0;">${settings.namaToko}</h3><p>${settings.tagline}</p><p>${settings.alamat}</p><hr><p>No: ${s.id}</p><p>Tgl: ${s.date} ${s.time||''}</p><p>Pelanggan: ${s.customer}</p><p>Sales: ${s.user}</p><p>Status: <span class="status-badge status-${s.status}">${s.status.toUpperCase()}</span></p>${bh}<hr><table style="width:100%;font-size:0.6rem;"><tr><th>Item</th><th>Qty</th><th>Harga</th><th>Disc</th><th>Sub</th></tr>${ih}</table><hr>${(s.totalDisc||0)>0?`<p style="color:#EF4444;">Diskon: -Rp${s.totalDisc.toLocaleString()}</p>`:''}<p style="font-weight:bold;font-size:0.9rem;">Total: Rp${(s.total||0).toLocaleString()}</p><p>${settings.bottomLine}</p></div>`;document.getElementById('strukModal').style.display='flex';}
function closeStruk(){document.getElementById('strukModal').style.display='none';}
async function cetakBluetooth(){try{const d=await navigator.bluetooth.requestDevice({acceptAllDevices:true});Swal.fire('Info','Terhubung: '+d.name,'success');}catch(e){Swal.fire('Info','Bluetooth tidak tersedia','info');}}

// PELANGGAN
// ============================================
function pagePelanggan(){let h='<div class="card"><div class="card-title"><i class="fas fa-address-book"></i> Pelanggan</div><div class="flex-row mb-2"><input id="newCustName" placeholder="Nama" style="flex:2;"><button class="btn btn-primary btn-sm" onclick="addPelanggan()">+</button></div><table><tr><th>No</th><th>Nama</th><th>Aksi</th></tr>';pelanggan.forEach((c,i)=>{h+=`<tr><td>${i+1}</td><td>${c}</td><td><button class="btn btn-danger btn-sm" onclick="deletePelangganConfirm('${c}')"><i class="fas fa-trash"></i></button></td></tr>`;});h+='</table></div>';return h;}
async function addPelanggan(){const n=document.getElementById('newCustName')?.value.trim();if(!n)return;await apiCall('addPelanggan',{name:n});loadAllData();navigateTo('pelanggan');}
async function deletePelangganConfirm(name){const c=await Swal.fire({title:'Hapus?',icon:'warning',showCancelButton:true});if(c.isConfirmed){await apiCall('deletePelanggan',{name});loadAllData();navigateTo('pelanggan');}}

// ============================================
// PENGATURAN (LENGKAP - UPLOAD LOGO, QRIS, BANK, USER, DRIVER)
// ============================================
function pagePengaturan() {
  return `
    <div class="card">
      <div class="card-title"><i class="fas fa-store"></i> Info Toko</div>
      <div class="form-group"><label>Nama Toko</label><input id="setNama" value="${settings.namaToko||''}"></div>
      <div class="form-group"><label>Tagline</label><input id="setTagline" value="${settings.tagline||''}"></div>
      <div class="form-group"><label>Alamat</label><input id="setAlamat" value="${settings.alamat||''}"></div>
      <div class="form-group"><label>Bottom Line (Struk)</label><input id="setBottomLine" value="${settings.bottomLine||''}"></div>
      <button class="btn btn-primary btn-block" onclick="saveSettings()"><i class="fas fa-save"></i> Simpan</button>
    </div>
    
    <div class="card">
      <div class="card-title"><i class="fas fa-upload"></i> Upload</div>
      <div class="form-group">
        <label>Logo Toko</label>
        <input type="file" id="logoUpload" accept="image/*" onchange="uploadLogo(event)">
        ${settings.logo ? `<img src="${settings.logo}" style="width:60px;height:60px;border-radius:50%;margin-top:8px;border:2px solid #F5B41B;">` : ''}
      </div>
      <div class="form-group">
        <label>QRIS</label>
        <input type="file" id="qrisUpload" accept="image/*" onchange="uploadQris(event)">
        ${settings.qris ? `<img src="${settings.qris}" style="width:100px;height:100px;margin-top:8px;">` : ''}
      </div>
    </div>
    
    <div class="card">
      <div class="card-title"><i class="fas fa-university"></i> Bank</div>
      ${banks.map(b => `<div class="flex-between" style="padding:4px 0;border-bottom:1px solid #E2E8F0;"><span>${b.logo} <b>${b.name}</b>: ${b.number} (${b.holder})</span><button class="btn btn-danger btn-sm" onclick="deleteBank('${b.name}')"><i class="fas fa-trash"></i></button></div>`).join('')}
      <div class="section-title">Tambah Bank</div>
      <div class="flex-row">
        <input id="bnkName" placeholder="Nama Bank" style="flex:1;">
        <input id="bnkNum" placeholder="No. Rekening" style="flex:1;">
        <input id="bnkHolder" placeholder="Pemilik" style="flex:1;">
      </div>
      <button class="btn btn-primary btn-sm mt-2" onclick="addBank()"><i class="fas fa-plus"></i> Tambah Bank</button>
    </div>
    
    <div class="card">
      <div class="card-title"><i class="fas fa-users"></i> Sales & User Login</div>
      <div class="section-title">Data Sales</div>
      <div>${salesUsers.map(s => `<span class="status-badge status-cod" style="margin:2px;">👤 ${s} <i class="fas fa-times" style="cursor:pointer;margin-left:4px;" onclick="deleteSalesUser('${s}')"></i></span>`).join(' ')}</div>
      <div class="flex-row mt-2">
        <input id="newSalesName" placeholder="Nama Sales Baru" style="flex:2;">
        <button class="btn btn-primary btn-sm" onclick="addSalesUser()">+ Sales</button>
      </div>
      
      <div class="section-title">User Login</div>
      ${allUsers.map(u => `<div class="flex-between" style="padding:2px 0;"><span>🔑 <b>${u.name}</b> (${u.role})</span><button class="btn btn-danger btn-sm" onclick="deleteUserLogin('${u.name}')"><i class="fas fa-trash"></i></button></div>`).join('')}
      <div class="flex-row mt-2">
        <input id="newUserName" placeholder="Username" style="flex:1;">
        <select id="newUserRole" style="flex:1;"><option value="admin">Admin</option><option value="sales">Sales</option></select>
        <input id="newUserPass" placeholder="Password" value="123456" style="flex:1;">
      </div>
      <button class="btn btn-primary btn-sm mt-2" onclick="addUserLogin()"><i class="fas fa-plus"></i> Tambah User</button>
    </div>
    
    <div class="card">
      <div class="card-title"><i class="fas fa-truck"></i> Driver</div>
      ${drivers.map(d => `<div class="flex-between" style="padding:4px 0;border-bottom:1px solid #E2E8F0;"><span>🚚 ${d}</span><button class="btn btn-danger btn-sm" onclick="deleteDriver('${d}')"><i class="fas fa-trash"></i></button></div>`).join('')}
      <div class="flex-row mt-2">
        <input id="drvName" placeholder="Nama Driver Baru" style="flex:2;">
        <button class="btn btn-primary btn-sm" onclick="addDriver()">+ Driver</button>
      </div>
    </div>
  `;
}

async function saveSettings() {
  settings.namaToko = document.getElementById('setNama')?.value || settings.namaToko;
  settings.tagline = document.getElementById('setTagline')?.value || settings.tagline;
  settings.alamat = document.getElementById('setAlamat')?.value || settings.alamat;
  settings.bottomLine = document.getElementById('setBottomLine')?.value || settings.bottomLine;
  await apiCall('updateSettings', settings);
  saveAllData();
  document.getElementById('headerAlamat').textContent = settings.alamat;
  Swal.fire('Sukses', 'Pengaturan disimpan', 'success');
}

function uploadLogo(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = function(ev) {
    document.getElementById('logoImg').src = ev.target.result;
    settings.logo = ev.target.result;
    apiCall('updateSettings', { logo: ev.target.result });
    saveAllData();
    navigateTo('pengaturan');
    Swal.fire('Sukses', 'Logo diupload', 'success');
  };
  r.readAsDataURL(f);
}

function uploadQris(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = function(ev) {
    settings.qris = ev.target.result;
    apiCall('updateSettings', { qris: ev.target.result });
    saveAllData();
    navigateTo('pengaturan');
    Swal.fire('Sukses', 'QRIS diupload', 'success');
  };
  r.readAsDataURL(f);
}

async function addBank() {
  const name = document.getElementById('bnkName')?.value.trim();
  const number = document.getElementById('bnkNum')?.value.trim();
  const holder = document.getElementById('bnkHolder')?.value.trim();
  if (!name || !number) return Swal.fire('Error', 'Nama bank & nomor rekening wajib', 'error');
  await apiCall('addBank', { name, number, holder });
  loadAllData(); navigateTo('pengaturan');
  Swal.fire('Sukses', 'Bank ditambahkan', 'success');
}

async function deleteBank(name) {
  await apiCall('deleteBank', { name });
  loadAllData(); navigateTo('pengaturan');
}

async function addSalesUser() {
  const name = document.getElementById('newSalesName')?.value.trim();
  if (!name) return;
  const r = await apiCall('addSalesUser', { name });
  if (r.success) { salesUsers = r.data; navigateTo('pengaturan'); }
}

async function deleteSalesUser(name) {
  const r = await apiCall('deleteSalesUser', { name });
  if (r.success) { salesUsers = r.data; navigateTo('pengaturan'); }
}

async function addUserLogin() {
  const name = document.getElementById('newUserName')?.value.trim();
  const role = document.getElementById('newUserRole')?.value;
  const pass = document.getElementById('newUserPass')?.value;
  if (!name) return Swal.fire('Error', 'Username wajib', 'error');
  await apiCall('addUser', { name, role, password: pass });
  loadAllData(); navigateTo('pengaturan');
  Swal.fire('Sukses', 'User ditambahkan', 'success');
}

async function deleteUserLogin(name) {
  const c = await Swal.fire({ title: 'Hapus User?', text: `Hapus ${name}?`, icon: 'warning', showCancelButton: true });
  if (c.isConfirmed) {
    await apiCall('deleteUser', { name });
    loadAllData(); navigateTo('pengaturan');
  }
}

async function addDriver() {
  const name = document.getElementById('drvName')?.value.trim();
  if (!name) return;
  const r = await apiCall('addDriver', { name });
  if (r.success) { drivers = r.data; navigateTo('pengaturan'); Swal.fire('Sukses', 'Driver ditambahkan', 'success'); }
}

async function deleteDriver(name) {
  const r = await apiCall('deleteDriver', { name });
  if (r.success) { drivers = r.data; navigateTo('pengaturan'); }
}

// ============================================
// INIT
// ============================================
document.addEventListener('DOMContentLoaded', () => {
  loadAllData();
  const savedUser = localStorage.getItem('tirtaUser');
  if (savedUser) { currentUser = JSON.parse(savedUser); showMainApp(); }
});
</script>
</body>
</html>
